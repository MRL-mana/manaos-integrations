# /moltbot/ だけ公開（逆プロキシ + Basic認証）
# 配置例: /etc/nginx/sites-available/mrl-mana.com
# 有効化: sudo ln -s /etc/nginx/sites-available/mrl-mana.com /etc/nginx/sites-enabled/
#
# パス二重にならない設定: proxy_pass は末尾スラッシュなし。
# 外から GET https://domain/moltbot/health → バックエンドへ GET /moltbot/health のまま渡る。
#
# limit_req_zone は http ブロックに追加すること:
#   limit_req_zone $binary_remote_addr zone=moltbot_zone:10m rate=5r/s;
#
# ログ相関（plan_id で監査と紐付け）: http ブロックに log_format を追加し、access_log で使用。
#   log_format moltbot '$remote_addr - $remote_user [$time_local] '
#                      '"$request" $status $body_bytes_sent '
#                      'plan_id="$http_x_plan_id" ref="$http_referer" ua="$http_user_agent"';

server {
    listen 80;
    server_name mrl-mana.com;

    # 補強1: /moltbot（スラッシュなし）→ /moltbot/ へリダイレクト
    location = /moltbot {
        return 301 /moltbot/;
    }

    # 補強2: health だけ認証なし（監視用）。/moltbot/ より先に書く。
    location = /moltbot/health {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # auth_basic なし
        # (任意) access_log /var/log/nginx/moltbot_access.log moltbot;
    }

    location /moltbot/ {
        # 末尾スラッシュなし → フルURI(/moltbot/...)がそのままバックエンドへ（二重にならない）
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # (任意) IP制限: 自宅IP等に絞る
        # allow 1.2.3.4;
        # deny all;

        # レート制限（事故らない守り）
        limit_req zone=moltbot_zone burst=5 nodelay;

        # (任意) 監査と相関するアクセスログ
        # access_log /var/log/nginx/moltbot_access.log moltbot;
    }
}
