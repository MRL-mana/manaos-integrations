# データベース操作のサンプルYAML

# 例1: PostgreSQLクエリ実行
kind: database_ops
action: execute_query
database_type: postgresql
connection_string: "postgresql://user:password@localhost:5432/mydb"
query: "SELECT * FROM tasks WHERE status = 'pending'"
notify:
  slack: false
idempotency_key: "db_query_2026-01-13_001"

