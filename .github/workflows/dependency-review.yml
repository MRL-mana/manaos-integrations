name: Dependency Review

on:
  pull_request:
    branches: [master, main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect dependency review availability
        id: support
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data } = await github.rest.repos.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              const sa = data.security_and_analysis || {};
              const depGraph = sa.dependency_graph?.status === 'enabled';
              const advSec = sa.advanced_security?.status === 'enabled';
              const enabled = depGraph && advSec;
              core.setOutput('enabled', enabled ? 'true' : 'false');
              core.notice(`dependency-review supported: ${enabled}`);
            } catch (error) {
              core.warning(`Could not determine dependency-review support: ${error.message}`);
              core.setOutput('enabled', 'false');
            }

      - name: Dependency review
        if: steps.support.outputs.enabled == 'true'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Dependency review skipped
        if: steps.support.outputs.enabled != 'true'
        run: echo "Dependency review is skipped because repository support is unavailable."
