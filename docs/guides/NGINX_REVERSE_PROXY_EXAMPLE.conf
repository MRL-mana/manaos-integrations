##
# ManaOS Integrations API - Nginx reverse proxy example
#
# - TLS termination (example placeholders)
# - Basic auth
# - Optional IP allow/deny
# - Proxies to localhost-only bound app (recommended)
#
# NOTE:
# - Do NOT commit real credentials.
# - Keep the app bound to 127.0.0.1:9510 and expose only through Nginx.
##

server {
  listen 443 ssl http2;
  server_name your-domain.example;

  # --- TLS (placeholders) ---
  ssl_certificate     /etc/letsencrypt/live/your-domain.example/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/your-domain.example/privkey.pem;

  # --- Basic auth (recommended) ---
  auth_basic "ManaOS Integrations";
  auth_basic_user_file /etc/nginx/.htpasswd_manaos_integrations;

  # --- Optional IP restriction (uncomment if needed) ---
  # allow 127.0.0.1;
  # allow 10.0.0.0/8;
  # deny all;

  # Increase body size if you upload files (tune as needed)
  client_max_body_size 50m;

  location / {
    proxy_pass http://127.0.0.1:9510;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts (tune as needed)
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
  }
}


