# Notion操作のサンプルYAML

# 例1: ページ作成
kind: notion_ops
action: create_page
database_id: "xxx-xxx-xxx"  # NotionデータベースID
properties:
  title: "タスク名"
  status: "進行中"
  due_date: "2026-01-15"
  priority: "high"
notify:
  slack: false
idempotency_key: "notion_task_2026-01-13_001"

