name: Code Quality & Linting

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - "manaos_integrations/**/*.py"
      - "requirements*.txt"
      - ".flake8"
      - ".pylintrc"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - "manaos_integrations/**/*.py"
      - "requirements*.txt"
      - ".flake8"
      - ".pylintrc"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: windows-latest
    continue-on-error: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Detect lint-relevant changes
      id: lintfilter
      uses: dorny/paths-filter@v3
      with:
        filters: |
          code:
            - 'manaos_integrations/**/*.py'
          deps:
            - 'requirements*.txt'
            - 'pyproject.toml'
            - '.flake8'
            - '.pylintrc'
          workflow:
            - '.github/workflows/lint.yml'
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install linting tools
      if: github.event_name == 'workflow_dispatch' || steps.lintfilter.outputs.code == 'true' || steps.lintfilter.outputs.workflow == 'true'
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint black mypy
      shell: pwsh
    
    - name: Run flake8
      if: github.event_name == 'workflow_dispatch' || steps.lintfilter.outputs.code == 'true' || steps.lintfilter.outputs.workflow == 'true'
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      shell: pwsh
      continue-on-error: true
    
    - name: Run pylint
      if: github.event_name == 'workflow_dispatch' || steps.lintfilter.outputs.code == 'true' || steps.lintfilter.outputs.workflow == 'true'
      run: |
        pylint --errors-only --rcfile=.pylintrc $(Get-ChildItem -Path . -Filter *.py -Recurse | Select-Object -ExpandProperty FullName)
      shell: pwsh
      continue-on-error: true
    
    - name: Check code formatting with black
      if: github.event_name == 'workflow_dispatch' || steps.lintfilter.outputs.code == 'true' || steps.lintfilter.outputs.workflow == 'true'
      run: |
        black --check --diff .
      shell: pwsh
      continue-on-error: true
    
    - name: Run mypy type checking
      if: github.event_name == 'workflow_dispatch' || steps.lintfilter.outputs.code == 'true' || steps.lintfilter.outputs.workflow == 'true'
      run: |
        mypy --ignore-missing-imports --python-version 3.10 .
      shell: pwsh
      continue-on-error: true
    
    - name: Summary
      if: always()
      run: |
        Write-Host "✅ Code quality check completed"
      shell: pwsh
