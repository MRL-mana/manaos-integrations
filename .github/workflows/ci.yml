name: CI/CD Pipeline

on:
    push:
        branches: [master, main, develop]
        paths:
            - 'manaos_integrations/**/*.py'
            - 'tests/**'
            - 'requirements*.txt'
            - '.flake8'
            - '.pylintrc'
            - 'pyproject.toml'
            - '.github/workflows/ci.yml'
    pull_request:
        branches: [master, main]
        paths:
            - 'manaos_integrations/**/*.py'
            - 'tests/**'
            - 'requirements*.txt'
            - '.flake8'
            - '.pylintrc'
            - 'pyproject.toml'
            - '.github/workflows/ci.yml'
    schedule:
        # 毎日午前3時（JST）にセキュリティスキャン実行
        - cron: '0 18 * * *'
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
    PYTHON_VERSION: "3.11"

jobs:
    detect-changes:
        if: github.event_name != 'schedule'
        runs-on: ubuntu-latest
        outputs:
            code: ${{ steps.filter.outputs.code }}
            deps: ${{ steps.filter.outputs.deps }}
            workflow: ${{ steps.filter.outputs.workflow }}
            yaml: ${{ steps.filter.outputs.yaml }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Detect changed paths
              id: filter
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      code:
                        - 'manaos_integrations/**/*.py'
                        - 'tests/**'
                      deps:
                        - 'requirements*.txt'
                        - 'requirements-core.txt'
                        - 'pyproject.toml'
                        - 'setup.py'
                        - 'setup.cfg'
                      workflow:
                        - '.github/workflows/ci.yml'
                      yaml:
                        - '.github/workflows/**/*.yml'
                        - '**/*.yaml'
                        - '**/*.yml'

    test:
        needs: detect-changes
        if: github.event_name != 'schedule' && (needs.detect-changes.outputs.code == 'true' || needs.detect-changes.outputs.workflow == 'true')
        runs-on: ubuntu-latest
        continue-on-error: false
        strategy:
            matrix:
                python-version: ["3.11", "3.12", "3.13"]
            fail-fast: false

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Cache pip dependencies
              uses: actions/cache@v5
              with:
                  path: ~/.cache/pip
                  key: ${{ runner.os }}-pip-${{ hashFiles('requirements-core.txt') }}
                  restore-keys: |
                      ${{ runner.os }}-pip-

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements-core.txt
                  pip install pytest pytest-cov pytest-asyncio pytest-timeout

            - name: Detect test directories
              id: testdirs
              run: |
                  if [ -d tests/unit ]; then
                    echo "has_unit=true" >> $GITHUB_OUTPUT
                  else
                    echo "has_unit=false" >> $GITHUB_OUTPUT
                  fi
                  if [ -d tests/integration ]; then
                    echo "has_integration=true" >> $GITHUB_OUTPUT
                  else
                    echo "has_integration=false" >> $GITHUB_OUTPUT
                  fi

            - name: Run linter
              if: matrix.python-version == '3.11'
              run: |
                  pip install flake8
                  TARGETS=""
                  if [ -d manaos_integrations ]; then TARGETS="$TARGETS manaos_integrations"; fi
                  if [ -d tests ]; then TARGETS="$TARGETS tests"; fi
                  if [ -z "$TARGETS" ]; then
                    echo "No flake8 targets found; skipping"
                  else
                    flake8 $TARGETS --count --select=E9,F63,F7,F82 --show-source --statistics --config .flake8
                  fi
              continue-on-error: false

            - name: Run unit tests
              if: steps.testdirs.outputs.has_unit == 'true'
              run: |
                  pytest tests/unit/ -v --cov=. --cov-report=xml --timeout=30
              continue-on-error: false

            - name: Run integration tests
              if: matrix.python-version == '3.11' && steps.testdirs.outputs.has_integration == 'true'
              run: |
                  pytest tests/integration/ -v --cov-append --cov=. --cov-report=xml --timeout=60
              continue-on-error: false

            - name: Upload coverage to Codecov
              if: matrix.python-version == '3.11' && steps.testdirs.outputs.has_unit == 'true'
              uses: codecov/codecov-action@v5
              with:
                  files: ./coverage.xml
                  flags: unittests
                  name: codecov-umbrella
              continue-on-error: false

    security:
        runs-on: ubuntu-latest
        continue-on-error: false

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Detect security-relevant changes
              id: secfilter
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      code:
                        - 'manaos_integrations/**/*.py'
                        - 'tests/**'
                        - 'security_auditor.py'
                        - '.github/workflows/ci.yml'
                      deps:
                        - 'requirements*.txt'
                        - 'requirements-core.txt'
                        - 'pyproject.toml'
                        - 'setup.py'
                        - 'setup.cfg'
                        - '.github/workflows/ci.yml'
                      secrets:
                        - '**/*.py'
                        - '**/*.sh'
                        - '**/*.ps1'
                        - '.github/workflows/ci.yml'

            - name: Set up Python
              if: github.event_name == 'schedule' || steps.secfilter.outputs.code == 'true' || steps.secfilter.outputs.deps == 'true'
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Cache pip dependencies
              if: github.event_name == 'schedule' || steps.secfilter.outputs.code == 'true' || steps.secfilter.outputs.deps == 'true'
              uses: actions/cache@v5
              with:
                  path: ~/.cache/pip
                  key: ${{ runner.os }}-pip-security-${{ hashFiles('requirements-core.txt') }}
                  restore-keys: |
                      ${{ runner.os }}-pip-security-

            - name: Install security tools
              if: github.event_name == 'schedule' || steps.secfilter.outputs.code == 'true' || steps.secfilter.outputs.deps == 'true'
              run: |
                  pip install bandit safety

            - name: Gitleaks secret scan
              if: github.event_name == 'schedule' || steps.secfilter.outputs.secrets == 'true'
              run: |
                  docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest detect --source /repo --no-banner
              continue-on-error: false

            - name: Run ManaOS Security Auditor
              if: github.event_name == 'schedule' || steps.secfilter.outputs.code == 'true'
              run: |
                  if [ -f security_auditor.py ]; then
                    python security_auditor.py --dir .
                  else
                    echo "security_auditor.py not found; skipping"
                  fi
              continue-on-error: false

            - name: Run Bandit security scan
              if: github.event_name == 'schedule' || steps.secfilter.outputs.code == 'true'
              run: |
                  bandit -r . -f json -o bandit-report.json --exclude .venv,venv,tests

            - name: Run Safety dependency check
              if: github.event_name == 'schedule' || steps.secfilter.outputs.deps == 'true'
              run: |
                  safety check --json --output safety-report.json

            - name: Upload security reports
              if: always() && (github.event_name == 'schedule' || steps.secfilter.outputs.code == 'true' || steps.secfilter.outputs.deps == 'true')
              uses: actions/upload-artifact@v4
              with:
                  name: security-reports
                  path: |
                      bandit-report.json
                      safety-report.json
                  retention-days: 30

    config-validation:
        if: github.event_name != 'schedule'
        runs-on: ubuntu-latest
        continue-on-error: false

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Install YAML parser
              run: |
                  python -m pip install --upgrade pip
                  pip install pyyaml

            - name: Validate configuration files
              run: |
                  python -c "import json; json.load(open('manaos_integration_config.json'))"
                  python -c "import yaml; yaml.safe_load(open('services_dependency.yaml'))"
                  echo "✅ Configuration files are valid"

            - name: Check port conflicts
              run: |
                  python config_loader.py

    lint-yaml:
        needs: detect-changes
        if: github.event_name != 'schedule'
        runs-on: ubuntu-latest
        continue-on-error: false

        steps:
            - uses: actions/checkout@v4

            - name: Detect YAML-related changes
              id: yamlfilter
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      yaml:
                        - '.github/workflows/**/*.yml'
                        - '**/*.yaml'
                        - '**/*.yml'

            - name: Lint YAML files
              if: steps.yamlfilter.outputs.yaml == 'true' || needs.detect-changes.outputs.workflow == 'true'
              run: |
                  python -m pip install --upgrade pip
                  pip install yamllint
                  cat > .yamllint-ci.yml <<'EOF'
                  extends: relaxed
                  rules:
                    document-start: disable
                    truthy: disable
                    indentation: disable
                    trailing-spaces: disable
                    line-length: disable
                    empty-lines: disable
                  EOF
                  yamllint -c .yamllint-ci.yml .github/workflows/*.yml
              continue-on-error: false
