# Kubernetes Secrets Template
# Base64エンコードした値を使用してください
# echo -n 'your-api-key' | base64

apiVersion: v1
kind: Secret
metadata:
  name: manaos-secrets
  namespace: manaos
type: Opaque
data:
  # 以下の値をBase64エンコードして設定してください
  # BRAVE_API_KEY: <base64-encoded-key>
  # CIVITAI_API_KEY: <base64-encoded-key>
  # OPENAI_API_KEY: <base64-encoded-key>
  # ANTHROPIC_API_KEY: <base64-encoded-key>
  
  # Grafana Admin Password
  # GRAFANA_PASSWORD: <base64-encoded-password>
