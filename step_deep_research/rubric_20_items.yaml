rubric:
  version: "1.0"
  total_items: 20
  min_pass_score: 14
  
  citations:                   # 出典・引用（8項目）
    items:
      - id: "cite_001"
        name: "主要主張に出典がある"
        weight: 1
        description: "レポート内の主要な主張には必ず出典が付いている"
      
      - id: "cite_002"
        name: "引用が主張に対応している"
        weight: 1
        description: "引用された内容が主張を裏付けている"
      
      - id: "cite_003"
        name: "出典が一次情報寄り"
        weight: 1
        description: "公式ドキュメント、論文、規格書などの一次情報を優先"
      
      - id: "cite_004"
        name: "出典が少なすぎない"
        weight: 1
        description: "最低3件以上の出典がある"
      
      - id: "cite_005"
        name: "出典が偏りすぎない"
        weight: 1
        description: "単一のソースに依存していない"
      
      - id: "cite_006"
        name: "日付が古すぎる情報に注意書き"
        weight: 1
        description: "3年以上古い情報には注意書きがある"
      
      - id: "cite_007"
        name: "推測と事実を区別"
        weight: 1
        description: "推測（inference）と事実（fact）が明確に区別されている"
      
      - id: "cite_008"
        name: "リンク切れ/参照不能なし"
        weight: 1
        description: "すべての出典が参照可能である"
  
  logic:                        # 論理・整合（7項目）
    items:
      - id: "logic_001"
