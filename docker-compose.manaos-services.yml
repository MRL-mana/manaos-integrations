      - ./manaos_logger.py:/app/manaos_logger.py:ro
      - ./manaos_error_handler.py:/app/manaos_error_handler.py:ro
      - ./manaos_timeout_config.py:/app/manaos_timeout_config.py:ro
      - ./manaos_config_validator.py:/app/manaos_config_validator.py:ro
      - ./config_validator_enhanced.py:/app/config_validator_enhanced.py:ro
      - ./unified_logging.py:/app/unified_logging.py:ro
      - ./_paths.py:/app/_paths.py:ro
      - ./autonomy_gates.py:/app/autonomy_gates.py:ro
