apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-configuration
  namespace: manaos
data:
  sampling.json: |
    {
      "default_strategy": {
        "type": "probabilistic",
        "param": 0.1
      },
      "service_strategies": [
        {
          "service": "unified-api",
          "type": "probabilistic",
          "param": 0.5
        },
        {
          "service": "mrl-memory",
          "type": "probabilistic",
          "param": 0.3
        },
        {
          "service": "learning-system",
          "type": "probabilistic",
          "param": 0.3
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: manaos
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      serviceAccountName: jaeger
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:latest
        ports:
        - containerPort: 5775
          protocol: UDP
          name: zipkin-compact
        - containerPort: 6831
          protocol: UDP
          name: jaeger-compact
        - containerPort: 6832
          protocol: UDP
          name: jaeger-binary
        - containerPort: 5778
          protocol: TCP
          name: serve-configs
        - containerPort: 16686
          protocol: TCP
          name: jaeger-ui
        - containerPort: 14268
          protocol: TCP
          name: jaeger-collector
        - containerPort: 14250
          protocol: TCP
          name: grpc
        env:
        - name: COLLECTOR_ZIPKIN_HOST_PORT
          value: ":9411"
        - name: SAMPLER_TYPE
          value: "probabilistic"
        - name: SAMPLER_PARAM
          value: "0.1"
        - name: SPAN_STORAGE_TYPE
          value: "badger"
        - name: BADGER_EPHEMERAL
          value: "false"
        - name: BADGER_DIRECTORY_VALUE
          value: "/badger/data"
        - name: BADGER_DIRECTORY_KEY
          value: "/badger/key"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: jaeger-config
          mountPath: /etc/jaeger
        - name: jaeger-storage
          mountPath: /badger
      volumes:
      - name: jaeger-config
        configMap:
          name: jaeger-configuration
      - name: jaeger-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: manaos
  labels:
    app: jaeger
spec:
  type: ClusterIP
  ports:
  - port: 5775
    protocol: UDP
    targetPort: 5775
    name: zipkin-compact
  - port: 6831
    protocol: UDP
    targetPort: 6831
    name: jaeger-compact
  - port: 6832
    protocol: UDP
    targetPort: 6832
    name: jaeger-binary
  - port: 5778
    protocol: TCP
    targetPort: 5778
    name: serve-configs
  - port: 16686
    protocol: TCP
    targetPort: 16686
    name: jaeger-ui
  - port: 14268
    protocol: TCP
    targetPort: 14268
    name: jaeger-collector
  - port: 14250
    protocol: TCP
    targetPort: 14250
    name: grpc
  selector:
    app: jaeger
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jaeger
  namespace: manaos
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jaeger
rules:
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jaeger
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: jaeger
subjects:
- kind: ServiceAccount
  name: jaeger
  namespace: manaos
