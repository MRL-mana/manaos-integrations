# メール送信のサンプルYAML

# 例1: 単一メール送信
kind: email_ops
action: send
to: "user@example.com"
subject: "日報"
body: "今日の作業内容..."
attachments:
  - "reports/daily_report.pdf"
notify:
  slack: false
idempotency_key: "email_send_2026-01-13_001"

