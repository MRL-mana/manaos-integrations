# 🚀 Google AI統合システム設定ファイル
# 爆速統合システム - GPU-Canaryスタック

google_ai:
  api_key: "AIzaSyAGnjkMUkTr4Y2TbtAMbM3hed6f3uiOQO4"  # 実際のAPIキー
  model: "gemini-1.5-flash"
  temperature: 0.7
  max_tokens: 2048
  safety_settings:
    - category: "HARM_CATEGORY_HARASSMENT"
      threshold: "BLOCK_MEDIUM_AND_ABOVE"
    - category: "HARM_CATEGORY_HATE_SPEECH"
      threshold: "BLOCK_MEDIUM_AND_ABOVE"
    - category: "HARM_CATEGORY_SEXUALLY_EXPLICIT"
      threshold: "BLOCK_MEDIUM_AND_ABOVE"
    - category: "HARM_CATEGORY_DANGEROUS_CONTENT"
      threshold: "BLOCK_MEDIUM_AND_ABOVE"

quantum_analysis:
  output_dir: "../data/quantum_outputs"
  analysis_types:
    - "entanglement"
    - "coherence"
    - "decoherence"
    - "superposition"
    - "quantum_error_correction"
  ai_enhancement: true
  batch_size: 100
  max_concurrent_analyses: 5

ai_agent:
  enabled: true
  model: "gemini-1.5-flash"
  max_conversation_turns: 10
  autonomous_mode: true
  task_categories:
    - "quantum_analysis"
    - "data_processing"
    - "system_optimization"
    - "report_generation"
    - "anomaly_detection"
  safety_checks: true
  human_approval_required: false

voice_integration:
  enabled: true
  speech_recognition:
    language: "ja-JP"
    model: "base"
    real_time: true
  text_to_speech:
    voice: "ja-JP-Neural2-B"
    speed: 1.0
    pitch: 0.0
  safety_controller:
    enabled: true
    content_filtering: true
    emotion_detection: true
    real_time_monitoring: true

image_generation:
  enabled: true
  model: "stable-diffusion-xl"
  quality: "high"
  safety_filters: true
  content_moderation: true
  batch_generation: true
  max_batch_size: 4
  output_formats:
    - "png"
    - "jpg"
    - "webp"
  resolution: "1024x1024"

system_monitoring:
  logging:
    level: "INFO"
    format: "detailed"
    rotation: "daily"
    retention: "30 days"
  metrics:
    collection_interval: 60
    storage_backend: "prometheus"
    visualization: "grafana"
  alerts:
    enabled: true
    notification_channels:
      - "slack"
      - "email"
      - "webhook"

security:
  authentication:
    enabled: true
    method: "api_key"
    rate_limiting: true
    max_requests_per_minute: 100
  authorization:
    role_based_access: true
    default_role: "user"
    admin_roles:
      - "admin"
      - "superuser"
  encryption:
    data_at_rest: true
    data_in_transit: true
    algorithm: "AES-256-GCM"

performance:
  optimization:
    caching: true
    cache_ttl: 3600
    parallel_processing: true
    max_workers: 8
  scaling:
    auto_scaling: true
    min_instances: 1
    max_instances: 10
    target_cpu_utilization: 70

