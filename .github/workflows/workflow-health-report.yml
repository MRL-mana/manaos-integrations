name: Workflow Health Report

on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Generate workflow health summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const workflows = await github.paginate(github.rest.actions.listRepoWorkflows, {
              owner,
              repo,
              per_page: 100,
            });

            const allRuns = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              per_page: 100,
            });

            const latestRunByWorkflow = new Map();
            for (const run of allRuns) {
              if (!latestRunByWorkflow.has(run.workflow_id)) {
                latestRunByWorkflow.set(run.workflow_id, run);
              }
            }

            const rows = [];
            let ok = 0;
            let warn = 0;
            let fail = 0;
            const nonCriticalFailureWorkflows = new Set([
              'Auto Assign Reviewer',
              'Complete CI/CD Pipeline',
              'Docker Build and Push',
            ]);
            const nonActionableWarnWorkflows = new Set([
              'Auto Commit',
              'Workflow Health Report',
            ]);
            for (const wf of workflows) {
              if (wf.state !== 'active') continue;
              const run = latestRunByWorkflow.get(wf.id);
              const status = run ? `${run.status}/${run.conclusion || 'n/a'}` : 'no-runs';
              const branch = run?.head_branch || '-';
              const updated = run?.updated_at || '-';
              let icon = '⚪';
              if (status.includes('completed/success')) {
                icon = '✅';
                ok += 1;
              } else if (status.includes('completed/failure') || status.includes('completed/cancelled')) {
                if (nonCriticalFailureWorkflows.has(wf.name)) {
                  icon = '⚪';
                } else {
                  icon = '❌';
                  fail += 1;
                }
              } else {
                const isTransientNonActionable =
                  status === 'no-runs' ||
                  status.startsWith('in_progress/') ||
                  status.startsWith('queued/') ||
                  status.includes('completed/skipped');
                if (nonActionableWarnWorkflows.has(wf.name) || isTransientNonActionable) {
                  icon = '⚪';
                } else {
                  icon = '🟡';
                  warn += 1;
                }
              }
              rows.push(`| ${icon} ${wf.name} | ${status} | ${branch} | ${updated} | ${wf.path} |`);
            }

            const summary = [
              '## Workflow Health Report',
              '',
              `Generated at: ${new Date().toISOString()}`,
              '',
              `- ✅ Success: ${ok}`,
              `- 🟡 Actionable warnings: ${warn}`,
              `- ❌ Failed/Cancelled: ${fail}`,
              '',
              '| Workflow | Latest Status | Branch | Updated | File |',
              '|---|---|---|---|---|',
              ...rows.sort(),
            ].join('\n');

            core.summary.addRaw(summary).write();
            fs.mkdirSync('artifacts', { recursive: true });
            fs.writeFileSync('artifacts/workflow-health-report.md', `${summary}\n`, 'utf8');

      - name: Upload health report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-health-report
          path: artifacts/workflow-health-report.md
          retention-days: 14

      - name: Notify Slack health summary
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          WORKFLOW: ${{ github.workflow }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path
          import urllib.request

          report = Path('artifacts/workflow-health-report.md').read_text(encoding='utf-8')

          def pick(pattern: str, default: str = 'n/a') -> str:
              match = re.search(pattern, report)
              return match.group(1) if match else default

          success = pick(r'Success:\s*(\d+)')
          warnings = pick(r'Actionable warnings:\s*(\d+)')
          failed = pick(r'Failed/Cancelled:\s*(\d+)')

          repo = os.environ.get('REPO', '')
          ref_name = os.environ.get('REF', '')
          run_id = os.environ.get('RUN_ID', '')
          workflow = os.environ.get('WORKFLOW', '')
          server_url = os.environ.get('SERVER_URL', 'https://github.com')
          webhook = os.environ.get('SLACK_WEBHOOK_URL', '')
          run_url = f"{server_url}/{repo}/actions/runs/{run_id}"

          payload = {
              'text': (
                  f":bar_chart: {workflow} summary\n"
                  f"repo={repo}\nref={ref_name}\n"
                  f"success={success} warnings={warnings} failed={failed}\n"
                  f"run={run_url}"
              )
          }

          req = urllib.request.Request(
              webhook,
              data=json.dumps(payload).encode('utf-8'),
              headers={'Content-Type': 'application/json'},
              method='POST',
          )
          with urllib.request.urlopen(req, timeout=15) as response:
              print(f"slack_notify_status={response.status}")
          PY
