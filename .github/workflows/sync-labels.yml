name: Sync Repository Labels

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - '.github/labels.yml'
      - '.github/workflows/sync-labels.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Sync labels via GitHub API
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          import yaml

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          labels_file = ".github/labels.yml"

          base_url = f"https://api.github.com/repos/{repo}"
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "manaos-label-sync",
          }

          def api_request(method: str, url: str, payload=None):
              body = None
              if payload is not None:
                  body = json.dumps(payload).encode("utf-8")

              req = urllib.request.Request(url, data=body, method=method)
              for key, value in headers.items():
                  req.add_header(key, value)
              if body is not None:
                  req.add_header("Content-Type", "application/json")

              try:
                  with urllib.request.urlopen(req) as response:
                      raw = response.read().decode("utf-8")
                      return response.status, (json.loads(raw) if raw else {})
              except urllib.error.HTTPError as err:
                  raw = err.read().decode("utf-8") if err.fp else ""
                  data = json.loads(raw) if raw else {}
                  return err.code, data

          with open(labels_file, "r", encoding="utf-8") as file:
              labels = yaml.safe_load(file) or []

          created = 0
          updated = 0
          failed = []

          for item in labels:
              name = str(item.get("name", "")).strip()
              color = str(item.get("color", "")).strip().lstrip("#").lower()
              description = str(item.get("description", "")).strip()

              if not name or len(color) != 6:
                  failed.append({"name": name or "(missing)", "reason": "invalid name or color"})
                  continue

              payload = {
                  "name": name,
                  "color": color,
                  "description": description,
              }

              encoded = urllib.parse.quote(name, safe="")
              get_status, _ = api_request("GET", f"{base_url}/labels/{encoded}")

              if get_status == 404:
                  status, data = api_request("POST", f"{base_url}/labels", payload)
                  if status in (200, 201):
                      created += 1
                      print(f"created: {name}")
                  else:
                      failed.append({"name": name, "reason": data})
              elif get_status == 200:
                  status, data = api_request("PATCH", f"{base_url}/labels/{encoded}", payload)
                  if status == 200:
                      updated += 1
                      print(f"updated: {name}")
                  else:
                      failed.append({"name": name, "reason": data})
              else:
                  failed.append({"name": name, "reason": f"GET label returned {get_status}"})

          print(f"summary: created={created}, updated={updated}, failed={len(failed)}")
          if failed:
              print(json.dumps(failed, ensure_ascii=False, indent=2))
              raise SystemExit(1)
          PY
