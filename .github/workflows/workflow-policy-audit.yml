name: Workflow Policy Audit

on:
  push:
    branches: [master, main, develop]
    paths:
      - '.github/workflows/*.yml'
      - 'scripts/audit_workflow_policies.py'
  pull_request:
    branches: [master, main, develop]
    paths:
      - '.github/workflows/*.yml'
      - 'scripts/audit_workflow_policies.py'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run workflow policy audit
        run: python scripts/audit_workflow_policies.py

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-policy-audit
          path: artifacts/workflow-policy-audit.md
          retention-days: 14
