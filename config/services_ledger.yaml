# SINGLE SOURCE OF TRUTH - ポート/URL/有効フラグはここが正

core:
  memory:
    port: 5105
    url: "http://127.0.0.1:5105"
    enabled: true
    depends_on: []

  learning:
    port: 5126
    url: "http://127.0.0.1:5126"
    enabled: true
    module: learning_system_api.py
    start_cmd: "python learning_system_api.py"
