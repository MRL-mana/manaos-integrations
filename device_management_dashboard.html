<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>統合デバイス管理ダッシュボード - ManaOS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 12px;
        }
        
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        
        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }
        
        .summary-card h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        
        .summary-card .value {
            font-size: 32px;
            font-weight: bold;
        }
        
        .devices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .device-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .device-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }
        
        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .device-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
        
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .status-healthy {
            background: #10b981;
            color: white;
        }
        
        .status-warning {
            background: #f59e0b;
            color: white;
        }
        
        .status-critical {
            background: #ef4444;
            color: white;
        }
        
        .status-offline {
            background: #6b7280;
            color: white;
        }
        
        .resource-item {
            margin-bottom: 12px;
        }
        
        .resource-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 14px;
            color: #666;
        }
        
        .resource-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .resource-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        .resource-bar-fill.cpu {
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
        }
        
        .resource-bar-fill.memory {
            background: linear-gradient(90deg, #10b981, #34d399);
        }
        
        .resource-bar-fill.disk {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
        }
        
        .alerts-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e5e7eb;
        }
        
        .alert-item {
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-size: 13px;
        }
        
        .alert-critical {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .alert-warning {
            background: #fef3c7;
            color: #92400e;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }
        
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
        }
        
        .last-update {
            text-align: center;
            color: white;
            margin-top: 24px;
            opacity: 0.8;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 12px;
        }
        
        .refresh-btn:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 統合デバイス管理ダッシュボード</h1>
            <div class="summary" id="summary">
                <!-- サマリーカードがここに動的に追加されます -->
            </div>
            <button class="refresh-btn" onclick="loadDashboard()">🔄 更新</button>
        </div>
        
        <div id="loading" class="loading">
            Loading device status...
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="devices-grid" class="devices-grid" style="display: none;">
            <!-- デバイスカードがここに動的に追加されます -->
        </div>
        
        <div class="last-update" id="last-update"></div>
    </div>
    
    <script>
        const PORTAL_API = 'http://localhost:5108';
        
        async function loadDashboard() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('error').style.display = 'none';
                document.getElementById('devices-grid').style.display = 'none';
                
                const response = await fetch(`${PORTAL_API}/api/devices/status`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                updateDashboard(data);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'none';
                document.getElementById('devices-grid').style.display = 'grid';
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `エラー: ${error.message}`;
                document.getElementById('devices-grid').style.display = 'none';
            }
        }
        
        function updateDashboard(data) {
            // サマリーを更新
            const summary = document.getElementById('summary');
            summary.innerHTML = `
                <div class="summary-card">
                    <h3>総デバイス数</h3>
                    <div class="value">${data.summary.total_devices}</div>
                </div>
                <div class="summary-card">
                    <h3>正常</h3>
                    <div class="value">${data.summary.healthy_devices}</div>
                </div>
                <div class="summary-card">
                    <h3>警告</h3>
                    <div class="value">${data.summary.warning_devices}</div>
                </div>
                <div class="summary-card">
                    <h3>危険</h3>
                    <div class="value">${data.summary.critical_devices}</div>
                </div>
                <div class="summary-card">
                    <h3>オフライン</h3>
                    <div class="value">${data.summary.offline_devices}</div>
                </div>
            `;
            
            // デバイスカードを更新
            const devicesGrid = document.getElementById('devices-grid');
            devicesGrid.innerHTML = data.devices.map(device => {
                const statusClass = `status-${device.status}`;
                const uptimeHours = Math.floor(device.uptime_seconds / 3600);
                const uptimeMinutes = Math.floor((device.uptime_seconds % 3600) / 60);
                
                return `
                    <div class="device-card">
                        <div class="device-header">
                            <div class="device-name">${device.device_name}</div>
                            <div class="status-badge ${statusClass}">${device.status}</div>
                        </div>
                        <div class="resource-item">
                            <div class="resource-label">
                                <span>CPU</span>
                                <span>${device.cpu_percent.toFixed(1)}%</span>
                            </div>
                            <div class="resource-bar">
                                <div class="resource-bar-fill cpu" style="width: ${device.cpu_percent}%"></div>
                            </div>
                        </div>
                        <div class="resource-item">
                            <div class="resource-label">
                                <span>メモリ</span>
                                <span>${device.memory_percent.toFixed(1)}%</span>
                            </div>
                            <div class="resource-bar">
                                <div class="resource-bar-fill memory" style="width: ${device.memory_percent}%"></div>
                            </div>
                        </div>
                        <div class="resource-item">
                            <div class="resource-label">
                                <span>ディスク</span>
                                <span>${device.disk_percent.toFixed(1)}%</span>
                            </div>
                            <div class="resource-bar">
                                <div class="resource-bar-fill disk" style="width: ${device.disk_percent}%"></div>
                            </div>
                        </div>
                        <div style="margin-top: 12px; font-size: 13px; color: #666;">
                            <div>ネットワーク送信: ${device.network_sent_mb.toFixed(2)} MB</div>
                            <div>ネットワーク受信: ${device.network_recv_mb.toFixed(2)} MB</div>
                            <div>稼働時間: ${uptimeHours}時間 ${uptimeMinutes}分</div>
                        </div>
                        ${device.alerts && device.alerts.length > 0 ? `
                            <div class="alerts-section">
                                <strong>アラート:</strong>
                                ${device.alerts.map(alert => {
                                    const alertClass = device.status === 'critical' ? 'alert-critical' : 'alert-warning';
                                    return `<div class="alert-item ${alertClass}">${alert}</div>`;
                                }).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
            
            // 最終更新時刻を更新
            const lastUpdate = new Date(data.timestamp);
            document.getElementById('last-update').textContent = 
                `最終更新: ${lastUpdate.toLocaleString('ja-JP')}`;
        }
        
        // 初回読み込み
        loadDashboard();
        
        // 30秒ごとに自動更新
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
