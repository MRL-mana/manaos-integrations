name: PR Description Check

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  issues: write

jobs:
  validate-description:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check PR description structure
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = pr.number;
            const body = (pr.body || '').toLowerCase();

            const required = [
              '## summary',
              '## validation',
              '## risk / rollback',
            ];

            const missing = required.filter(section => !body.includes(section));

            const labels = await github.paginate(github.rest.issues.listLabelsOnIssue, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const hasNeedsInfo = labels.some(l => l.name === 'needs-info');

            if (missing.length > 0) {
              if (!hasNeedsInfo) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: ['needs-info'],
                });
              }

              const marker = '<!-- pr-description-check -->';
              const commentBody = `${marker}\nPR本文に不足があります。以下を追加してください:\n\n${missing.map(m => `- ${m}`).join('\n')}`;

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              });
              const previous = comments.find(c => c.body && c.body.includes(marker));

              if (previous) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: previous.id,
                  body: commentBody,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body: commentBody,
                });
              }
              return;
            }

            if (hasNeedsInfo) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name: 'needs-info' });
              } catch (e) {}
            }
