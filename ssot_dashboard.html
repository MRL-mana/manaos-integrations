<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManaOS SSOT Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .summary-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .summary-card h3 {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        
        .summary-card .value {
            font-size: 2em;
            font-weight: bold;
        }
        
        .summary-card.up .value {
            color: #50C878;
        }
        
        .summary-card.down .value {
            color: #FF6B6B;
        }
        
        .services-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }
        
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .service-card {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .service-card.up {
            border-left-color: #50C878;
        }
        
        .service-card.down {
            border-left-color: #FF6B6B;
        }
        
        .service-card.unhealthy {
            border-left-color: #FFB347;
        }
        
        .service-card h4 {
            margin-bottom: 5px;
        }
        
        .service-card .meta {
            font-size: 0.85em;
            color: #666;
        }
        
        .system-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }
        
        .resource-item {
            margin-bottom: 15px;
        }
        
        .resource-label {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .resource-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .resource-bar-fill {
            height: 100%;
            transition: width 0.3s;
            border-radius: 10px;
        }
        
        .resource-bar-fill.cpu {
            background: linear-gradient(90deg, #50C878 0%, #FFB347 50%, #FF6B6B 100%);
        }
        
        .resource-bar-fill.ram {
            background: linear-gradient(90deg, #50C878 0%, #FFB347 50%, #FF6B6B 100%);
        }
        
        .resource-bar-fill.disk {
            background: linear-gradient(90deg, #50C878 0%, #FFB347 50%, #FF6B6B 100%);
        }
        
        .recent-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }
        
        .input-item {
            padding: 10px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 5px;
            border-left: 3px solid #667eea;
        }
        
        .error-section {
            background: #fff3cd;
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid #ffc107;
            margin-bottom: 20px;
        }
        
        .error-section h3 {
            color: #856404;
            margin-bottom: 10px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }
        
        .last-update {
            text-align: center;
            color: white;
            margin-top: 20px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 ManaOS SSOT Dashboard</h1>
            <div id="timestamp" class="last-update"></div>
        </div>
        
        <div id="loading" class="loading">
            Loading SSOT data...
        </div>
        
        <div id="content" style="display: none;">
            <div class="summary-grid" id="summary-grid"></div>
            
            <div id="error-section" class="error-section" style="display: none;"></div>
            
            <div class="services-section">
                <h2>Services Status</h2>
                <div class="services-grid" id="services-grid"></div>
            </div>
            
            <div class="system-section">
                <h2>System Resources</h2>
                <div id="system-resources"></div>
            </div>
            
            <div class="recent-section">
                <h2>Recent Inputs</h2>
                <div id="recent-inputs"></div>
            </div>
        </div>
    </div>
    
    <script>
        const SSOT_API = 'http://localhost:5120';
        
        async function loadSSOT() {
            try {
                const response = await fetch(`${SSOT_API}/api/ssot`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                updateDashboard(data);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (error) {
                document.getElementById('loading').textContent = `Error: ${error.message}`;
            }
        }
        
        function updateDashboard(data) {
            // Timestamp
            document.getElementById('timestamp').textContent = 
                `Last update: ${new Date(data.timestamp).toLocaleString()}`;
            
            // Summary
            const summary = data.summary;
            const summaryGrid = document.getElementById('summary-grid');
            summaryGrid.innerHTML = `
                <div class="summary-card up">
                    <h3>Up Services</h3>
                    <div class="value">${summary.up}</div>
                </div>
                <div class="summary-card down">
                    <h3>Down Services</h3>
                    <div class="value">${summary.down}</div>
                </div>
                <div class="summary-card">
                    <h3>Total Services</h3>
                    <div class="value">${summary.total_services}</div>
                </div>
                <div class="summary-card">
                    <h3>Active Tasks</h3>
                    <div class="value">${data.active_tasks.running}</div>
                </div>
            `;
            
            // Error section
            if (data.last_error) {
                const errorSection = document.getElementById('error-section');
                errorSection.style.display = 'block';
                errorSection.innerHTML = `
                    <h3>⚠️ Last Error</h3>
                    <p><strong>Service:</strong> ${data.last_error.service_name || 'Unknown'}</p>
                    <p><strong>Error:</strong> ${data.last_error.error_message || 'Unknown'}</p>
                    <p><strong>Time:</strong> ${new Date(data.last_error.timestamp || '').toLocaleString()}</p>
                `;
            }
            
            // Services
            const servicesGrid = document.getElementById('services-grid');
            servicesGrid.innerHTML = data.services.map(service => {
                const statusClass = service.status === 'up' ? 'up' : 
                                   service.status === 'down' ? 'down' : 'unhealthy';
                return `
                    <div class="service-card ${statusClass}">
                        <h4>${service.name}</h4>
                        <div class="meta">
                            Port: ${service.port} | 
                            Status: ${service.status.toUpperCase()}
                            ${service.pid ? ` | PID: ${service.pid}` : ''}
                            ${service.response_time_ms ? ` | ${service.response_time_ms}ms` : ''}
                        </div>
                    </div>
                `;
            }).join('');
            
            // System resources
            const system = data.system;
            const systemDiv = document.getElementById('system-resources');
            systemDiv.innerHTML = `
                <div class="resource-item">
                    <div class="resource-label">CPU: ${system.cpu?.percent || 0}%</div>
                    <div class="resource-bar">
                        <div class="resource-bar-fill cpu" style="width: ${system.cpu?.percent || 0}%"></div>
                    </div>
                </div>
                <div class="resource-item">
                    <div class="resource-label">RAM: ${system.ram?.used_gb || 0}GB / ${system.ram?.total_gb || 0}GB (${system.ram?.percent || 0}%)</div>
                    <div class="resource-bar">
                        <div class="resource-bar-fill ram" style="width: ${system.ram?.percent || 0}%"></div>
                    </div>
                </div>
                ${system.gpu ? `
                <div class="resource-item">
                    <div class="resource-label">GPU: ${system.gpu.utilization}% (${system.gpu.memory_used_mb}MB / ${system.gpu.memory_total_mb}MB)</div>
                    <div class="resource-bar">
                        <div class="resource-bar-fill cpu" style="width: ${system.gpu.utilization}%"></div>
                    </div>
                </div>
                ` : ''}
                <div class="resource-item">
                    <div class="resource-label">Disk: ${system.disk?.used_gb || 0}GB / ${system.disk?.total_gb || 0}GB (${system.disk?.percent || 0}%)</div>
                    <div class="resource-bar">
                        <div class="resource-bar-fill disk" style="width: ${system.disk?.percent || 0}%"></div>
                    </div>
                </div>
            `;
            
            // Recent inputs
            const recentInputsDiv = document.getElementById('recent-inputs');
            if (data.recent_inputs && data.recent_inputs.length > 0) {
                recentInputsDiv.innerHTML = data.recent_inputs.map(input => `
                    <div class="input-item">
                        <strong>${input.text || 'Unknown'}</strong><br>
                        <small>${input.intent_type || 'unknown'} | ${input.status || 'unknown'} | ${new Date(input.timestamp || '').toLocaleString()}</small>
                    </div>
                `).join('');
            } else {
                recentInputsDiv.innerHTML = '<p>No recent inputs</p>';
            }
        }
        
        // Initial load
        loadSSOT();
        
        // Auto refresh every 5 seconds
        setInterval(loadSSOT, 5000);
    </script>
</body>
</html>
