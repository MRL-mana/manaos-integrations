services:
  runpod-mcp:
    build:
      context: /root/manaos_unified_system
      dockerfile: mcp/Dockerfile
    container_name: runpod-mcp-server
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
    - /root/.mana_vault:/root/.mana_vault:ro
    - /root/logs/runpod_mcp:/app/logs
    environment:
    - PYTHONPATH=/app
    - PYTHONUNBUFFERED=1
    - TZ=Asia/Tokyo
    - BRAVE_API_KEY=demo_brave_key_12345
    networks:
    - runpod-mcp-network
    healthcheck:
      test:
      - CMD-SHELL
      - python -c "import sys; data=open('/proc/1/cmdline','rb').read().decode(errors='ignore');
        sys.exit(0 if 'runpod_mcp_server.py' in data else 1)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
networks:
  runpod-mcp-network:
    driver: bridge
    name: runpod-mcp-network
