version: 1
quests:
  - id: snapshot
    label: 状態スナップショット更新
    kind: api
    endpoint: /api/snapshot
    tags: [ops]

  - id: health
    label: Backend Health確認
    kind: api
    endpoint: /health
    tags: [ops]

  - id: run_quick_verify
    label: ローカル簡易検証を実行
    kind: action
    action_id: quick_verify_local
    tags: [ops]

  - id: run_pixel7_doctor
    label: Pixel7 ADB診断を実行
    kind: action
    action_id: pixel7_doctor
    tags: [device]

  - id: run_comfyui_start
    label: ComfyUI 起動
    kind: action
    action_id: comfyui_start
    tags: [ai, image]

  - id: run_comfyui_restart
    label: ComfyUI 再起動
    kind: action
    action_id: comfyui_restart
    tags: [ai, image]

  - id: run_unified_proxy_sync
    label: Unified allowlist 同期（OpenAPI→台帳）
    kind: action
    action_id: unified_proxy_sync
    tags: [ops]

  - id: run_unified_proxy_disable_404
    label: Unified allowlist 404自動無効化（台帳掃除）
    kind: action
    action_id: unified_proxy_disable_404
    tags: [ops]

  - id: run_unified_proxy_enable_core_read
    label: Unified allowlist コアread有効化（安全なGETのみ）
    kind: action
    action_id: unified_proxy_enable_core_read
    tags: [ops]

  - id: run_unified_proxy_enable_read_exists
    label: Unified allowlist 実在read自動有効化（GET probe）
    kind: action
    action_id: unified_proxy_enable_read_exists
    tags: [ops]

  - id: run_mrl_memory_write_on_full
    label: mrl-memory 書き込みON（full）
    kind: action
    action_id: mrl_memory_write_on_full
    tags: [memory, ops]

  - id: run_mrl_memory_write_off
    label: mrl-memory 書き込みOFF（readonly）
    kind: action
    action_id: mrl_memory_write_off
    tags: [memory, ops]
