version: 1
services:
  - id: unified_api_server
    name: Unified API Server
    kind: port
    port: 9502
    health_url: http://127.0.0.1:9502/health
    tags: [core, always_on]
    depends_on: []

  - id: open_webui
    name: Open WebUI
    kind: docker
    container: open-webui
    port: 3000
    tags: [ui, chat]
    depends_on: []

  - id: n8n
    name: n8n
    kind: docker
    container: n8n
    port: 5678
    tags: [automation]
    depends_on: []
