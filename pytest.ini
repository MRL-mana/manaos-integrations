# pytest設定ファイル
[pytest]

# 非同期テストサポート（pytest-asyncio）
asyncio_mode = auto

# テストディレクトリ
testpaths = tests

# Python パス設定
pythonpath = .
             scripts/misc
             scripts/cursor
             scripts/gpu
             scripts/github
             scripts/run

# テストパターン
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 出力設定
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    --maxfail=3

# マーカー定義
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (db, api connections)
    e2e: End-to-end tests (full system)
    performance: Performance and load tests
    slow: Slow running tests
    gpu: Tests requiring GPU
    llm: Tests requiring LLM models
    external: Tests requiring external services
    
# タイムアウト設定
timeout = 300

# カバレッジ除外
[coverage:run]
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */env/*
    .venv/*
    */migrations/*
    */node_modules/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
