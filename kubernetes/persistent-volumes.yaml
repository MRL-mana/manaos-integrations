# Persistent Volume Claims for ManaOS Services

# Unified API
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: unified-api-data-pvc
  namespace: manaos
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: unified-api-logs-pvc
  namespace: manaos
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi

