apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: manaos-ingress
  namespace: manaos
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  tls:
  - hosts:
    - api.manaos.example.com
    - grafana.manaos.example.com
    - prometheus.manaos.example.com
    secretName: manaos-tls-cert
  rules:
  - host: api.manaos.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: unified-api
            port:
              number: 9502
  - host: grafana.manaos.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
  - host: prometheus.manaos.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prometheus
            port:
              number: 9090
