name: Workflow Policy Audit

on:
  push:
    branches: [master, main, develop]
    paths:
      - '.github/workflows/*.yml'
      - '.github/required-status-checks.json'
      - 'scripts/audit_workflow_policies.py'
      - 'scripts/audit_required_status_checks.py'
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      - name: Run workflow policy audit
        run: python scripts/audit_workflow_policies.py

      - name: Run required status checks audit
        run: python scripts/audit_required_status_checks.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-policy-audit
          path: |
            artifacts/workflow-policy-audit.md
            artifacts/required-checks-audit.md
          retention-days: 14
