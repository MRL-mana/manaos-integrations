# データ変換のサンプルYAML

# 例1: CSVからJSONへ変換
kind: data_transform
action: convert
input_file: "data/raw.csv"
output_file: "data/processed.json"
input_format: "csv"
output_format: "json"
transformation:
  - type: "sort"
    columns: ["date"]
    ascending: true
notify:
  slack: false
idempotency_key: "data_transform_2026-01-13_001"

