name: Auto Assign Reviewer

on:
  pull_request_target:
    types: [opened, ready_for_review, reopened]

permissions:
  pull-requests: write

jobs:
  add-reviewers:
    runs-on: ubuntu-latest
    steps:
      - name: Auto assign reviewer
        uses: kentaro-m/auto-assign-action@v2.0.1
        with:
          configuration-path: .github/auto_assign.yml
