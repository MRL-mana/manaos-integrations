name: PR Size Label

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  size-label:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Label PR by size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            const changed = (pr.additions || 0) + (pr.deletions || 0);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = pr.number;

            const sizeLabels = ['size/XS', 'size/S', 'size/M', 'size/L', 'size/XL'];
            let target = 'size/XS';
            if (changed > 1000) target = 'size/XL';
            else if (changed > 500) target = 'size/L';
            else if (changed > 200) target = 'size/M';
            else if (changed > 50) target = 'size/S';

            const labelsToAdd = [target];
            if (changed > 1000) labelsToAdd.push('needs-splitting');

            const current = await github.paginate(github.rest.issues.listLabelsOnIssue, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const currentNames = current.map(l => l.name);

            for (const oldLabel of sizeLabels) {
              if (oldLabel !== target && currentNames.includes(oldLabel)) {
                try {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number, name: oldLabel });
                } catch (e) {}
              }
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: labelsToAdd,
            });
