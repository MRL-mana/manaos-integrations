      - COMFYUI_URL=${COMFYUI_URL:-http://host.docker.internal:8188}
      - UNIFIED_API_URL=${MANAOS_API_URL:-http://host.docker.internal:9502}
      - GALLERY_API_URL=http://gallery-api:5559
      - IMAGE_SERVICE_PORT=5560
    volumes:
