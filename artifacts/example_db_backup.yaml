# データベースバックアップのサンプルYAML

# 例1: PostgreSQLバックアップ
kind: db_backup
action: backup
database_type: postgresql
database_name: "myapp"
backup_path: "backups/db_backup_2026-01-13.sql"
compress: true
notify:
  slack: false
idempotency_key: "db_backup_2026-01-13"

