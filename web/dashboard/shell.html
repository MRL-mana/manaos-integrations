// ── /tier ビジュアルカード ────────────────────────────────────────────────
async function sendTierCard(label) {
  appendUser(label || "/tier");
  const thinkingEl = appendThinking();
  try {
    const hdrs = { "Content-Type": "application/json" };
    const key = apiKeyEl.value.trim();
    if (key) hdrs["X-API-Key"] = key;
    const r = await fetch("/api/shell/run", {
      method: "POST", headers: hdrs,
      body: JSON.stringify({ command: "tier", args: [] })
    });
    const d = await r.json();
    const output = (d.output || "").trim();
    // テキストをパース: "Tier N: svc_name [UP/DOWN]" 形式
    const tierMap = {};
    output.split("\n").forEach(line => {
      const m = line.match(/Tier\s*(\d)/i);
      const tier = m ? m[1] : "?";
      if (!tierMap[tier]) tierMap[tier] = [];
      // サービス名と状態をざっくり取得
      const okMark  = /✓|UP|up|ok|\[up\]/i.test(line) && !/DOWN|fail/i.test(line);
      const downMark= /✗|DOWN|down|fail|\[down\]/i.test(line);
      const name = line.replace(/Tier\s*\d[\s:–-]*/i, "").replace(/\s*(✓|✗|UP|DOWN|FAIL|OK)\s*/gi, "").trim();
      if (name) tierMap[tier].push({ name, ok: okMark, down: downMark, raw: line });
    });
    const tiers = Object.keys(tierMap).sort();
    if (!tiers.length || !output) {
      // フォールバック: raw 表示
      const el = document.createElement("div");
      el.className = "msg agent";
      el.innerHTML = `<div class="avatar">OS</div><div class="bubble"><div class="report-section"><h4 style="font-size:12px;margin:0 0 6px">📊 Tier</h4><pre style="font-size:10px;white-space:pre-wrap">${escHtml(output.slice(0,2000))}</pre></div>${ts()}</div>`;
      thinkingEl.replaceWith(el); scrollEnd(); return;
    }
    const tiersSections = tiers.map(t => {
      const items = tierMap[t];
      const rows = items.map(it => {
        const col = it.down ? "var(--fail)" : it.ok ? "var(--ok)" : "var(--muted)";
        const icon = it.down ? "✗" : it.ok ? "●" : "○";
        return `<div style="font-size:11px;color:${col};padding:1px 0">${icon} ${escHtml(it.raw.replace(/Tier\s*\d[\s:–-]*/i,"").trim().slice(0,60))}</div>`;
      }).join("");
      const downCount = items.filter(i => i.down).length;
      const okCount   = items.filter(i => i.ok).length;
      const hCol = downCount ? "var(--fail)" : "var(--ok)";
      return `<div style="margin-bottom:8px">
        <div style="font-size:11px;font-weight:700;color:${hCol};margin-bottom:3px">Tier ${escHtml(t)} <span style="font-weight:400;color:var(--muted);font-size:10px">↑${okCount} ↓${downCount}</span></div>
        ${rows}
      </div>`;
    }).join("");
    const html = `<div class="report-section"><h4 style="font-size:12px;margin:0 0 8px">📊 Tier 一覧</h4>${tiersSections}</div>`;
    const el = document.createElement("div");
    el.className = "msg agent";
    el.innerHTML = `<div class="avatar">OS</div><div class="bubble">${html}${ts()}</div>`;
    thinkingEl.replaceWith(el); scrollEnd();
  } catch(e) {
    replaceThinking(thinkingEl, { status: "dispatch_error", error: String(e) });
  }
}

// ── /startup tier順起動進捗カード ───────────────────────────────────────
async function sendStartupCard(label) {
  appendUser(label || "/startup");
  const thinkingEl = appendThinking();
  try {
    const hdrs = { "Content-Type": "application/json" };
    const key = apiKeyEl.value.trim();
    if (key) hdrs["X-API-Key"] = key;
    const post = (cmd, args) => fetch("/api/shell/run", {
      method: "POST", headers: hdrs, body: JSON.stringify({ command: cmd, args })
    }).then(r => r.json());

    // Step1: tier構造取得
    const dt = await post("tier", []);
    const tierOut = (dt.output || "").trim();
    // tier→[svc,...] マップ構築
    const tierSvcMap = {};
    let curTier = "?";
    tierOut.split("\n").forEach(line => {
      const tm = line.match(/Tier\s*(\d)/i);
      if (tm) { curTier = tm[1]; if (!tierSvcMap[curTier]) tierSvcMap[curTier] = []; return; }
      const nm = line.match(/\b([a-z][a-z0-9_-]{2,30})\b/g);
      if (nm && curTier !== "?") nm.forEach(n => {
        if (!tierSvcMap[curTier]) tierSvcMap[curTier] = [];
        if (!tierSvcMap[curTier].includes(n)) tierSvcMap[curTier].push(n);
      });
    });

    // Step2: up --all
    const d1 = await post("up", ["--all"]);
    const output1 = (d1.output || "").trim();
    const lines1 = output1.split("\n").filter(Boolean);
    // サービス名→状態マップ
    const svcStatus = {};
    lines1.forEach(l => {
      const isFail = /fail|error/i.test(l);
      const isSkip = /skip|already|disabled/i.test(l);
      const isOk   = !isFail && !isSkip && /start|起動|running|OK|\[up\]/i.test(l);
      const nm = l.match(/\b([a-z][a-z0-9_-]{2,30})\b/g);
      if (nm) nm.forEach(n => { if (!svcStatus[n]) svcStatus[n] = isFail ? "fail" : isSkip ? "skip" : isOk ? "ok" : "unknown"; });
    });

    // Tier グループ別 HTML 生成
    const hasTiers = Object.keys(tierSvcMap).length > 0;
    let bodyHtml = "";
    if (hasTiers) {
      bodyHtml = Object.keys(tierSvcMap).sort().map(t => {
        const svcs = [...new Set(tierSvcMap[t])].filter(s => s.length > 2);
        const rows = svcs.map(s => {
          const st = svcStatus[s];
          if (!st || st === "unknown") return "";
          const col  = st === "fail" ? "var(--fail)" : st === "skip" ? "var(--muted)" : "var(--ok)";
          const icon = st === "fail" ? "✗" : st === "skip" ? "−" : "↑";
          return `<div style="font-size:11px;color:${col};padding:1px 0">${icon} ${escHtml(s)}</div>`;
        }).filter(Boolean).join("");
        if (!rows) return "";
        const fc = svcs.some(s => svcStatus[s] === "fail") ? "var(--fail)" : "var(--muted)";
        return `<div style="margin-bottom:7px"><div style="font-size:10px;font-weight:600;color:${fc};margin-bottom:2px;letter-spacing:.05em">TIER ${escHtml(t)}</div>${rows}</div>`;
      }).filter(Boolean).join("");
    }
    // フォールバック: 分類行をフラット表示
    if (!bodyHtml.trim()) {
      const okL   = lines1.filter(l => /start|起動|running|OK/i.test(l) && !/fail|error|skip/i.test(l));
      const skipL = lines1.filter(l => /skip|already|disabled/i.test(l));
      const failL = lines1.filter(l => /fail|error/i.test(l));
      bodyHtml = [
        ...failL.map(l  => `<div style="font-size:11px;color:var(--fail)">✗ ${escHtml(l.trim())}</div>`),
        ...okL.map(l   => `<div style="font-size:11px;color:var(--ok)">↑ ${escHtml(l.trim())}</div>`),
        ...skipL.map(l => `<div style="font-size:11px;color:var(--muted)">− ${escHtml(l.trim())}</div>`),
      ].join("") || `<pre style="font-size:10px;white-space:pre-wrap;max-height:120px;overflow-y:auto">${escHtml(output1.slice(0,600))}</pre>`;
    }

    // Step3: status
    await new Promise(r => setTimeout(r, 1500));
    const d2 = await post("status", []);
    const statusOut = (d2.output || "").trim();
    const colorExit = d1.exit_code === 0 ? "var(--ok)" : "var(--warn)";
    const html = `<div class="report-section">
      <h4 style="font-size:12px;margin:0 0 6px;color:${colorExit}">🚀 Startup — exit ${d1.exit_code}</h4>
      ${bodyHtml}
      ${statusOut ? `<pre style="font-size:10px;max-height:150px;overflow-y:auto;white-space:pre-wrap;margin-top:6px;padding-top:6px;border-top:1px solid var(--line2)">${escHtml(statusOut.slice(0,900))}</pre>` : ""}
    </div>`;
    const el = document.createElement("div");
    el.className = "msg agent";
    el.innerHTML = `<div class="avatar">OS</div><div class="bubble">${html}${ts()}</div>`;
    thinkingEl.replaceWith(el);
    scrollEnd();
    setTimeout(loadServices, 800);
  } catch(e) {
    replaceThinking(thinkingEl, { status: "dispatch_error", error: String(e) });
  }
}

          const col = evColors[e.event] || "var(--muted)";
          return `<div style="font-size:10px;color:${col}">${escHtml(e.time)} ${escHtml(e.event)}${e.service?" "+escHtml(e.service):""}</div>`;
        }).join("")}

    const html = `<div class="report-section">

      ${svcLine}${downRows}${gtdLine}${evRows}
    </div>`;
    const el = document.createElement("div");
    el.className = "msg agent";
    el.innerHTML = `<div class="avatar">OS</div><div class="bubble">${html}${ts()}</div>`;
    thinkingEl.replaceWith(el);
    scrollEnd();
  } catch(e) {
    replaceThinking(thinkingEl, { status: "dispatch_error", error: String(e) });
  }
}

// ── Direct manaosctl runner ──────────────────────────────────────────────
async function sendSvcCard(svcName, label) {
  appendUser(label || `/status ${svcName}`);
  const thinkingEl = appendThinking();
  try {
    const r = await fetch(`/api/shell/service/${encodeURIComponent(svcName)}`);
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      replaceThinking(thinkingEl, { status: "dispatch_error", error: j.error || `HTTP ${r.status}` });
      return;
    }
    const d = await r.json();
    const isUp   = d.summary === "OK";
    const hBadge = isUp
      ? `<span class="svc-badge up" style="font-size:10px">🟢 UP</span>`
      : `<span class="svc-badge down" style="font-size:10px">🔴 ${escHtml(d.summary)}</span>`;
    const tierBadge = d.tier != null
      ? `<span style="font-size:10px;color:var(--muted);border:1px solid var(--line2);border-radius:3px;padding:0 4px">T${d.tier}</span>` : "";
    const portBadge = d.port
      ? `<span style="font-size:10px;color:var(--accent)">:${d.port}</span>` : "";
    const secBadge = d.section
      ? `<span style="font-size:10px;color:var(--muted)">${escHtml(d.section)}</span>` : "";
    const deps = (d.depends_on || []).length
      ? `<div style="margin-top:4px;font-size:10px;color:var(--muted)">依存: ${d.depends_on.map(x => `<span style="color:var(--accent)">${escHtml(x)}</span>`).join(", ")}</div>` : "";
    const hint = (!isUp && d.recovery_hint)
      ? `<div style="margin-top:4px;font-size:10px;color:var(--warn);border-left:2px solid var(--warn);padding-left:6px">💡 ${escHtml(d.recovery_hint)}</div>` : "";
    const blast = (!isUp && d.blast_note)
      ? `<div style="margin-top:4px;font-size:10px;color:var(--fail)">⚠️ ${escHtml(d.blast_note)}</div>` : "";
    const desc  = d.description ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">${escHtml(d.description)}</div>` : "";
    const startCmd = d.start_cmd ? `<div style="font-size:10px;color:var(--muted);margin-top:4px;font-family:monospace">▶ ${escHtml(d.start_cmd)}</div>` : "";
    const actBtns = `<div style="margin-top:6px;display:flex;gap:6px">
      <button onclick="msgInput.value='/logs ${escHtml(svcName)}';send()" style="font-size:10px;padding:2px 7px;border:1px solid var(--line2);background:none;color:var(--fg);border-radius:3px;cursor:pointer">📄 ログ</button>
      <button onclick="msgInput.value='/restart ${escHtml(svcName)}';send()" style="font-size:10px;padding:2px 7px;border:1px solid var(--line2);background:none;color:var(--fg);border-radius:3px;cursor:pointer">🔄 再起動</button>
      ${!isUp ? `<button onclick="msgInput.value='/up ${escHtml(svcName)}';send()" style="font-size:10px;padding:2px 7px;border:1px solid var(--ok);background:none;color:var(--ok);border-radius:3px;cursor:pointer">▶ 起動</button>` : ""}
    </div>`;
    const html = `<div class="report-section" style="min-width:220px">
      <h4 style="display:flex;align-items:center;gap:6px;font-size:12px;margin:0 0 4px">
        ${hBadge} <strong>${escHtml(d.name)}</strong> ${portBadge} ${tierBadge} ${secBadge}
      </h4>
      ${desc}${deps}${hint}${blast}${startCmd}${actBtns}
    </div>`;
    const el = document.createElement("div");
    el.className = "msg agent";
    el.innerHTML = `<div class="avatar">OS</div><div class="bubble">${html}${ts()}</div>`;
    thinkingEl.replaceWith(el);
    scrollEnd();
  } catch(e) {
    replaceThinking(thinkingEl, { status: "dispatch_error", error: String(e) });
  }
}

async function sendShellRun(command, args, label) {
  appendUser(label);
  const thinkingEl = appendThinking();
  const apiKey = apiKeyEl.value.trim();
  const headers = { "Content-Type": "application/json" };
  if (apiKey) headers["X-API-Key"] = apiKey;
  try {
    const resp = await fetch("/api/shell/run", {
      method: "POST",
      headers,
      body: JSON.stringify({ command, args }),
    });
    let data;
    try { data = await resp.json(); }
    catch { data = { status: "error", output: await resp.text(), exit_code: -1 }; }
    const ok = (data.status === "ok");
    const cmdLabel = command + (args.length ? " " + args.join(" ") : "");
    const el = document.createElement("div");
    el.className = "msg agent";
    el.innerHTML = `
      <div class="avatar">OS</div>
      <div class="bubble">
        <div style="margin-bottom:4px">
          <span class="intent-tag ${ok ? "tag-run_ok" : "tag-run_err"}">${ok ? "RUN OK" : "RUN ERR"}</span>
          <span style="font-size:11px;color:var(--muted);margin-left:4px;font-family:monospace">${escHtml(cmdLabel)}</span>
        </div>
        <pre class="result-block" style="white-space:pre-wrap;word-break:break-all;max-height:400px;overflow-y:auto">${escHtml(data.output || "(no output)")}</pre>
        ${ts()}
      </div>`;
    thinkingEl.replaceWith(el);
    scrollEnd();
    saveMsg("agent", `[${cmdLabel}]\n` + (data.output || ""));
  } catch (err) {
    const el = document.createElement("div");
    el.className = "msg agent";
    el.innerHTML = `<div class="avatar">OS</div><div class="bubble" style="color:var(--fail)">${escHtml(String(err))}${ts()}</div>`;
    thinkingEl.replaceWith(el);
    scrollEnd();
  }
}

// ── GTD Capture (direct POST to port 5130, fallback to unified_api) ────────
async function sendGtdCapture(text, label, context, due) {
  appendUser(label);
  const thinkingEl = appendThinking();
  const payloadObj = { text, source: "shell", type: "inbox" };
  if (context) payloadObj.context = context;
  if (due)     payloadObj.due     = due;
  const payload = JSON.stringify(payloadObj);
  async function _post(url) {
    return await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: payload,
    });
  }
  try {
    let resp, via = "direct";
    try {
      resp = await _post("http://127.0.0.1:5130/api/gtd/capture");
      if (!resp.ok && resp.status === 0) throw new Error("unreachable");
    } catch (_) {
      via = "unified_api";
      resp = await _post("/api/gtd/capture");
    }
    const data = await resp.json().catch(() => ({ status: "error" }));
    const ok = resp.ok;
    const proxyNote = via === "unified_api" ? " <small style='opacity:.6'>via proxy</small>" : "";
    const el = document.createElement("div");
    el.className = "msg agent";
    el.innerHTML = `
      <div class="avatar">OS</div>
      <div class="bubble">
        <div style="margin-bottom:4px"><span class="intent-tag ${ok ? "tag-run_ok" : "tag-run_err"}">${ok ? "GTD SAVED" : "GTD ERR"}</span>${proxyNote}</div>
        <pre class="result-block">${escHtml(ok ? "\u2705 Inbox \u4fdd\u5b58: " + (data.file || text) : JSON.stringify(data, null, 2))}</pre>
        ${ts()}
      </div>`;
    thinkingEl.replaceWith(el);
    scrollEnd();
    saveMsg("agent", ok ? "[GTD] " + text : "[GTD ERR]");
  } catch (err) {
    const el = document.createElement("div");
    el.className = "msg agent";
    el.innerHTML = `<div class="avatar">OS</div><div class="bubble" style="color:var(--fail)">GTD Capture Server DOWN (port 5130 + unified_api)<br>${escHtml(String(err))}${ts()}</div>`;
    thinkingEl.replaceWith(el);
    scrollEnd();
  }
}

// ── Main send dispatcher ───────────────────────────────────────────────────
async function send() {
  if (busy) return;
  let message = msgInput.value.trim();
  if (!message) return;
  msgInput.value = "";

  // ── Slash command shortcuts ───────────────────────────────────────────
  if (message.startsWith("/")) {
    const parts = message.slice(1).trim().split(/\s+/);
    const cmd = parts[0].toLowerCase();
    const arg = parts.slice(1).join(" ");
    if (cmd === "clear") { clearStorage(); return; }
    if (cmd === "services" || cmd === "svc") { loadServices(); return; }
    if (cmd === "help" || cmd === "?") { showHelp(); return; }

    // ── Direct manaosctl shortcuts ──────────────────────────────────────
    if (cmd === "deps") {
      const runArgs = arg ? ["--tree", arg] : ["--tree"];
      await sendShellRun("deps", runArgs, message); return;
    }
    if (cmd === "events") {
      let runArgs = [];
      if (arg) {
        if (/^\d+$/.test(arg)) runArgs = ["-n", arg];
        else                    runArgs = ["--filter", arg];
      }
      await sendShellRun("events", runArgs, message); return;
    }
    if (cmd === "tier")      { await sendTierCard(message); return; }
    if (cmd === "watch")     { await sendShellRun("watch",     [], message); return; }
    if (cmd === "report")    { await sendReportCard(message); return; }
    if (cmd === "cost")      { await sendCostCard(message); return; }
    if (cmd === "dashboard") { await sendShellRun("dashboard", [], message); return; }
    // GTD slash commands
    if (cmd === "memo") {
      // 引数なし → インラインキャプチャフォームを表示
      if (!arg) { sendCaptureForm("", label || message); return; }
      // --to <dest> が含まれる場合は gtd capture --to で直接振り分け
      const toMatch = arg.match(/--to\s+(\S+)/i);
      if (toMatch) {
        const toVal  = toMatch[1].toLowerCase();
        const cleanT = arg.replace(/--to\s+\S+/i, "").trim();
        if (!cleanT) { appendAgent("<span style='color:var(--fail)'>/memo --to にはテキストも必要です</span>"); return; }
        const capArgs = ["capture", ...cleanT.split(/\s+/).filter(Boolean), "--to", toVal];
        const ctxM2 = cleanT.match(/(@\S+)/);
        const dueM2 = cleanT.match(/\bdue:(\d{4}-\d{2}-\d{2})\b/);
        if (ctxM2) { capArgs.push("--context", ctxM2[1]); }
        if (dueM2) { capArgs.push("--due", dueM2[1]); }
        await sendShellRun("gtd", capArgs, message); return;
      }
      // @context タグと due:YYYY-MM-DD を解析
      const ctxMatch = arg.match(/(@\S+)/);
      const dueMatch = arg.match(/\bdue:(\d{4}-\d{2}-\d{2})\b/);
      const ctxTag   = ctxMatch ? ctxMatch[1] : null;
      const dueDate  = dueMatch ? dueMatch[1] : null;
      const cleanText = arg.replace(/@\S+/g, "").replace(/\bdue:\d{4}-\d{2}-\d{2}\b/g, "").trim();
      await sendGtdCapture(cleanText || arg, message, ctxTag, dueDate); return;
    }
    if (cmd === "inbox")   { await sendInboxRich(message); return; }
    if (cmd === "morning") { await sendMorningRich(message); return; }
    if (cmd === "next") {
      const _ctxM = arg ? arg.match(/(@\S+)/) : null;
      await sendNextRich({
        filter:    _ctxM ? _ctxM[1] : null,
        overdue:   /--overdue/i.test(arg),
        due_today: /--due-today/i.test(arg),
      }, message); return;
    }
    if (cmd === "process") {
      if (!arg.trim()) { await sendInboxRich(message); return; }
      const parts2 = arg.split(/\s+/);
      const n    = parseInt(parts2[0], 10);
      const dest = (parts2[1] || "").toLowerCase();
      const validDests = ["next", "project", "projects", "someday", "waiting", "done"];
      if (!n || n < 1 || !dest || !validDests.includes(dest)) {
        appendAgent(`<span style='color:var(--fail)'>/process &lt;N&gt; &lt;dest&gt; (例: /process 1 next)<br>dest: next/done/someday/waiting/project<br>引数なし → Inbox 一覧でインタラクティブ処理</span>`);
        return;
      }
      await sendGtdProcess(n, dest, message); return;
    }
    if (cmd === "notify") {
      if (!arg) { appendAgent("<span style='color:var(--fail)'>/notify の後にメッセージを入力してください 例: /notify テスト通知</span>"); return; }
      await sendShellRun("notify", arg.split(/\s+/), message); return;
    }
    if (cmd === "gtd")    { await sendGtdStatusRich(message); return; }
    if (cmd === "weekly") { await sendWeeklyCard(message); return; }
    if (cmd === "do") {
      const idxMatch   = arg.match(/^(\d+)/);
      const timerMatch = arg.match(/--timer\s+(\d+)/);
      // 番号直指定なら preIndex 渡し、なしなら一覧セレクター
      await sendDoRich(idxMatch ? idxMatch[1] : null, timerMatch ? timerMatch[1] : null, message); return;
    }
    if (cmd === "done") {
      const doneIdxM = arg.match(/^(\d+)/);
      // 番号直指定なら即完了、なしなら current+一覧セレクター
      await sendDoneRich(doneIdxM ? doneIdxM[1] : null, message); return;
    }
    if (cmd === "someday") {
      await sendListRich("/api/gtd/someday", "\ud83d\udce6", "Someday", message); return;
    }
    if (cmd === "waiting") {
      await sendListRich("/api/gtd/waiting", "\u23f3", "Waiting", message); return;
    }
    if (cmd === "projects") {
      await sendListRich("/api/gtd/projects", "\ud83d\udcc1", "Projects", message); return;
    }
    if (cmd === "search") {
      if (!arg) { appendAgent("<span style='color:var(--fail)'>/search の後にキーワードを入力してください 例: /search 資料作成</span>"); return; }
      await sendSearchRich(arg.trim(), message); return;
    }
    if (cmd === "archive") {
      await sendArchiveCard(arg && /^\d+$/.test(arg.trim()) ? arg.trim() : null, message); return;
    }
    if (cmd === "stats") {
      await sendStatsCard(message); return;
    }
    if (cmd === "edit") {
      await sendEditRich(arg, message); return;
    }
    if (cmd === "commit") {
      const pushArgs = arg.includes("--push") ? ["commit", "--push"] : ["commit"];
      await sendShellRun("gtd", pushArgs, message); return;
    }
    if (cmd === "stop") {
      await sendShellRun("gtd", ["stop"], message); return;
    }
    if (cmd === "startup") {
      await sendStartupCard(message); return;
    }
    if (cmd === "daily") { await sendDailyCard(message); return; }
    if (cmd === "up") {
      const upArgs = arg ? arg.split(/\s+/).filter(Boolean) : [];
      await sendUpCard(upArgs, message); return;
    }
    if (cmd === "logs") {
      const parts  = arg.trim().split(/\s+/);
      const svc    = parts[0] || "unified_api";
      const nLines = parseInt(parts[1]) || 30;
      busy = true; sendBtn.disabled = true; msgInput.disabled = true;
      appendUser(message);
      appendAgent(`<span style='opacity:.6'>📄 ${escHtml(svc)} ログ取得中…</span>`);
      try {
        const r = await fetch(`/api/shell/logs?service=${encodeURIComponent(svc)}&n=${nLines}`);
        const j = await r.json();
        if (j.error) {
          replaceLastAgent(`<span style='color:var(--fail)'>エラー: ${escHtml(j.error)}</span>`);
        } else {
          const out = escHtml(j.output || "(出力なし)");
          replaceLastAgent(`<span class="intent-tag tag-run_ok">LOGS</span> <span style="font-size:11px;color:var(--muted)">${escHtml(svc)}</span><br><pre style='margin:4px 0 0;white-space:pre-wrap;font-size:11px'>${out}</pre>`);
        }
      } catch(e) {
        replaceLastAgent(`<span style='color:var(--fail)'>fetch 失敗: ${escHtml(String(e))}</span>`);
      } finally {
        busy = false; sendBtn.disabled = false; msgInput.disabled = false;
      }
      return;
    }

    // /events → 直接 manaosctl events（LLM 不要）
    if (cmd === "events") {
      let evArgs;
      if (arg === "today") {
        const minutesMidnight = new Date().getHours() * 60 + new Date().getMinutes();
        evArgs = ["--since", String(minutesMidnight || 1440)];
      } else if (/^\d+$/.test(arg)) {
        evArgs = ["-n", arg];
      } else if (arg) {
        evArgs = ["-n", "50", "--filter", arg];
      } else {
        evArgs = ["-n", "30"];
      }
      await sendShellRun("events", evArgs, message); return;
    }
    // /deps → 直接 manaosctl deps（LLM 不要）
    if (cmd === "deps") {
      await sendShellRun("deps", arg ? [arg] : [], message); return;
    }
    const remap = {
      analyze: "ログを分析して",
    };
    // /status → サービス名指定ありなら詳細カード、なしなら全体ステータス
    if (cmd === "status") {
      if (arg) { await sendSvcCard(arg, message); }
      else     { await sendShellRun("status", [], message); }
      return;
    }
    // /heal → リッチカード
    if (cmd === "heal") {
      await sendHealCard(arg || null, message); return;
    }
    // /restart → リッチカード
    if (cmd === "restart") {
      await sendRestartCard(arg || null, message); return;
    }
    message = remap[cmd] ?? message.slice(1).trim();
    if (!message) return;
  }

  // command history
  if (!cmdHist.length || cmdHist[0] !== message) {
    cmdHist.unshift(message);
    if (cmdHist.length > 50) cmdHist.pop();
    try { sessionStorage.setItem(_CMD_HIST_KEY, JSON.stringify(cmdHist.slice(0, 50))); } catch(_e) {}
  }
  cmdHistIdx = -1;

  busy = true;
  sendBtn.disabled = true;
  msgInput.disabled = true;
  appendUser(message);

  try {
    if (useSSE.checked) {
      await sendSSE(message);
    } else {
      await sendFetch(message);
    }
  } finally {
    busy = false;
    sendBtn.disabled = false;
    msgInput.disabled = false;
    msgInput.focus();
    loadServices();
  }
}

// ── Command autocomplete ───────────────────────────────────────────────────
let suggestIdx = -1;

function updateSuggest() {
  const val = msgInput.value;
  if (!val.startsWith("/")) { hideSuggest(); return; }
  const frag = val.toLowerCase();
  const matches = SLASH_CMDS.filter(c => c.cmd.toLowerCase().startsWith(frag));
  if (!matches.length) { hideSuggest(); return; }
  suggestIdx = -1;
  cmdSuggest.innerHTML = matches.map((c, i) =>
    `<div class="cmd-item" data-idx="${i}" onmousedown="pickSuggest(${i})">
       <span class="cmd-name">${escHtml(c.cmd)}</span>
       <span class="cmd-desc">${escHtml(c.desc)}</span>
     </div>`
  ).join("");
  cmdSuggest._matches = matches;
  cmdSuggest.style.display = "block";
}

function hideSuggest() {
  cmdSuggest.style.display = "none";
  cmdSuggest._matches = [];
  suggestIdx = -1;
}

function pickSuggest(idx) {
  const m = (cmdSuggest._matches || [])[idx];
  if (!m) return;
  // コマンド部分だけ挿入（引数プレースホルダは除く）
  const base = m.cmd.split(" ")[0] + (m.cmd.includes("<") ? " " : " ");
  msgInput.value = base;
  hideSuggest();
  msgInput.focus();
}

function moveSuggest(dir) {
  const items = cmdSuggest.querySelectorAll(".cmd-item");
  if (!items.length) return false;
  items.forEach(el => el.classList.remove("active"));
  suggestIdx = (suggestIdx + dir + items.length) % items.length;
  items[suggestIdx].classList.add("active");
  return true;
}

msgInput.addEventListener("input", updateSuggest);
msgInput.addEventListener("blur", () => setTimeout(hideSuggest, 150));

// ── Global keyboard shortcuts ─────────────────────────────────────────────
window.addEventListener("keydown", e => {
  // フォームやテキストエリアにフォーカス中は無視
  const tag = (document.activeElement || {}).tagName || "";
  if (tag === "TEXTAREA" || (tag === "INPUT" && document.activeElement !== msgInput)) return;
  if (e.altKey && !e.ctrlKey && !e.metaKey) {
    switch (e.key.toLowerCase()) {
      case "k": e.preventDefault(); msgInput.focus(); return;
      case "r": e.preventDefault(); msgInput.value = "/report"; send(); return;
      case "d": e.preventDefault(); msgInput.value = "/dashboard"; send(); return;
      case "n": e.preventDefault(); msgInput.value = "/next"; send(); return;
      case "s": e.preventDefault(); msgInput.focus(); msgInput.value = "/status "; return;
      case "e": e.preventDefault(); msgInput.value = "/events"; send(); return;
      case "i": e.preventDefault(); msgInput.value = "/inbox"; send(); return;
      case "g": e.preventDefault(); msgInput.value = "/gtd"; send(); return;
      case "m": e.preventDefault(); msgInput.value = "/morning"; send(); return;
      case "w": e.preventDefault(); msgInput.value = "/weekly"; send(); return;
    }
  }
  if (e.key === "Escape" && document.activeElement === msgInput) {
    if (msgInput.value) { msgInput.value = ""; updateSuggest(); }
    else msgInput.blur();
  }
});

// ── Key bindings ───────────────────────────────────────────────────────────
msgInput.addEventListener("keydown", e => {
  // 補完ポップアップが開いているとき ArrowUp/Down/Tab/Enter が補完に使われる
  if (cmdSuggest.style.display !== "none") {
    if (e.key === "ArrowDown") { e.preventDefault(); moveSuggest(1); return; }
    if (e.key === "ArrowUp")   { e.preventDefault(); moveSuggest(-1); return; }
    if (e.key === "Tab" || e.key === "Enter") {
      if (suggestIdx >= 0) { e.preventDefault(); pickSuggest(suggestIdx); return; }
    }
    if (e.key === "Escape") { e.preventDefault(); hideSuggest(); return; }
  }
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); return; }
  if (e.key === "ArrowUp") {
    e.preventDefault();
    if (cmdHistIdx < cmdHist.length - 1) {
      cmdHistIdx++;
      msgInput.value = cmdHist[cmdHistIdx];
      setTimeout(() => msgInput.setSelectionRange(9999, 9999), 0);
    }
    return;
  }
  if (e.key === "ArrowDown") {
    e.preventDefault();
    if (cmdHistIdx > 0) { cmdHistIdx--; msgInput.value = cmdHist[cmdHistIdx]; }
    else { cmdHistIdx = -1; msgInput.value = ""; }
    setTimeout(() => msgInput.setSelectionRange(9999, 9999), 0);
  }
});
sendBtn.addEventListener("click", send);

// ── Helpers ────────────────────────────────────────────────────────────────
function hideEmpty() {
  if (emptyState) emptyState.style.display = "none";
}
function scrollEnd() {
  historyEl.scrollTop = historyEl.scrollHeight;
}
function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function errBubble(err) {
  const el = document.createElement("div");
  el.className = "msg agent";
  el.innerHTML = `<div class="avatar">OS</div><div class="bubble" style="color:var(--fail)">${escHtml(String(err))}${ts()}</div>`;
  return el;
}

// ── Init ───────────────────────────────────────────────────────────────────
loadStoredMsgs();
</script>
