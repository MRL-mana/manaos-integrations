version: 1
services:
  # ═══════ Core Infrastructure ═══════
  - id: unified_api_server
    name: Unified API Server
    kind: port
    port: 9502
    health_url: http://127.0.0.1:9502/health
    tags: [core, always_on]
    depends_on: []

  - id: ollama
    name: Ollama
    kind: http
    port: 11434
    health_url: http://127.0.0.1:11434/api/tags
    tags: [ai, llm, always_on]
    depends_on: []

  - id: mrl_memory
    name: MRL Memory
    kind: docker
    container: manaos-mrl-memory
    port: 9507
    health_url: http://127.0.0.1:9507/health
    tags: [memory, always_on]
    depends_on: []

  - id: tool_server
