name: Workflow Health Report

on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Generate workflow health summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const workflows = await github.paginate(github.rest.actions.listRepoWorkflows, {
              owner,
              repo,
              per_page: 100,
            });

            const allRuns = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              per_page: 100,
            });

            const latestRunByWorkflow = new Map();
            for (const run of allRuns) {
              if (!latestRunByWorkflow.has(run.workflow_id)) {
                latestRunByWorkflow.set(run.workflow_id, run);
              }
            }

            const rows = [];
            let ok = 0;
            let warn = 0;
            let fail = 0;
            const nonCriticalFailureWorkflows = new Set([
              'Auto Assign Reviewer',
            ]);
            for (const wf of workflows) {
              if (wf.state !== 'active') continue;
              const run = latestRunByWorkflow.get(wf.id);
              const status = run ? `${run.status}/${run.conclusion || 'n/a'}` : 'no-runs';
              const branch = run?.head_branch || '-';
              const updated = run?.updated_at || '-';
              let icon = '⚪';
              if (status.includes('completed/success')) {
                icon = '✅';
                ok += 1;
              } else if (status.includes('completed/failure') || status.includes('completed/cancelled')) {
                if (nonCriticalFailureWorkflows.has(wf.name)) {
                  icon = '🟡';
                  warn += 1;
                } else {
                  icon = '❌';
                  fail += 1;
                }
              } else {
                icon = '🟡';
                warn += 1;
              }
              rows.push(`| ${icon} ${wf.name} | ${status} | ${branch} | ${updated} | ${wf.path} |`);
            }

            const summary = [
              '## Workflow Health Report',
              '',
              `Generated at: ${new Date().toISOString()}`,
              '',
              `- ✅ Success: ${ok}`,
              `- 🟡 Running/Queued/No-runs: ${warn}`,
              `- ❌ Failed/Cancelled: ${fail}`,
              '',
              '| Workflow | Latest Status | Branch | Updated | File |',
              '|---|---|---|---|---|',
              ...rows.sort(),
            ].join('\n');

            core.summary.addRaw(summary).write();
            fs.mkdirSync('artifacts', { recursive: true });
            fs.writeFileSync('artifacts/workflow-health-report.md', `${summary}\n`, 'utf8');

      - name: Upload health report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-health-report
          path: artifacts/workflow-health-report.md
          retention-days: 14
