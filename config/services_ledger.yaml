    tier: 1
    blast_note: "スケジュール管理・リマインダーが止まる。GTD 系タスクが全停止。"
    depends_on: [unified_api, memory]
    description: "秘書システム (スケジュール / GTD)"
    health_url: "http://127.0.0.1:5125/health"
    start_cmd: "python scripts/misc/secretary_system.py"
    stop_cmd: null
    auto_restart: true
    cost_risk: "low"
    recovery_hint: "scripts/misc/secretary_system.py の存在確認。unified_api / memory が UP していることを確認。"

  trinity:
    port: 5146
    url: "http://127.0.0.1:5146"
    enabled: true
    tier: 1
    blast_note: "Remi / Luna / Mina ルーティングが停止。メインチャット窓口が落ちる。"
    depends_on: [unified_api, memory, personality]
    description: "Trinity エージェントシステム (MCP ヘルスポート)"
    health_url: "http://127.0.0.1:5146/health"
    start_cmd: "python trinity_mcp_server/server.py"
    stop_cmd: null
    auto_restart: true
    cost_risk: "low"
    recovery_hint: "trinity_mcp_server/server.py の存在確認。unified_api / memory / personality が全て UP してから起動。"

  intent_router:
    port: 5100
    url: "http://127.0.0.1:5100"
    enabled: true
    tier: 1
    blast_note: "意図分類が止まる。unified_api 経由の振り分けが劣化。"
    depends_on: [llm_routing]
    description: "意図ルーター"
    health_url: "http://127.0.0.1:5100/health"
    start_cmd: "python scripts/misc/intent_router.py"
    stop_cmd: null
    auto_restart: true
    cost_risk: "low"
    recovery_hint: "scripts/misc/intent_router.py の存在確認。llm_routing が UP していることを確認。"

  task_queue:
    port: 5104
    url: "http://127.0.0.1:5104"
    enabled: true
    tier: 1
    blast_note: "非同期タスク処理が停止。autonomy の計画実行が詰まる。"
    depends_on: [unified_api]
    description: "タスクキューシステム"
    health_url: "http://127.0.0.1:5104/health"
    start_cmd: "python scripts/misc/task_queue_system.py"
    stop_cmd: null
    auto_restart: true
    cost_risk: "low"
    recovery_hint: "scripts/misc/task_queue_system.py の存在確認。unified_api が UP していることを確認。"


# ─────────────────────────────────────────────────────────────────────────────
