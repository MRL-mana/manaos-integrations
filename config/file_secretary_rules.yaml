rules:
  - name: finance_docs_pdf
    match:
      extension: ".pdf"
      filename_contains:
        - "請求"
        - "請求書"
        - "領収"
        - "領収書"
        - "納品"
        - "納品書"
        - "invoice"
        - "receipt"
        - "statement"
    action:
      type: move
      target: "processed/finance"

  - name: ops_docs
    match:
      extension: [".pdf", ".xlsx", ".xls", ".docx", ".doc"]
      filename_contains:
        - "勤怠"
        - "シフト"
        - "日報"
        - "実績"
        - "報告"
        - "月報"
        - "勤務"
        - "検針"
        - "検針票"
        - "点検表"
        - "timesheet"
        - "shift"
        - "report"
    action:
      type: move
      target: "processed/ops"

  - name: images_receipt_meter
    match:
      extension: [".jpg", ".jpeg", ".png", ".webp"]
      filename_contains:
        - "receipt"
        - "レシート"
        - "meter"
        - "メーター"
        - "設備"
        - "故障"
        - "トラブル"
        - "before"
        - "after"
    action:
      type: move
      target: "processed/images"

  - name: images_catchall
    match:
      extension: [".jpg", ".jpeg", ".png", ".webp"]
    action:
      type: move
      target: "processed/images/_uncategorized"

  - name: large_files_quarantine
    match:
      max_size_bytes: 50000000
    action:
      type: move
      target: "processed/_large_files"

defaults:
  action: none
