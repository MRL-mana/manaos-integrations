# ログ分析のサンプルYAML

# 例1: エラーサマリー分析
kind: log_analysis
action: analyze
log_file: "logs/app.log"
analysis_type: "error_summary"
output_format: "markdown"
output_path: "reports/log_analysis_2026-01-13.md"
notify:
  slack: false
idempotency_key: "log_analysis_2026-01-13"

