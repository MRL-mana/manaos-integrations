name: Docker Build and Push

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'manaos_integrations/**'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'manaos_integrations/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:
    inputs:
      push_to_registry:
        description: 'Push to Docker Hub'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  IMAGE_NAME: manaos-unified-api

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - unified-api
          - mrl-memory
          - learning-system
          - llm-routing
          - gallery-api
          - video-pipeline

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_HUB_USERNAME }}/manaos-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./manaos_integrations
          file: ./manaos_integrations/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE_NAME=${{ matrix.service }}

      - name: Test Docker image
        run: |
          docker images
          
          # イメージのセキュリティスキャン（Trivyは別のジョブで実行）
          echo "Testing image: ${{ steps.meta.outputs.tags }}"
          
          # ヘルスチェック（サービスによって異なるポート）
          case "${{ matrix.service }}" in
            unified-api)
              PORT=9502
              ;;
            mrl-memory)
              PORT=9507
              ;;
            learning-system)
              PORT=9508
              ;;
            llm-routing)
              PORT=9509
              ;;
            gallery-api)
              PORT=5559
              ;;
            video-pipeline)
              PORT=9511
              ;;
          esac
          
          # コンテナを起動してヘルスチェック
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          docker run -d --name test-${{ matrix.service }} -p ${PORT}:${PORT} $IMAGE_TAG
          
          # 30秒待機
          sleep 30
          
          # ヘルスチェック（オプション）
          # curl -f http://localhost:${PORT}/health || echo "Health check not available"
          
          # ログ確認
          docker logs test-${{ matrix.service }}
          
          # クリーンアップ
          docker stop test-${{ matrix.service }}
          docker rm test-${{ matrix.service }}

      - name: Push to Docker Hub
        if: |
          github.event_name != 'pull_request' && 
          (github.ref == 'refs/heads/main' || 
           github.ref == 'refs/heads/develop' ||
           github.event.inputs.push_to_registry == 'true')
        uses: docker/build-push-action@v5
        with:
          context: ./manaos_integrations
          file: ./manaos_integrations/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE_NAME=${{ matrix.service }}

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./manaos_integrations
          file: ./manaos_integrations/Dockerfile
          push: false
          load: true
          tags: manaos-scan:${{ github.sha }}
          cache-from: type=gha

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: manaos-scan:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate vulnerability report
        if: always() && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image \
            --format json \
            --output trivy-report.json \
            manaos-scan:${{ github.sha }}

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        if: always() && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 14

  deploy-notification:
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deployment notification
        run: |
          echo "🚀 Docker images have been built and pushed successfully!"
          echo "📦 Images are available on Docker Hub"
          echo "🔐 Security scan completed"
          
          echo "### Docker Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build: Success" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Test: Success" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Security Scan: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Push: Success" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Images:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`manaos-unified-api:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`manaos-mrl-memory:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`manaos-learning-system:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`manaos-llm-routing:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`manaos-gallery-api:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`manaos-video-pipeline:latest\`" >> $GITHUB_STEP_SUMMARY
