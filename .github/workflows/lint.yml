name: Code Quality & Linting

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - "manaos_integrations/**/*.py"
      - "requirements*.txt"
      - ".flake8"
      - ".pylintrc"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: windows-latest
    continue-on-error: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Detect lint-relevant changes
      id: lintfilter
      uses: dorny/paths-filter@v3
      with:
        filters: |
          code:
            - 'manaos_integrations/**/*.py'
          deps:
            - 'requirements*.txt'
            - 'pyproject.toml'
            - '.flake8'
            - '.pylintrc'
          workflow:
            - '.github/workflows/lint.yml'
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    
    - name: Install linting tools
      if: github.event_name == 'workflow_dispatch' || steps.lintfilter.outputs.code == 'true'
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint black mypy
      shell: pwsh
    
    - name: Run flake8
      if: github.event_name == 'workflow_dispatch' || steps.lintfilter.outputs.code == 'true'
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      shell: pwsh
      continue-on-error: false
    
    - name: Run pylint
      if: github.event_name == 'workflow_dispatch' || steps.lintfilter.outputs.code == 'true'
      run: |
        $targets = @()
        if (Test-Path "manaos_integrations") { $targets += "manaos_integrations" }
        if (Test-Path "tests") { $targets += "tests" }
        if ($targets.Count -eq 0) {
          Write-Host "No pylint targets found; skipping"
        } else {
          if (Test-Path ".pylintrc") {
            pylint --errors-only --disable=import-error --rcfile=.pylintrc $targets
          } else {
            pylint --errors-only --disable=import-error $targets
          }
        }
      shell: pwsh
      continue-on-error: false
    
    - name: Check code formatting with black
      if: github.event_name == 'workflow_dispatch' || steps.lintfilter.outputs.code == 'true'
      run: |
        black --check --diff .
      shell: pwsh
      continue-on-error: false
    
    - name: Run mypy type checking
      if: github.event_name == 'workflow_dispatch' || steps.lintfilter.outputs.code == 'true'
      run: |
        mypy --ignore-missing-imports --python-version 3.10 .
      shell: pwsh
      continue-on-error: false
    
    - name: Summary
      if: always()
      run: |
        Write-Host "✅ Code quality check completed"
      shell: pwsh
