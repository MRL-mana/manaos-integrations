version: '3.8'

services:
  # Multi-Model AI MCP Server
  multi-model-ai:
    build: .
    container_name: multi-model-ai-server
    ports:
      - "8000:8000"
      - "11434:11434"  # Ollama API
    volumes:
      - ./models:/app/models
      - /mnt/storage500/gpt-oss-models:/app/models:ro
    environment:
      - MODEL_BASE_PATH=/app/models
      - OLLAMA_HOST=0.0.0.0:11434
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Ollama Service (for qwen2.5:3b)
  ollama:
    image: ollama/ollama:latest
    container_name: multi-model-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: multi-model-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Monitoring Dashboard
  monitoring:
    image: grafana/grafana:latest
    container_name: multi-model-monitoring
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped

volumes:
  ollama_data:
  redis_data:
  grafana_data:

networks:
  default:
    name: multi-model-network
