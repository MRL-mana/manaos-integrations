name: Actionlint

on:
  push:
    branches: [master, main, develop]
    paths:
      - '.github/workflows/**'
      - '.github/labeler.yml'
      - '.github/labels.yml'
  pull_request:
    branches: [master, main, develop]
    paths:
      - '.github/workflows/**'
      - '.github/labeler.yml'
      - '.github/labels.yml'

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run actionlint
        id: lint
        uses: rhysd/actionlint@v1
        with:
          reporter: ''

      - name: Workflow lint summary
        if: always()
        run: |
          echo "## Actionlint completed" >> $GITHUB_STEP_SUMMARY
          echo "- Reporter is disabled to avoid GitHub annotation limit" >> $GITHUB_STEP_SUMMARY
