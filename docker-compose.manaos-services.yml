version: '3.8'

services:
  # Unified API Server
  unified-api:
    build:
      context: .
      dockerfile: unified_api_server/Dockerfile
    container_name: unified-api-server
    restart: unless-stopped
    ports:
      - "9502:9502"
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Tokyo
      - FLASK_ENV=production
      - COMFYUI_URL=${MANAOS_COMFYUI_URL:-http://host.docker.internal:8188}
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL:-http://host.docker.internal:8080}
      - OBSIDIAN_VAULT_PATH=${OBSIDIAN_VAULT_PATH:-/app/obsidian_vault}
    volumes:
    - ./logs:/app/logs
    - ./data:/app/data
    - ./unified_api_server.py:/app/unified_api_server.py:ro
    - ./manaos_logger.py:/app/manaos_logger.py:ro
    - ./manaos_error_handler.py:/app/manaos_error_handler.py:ro
    - ./manaos_timeout_config.py:/app/manaos_timeout_config.py:ro
    # Windows環境ではdocker.sockをマウントできないため、環境変数でDockerを呼び出す
    # Linux環境では以下のコメントアウトを解除してdocker.sockをマウント
    # - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - manaos-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9502/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Step Deep Research Service
  step-deep-research:
    build:
      context: .
      dockerfile: step_deep_research_service/Dockerfile
    container_name: step-deep-research-service
    restart: unless-stopped
    ports:
      - "5121:5121"
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Tokyo
      - FLASK_ENV=production
    volumes:
      - ./step_deep_research_config.json:/app/step_deep_research_config.json:ro
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - manaos-network
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5121/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Gallery API Server
  gallery-api:
    build:
      context: .
      dockerfile: gallery_api_server/Dockerfile
    container_name: gallery-api-server
    restart: unless-stopped
    ports:
      - "5559:5559"
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Tokyo
      - FLASK_ENV=production
      - COMFYUI_URL=${COMFYUI_URL:-http://host.docker.internal:8188}
      - GALLERY_PORT=5559
      - GALLERY_IMAGES_DIR=/app/gallery_images
      - COMFYUI_OUTPUT_DIR=${COMFYUI_OUTPUT_DIR:-/app/comfyui_output}
    volumes:
      - ./gallery_images:/app/gallery_images
      - ./logs:/app/logs
    networks:
      - manaos-network
    depends_on:
      - unified-api
    deploy:
