# Rows操作のサンプルYAML

# 例1: データ送信
kind: rows_ops
action: send_data
spreadsheet_id: "xxx-xxx-xxx"
sheet_name: "Sheet1"
data:
  - name: "項目1"
    value: 100
  - name: "項目2"
    value: 200
append: true
notify:
  slack: false
idempotency_key: "rows_send_2026-01-13_001"

