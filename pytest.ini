# pytest設定ファイル
[pytest]

# 非同期テストサポート（pytest-asyncio）
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# テストディレクトリ
testpaths = tests

# Python パス設定
pythonpath = .
             scripts/misc
             scripts/cursor
             scripts/gpu
             scripts/github
             scripts/run

# テストパターン
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 出力設定
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes

# 警告フィルター
filterwarnings =
    ignore::pytest.PytestUnknownMarkWarning
    ignore::pytest.PytestReturnNotNoneWarning
    ignore::ResourceWarning
    ignore:The NumPy module was reloaded.*:UserWarning:PIL\._typing
    ignore::FutureWarning:transformers.*
    ignore::DeprecationWarning:pkg_resources.*
    ignore::DeprecationWarning:importlib._bootstrap.*
    ignore::DeprecationWarning:aiohttp.*
    ignore::DeprecationWarning:asyncio.*
    ignore:.*login_or_token.*:DeprecationWarning
    ignore:Core Pydantic V1.*:UserWarning:chromadb.*

# マーカー定義
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (db, api connections)
    e2e: End-to-end tests (full system)
    performance: Performance and load tests
    slow: Slow running tests
    gpu: Tests requiring GPU
    llm: Tests requiring LLM models
    external: Tests requiring external services
    timeout: Tests with timeout constraints (requires pytest-timeout)

# カバレッジ除外
[coverage:run]
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */env/*
    .venv/*
    */migrations/*
    */node_modules/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
