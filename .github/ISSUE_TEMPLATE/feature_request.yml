name: Feature request
description: 改善・新機能の提案
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: 現状の困りごとを記載してください
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: 具体的な改善案を書いてください
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 他に検討した方法があれば記載

  - type: textarea
    id: impact
    attributes:
      label: 期待効果
      description: どんな価値があるか（速度、安定性、運用性など）
