name: Workflow Policy Audit

on:
  push:
    branches: [master, main, develop]
    paths:
      - '.github/workflows/*.yml'
      - '.github/required-status-checks.json'
      - 'scripts/audit_workflow_policies.py'
      - 'scripts/audit_required_status_checks.py'
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      - name: Run workflow policy audit
        run: python scripts/audit_workflow_policies.py

      - name: Run required status checks audit
        run: python scripts/audit_required_status_checks.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-policy-audit
          path: |
            artifacts/workflow-policy-audit.md
            artifacts/required-checks-audit.md
          retention-days: 14

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          WORKFLOW: ${{ github.workflow }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ.get('REPO', '')
          ref_name = os.environ.get('REF', '')
          run_id = os.environ.get('RUN_ID', '')
          workflow = os.environ.get('WORKFLOW', '')
          server_url = os.environ.get('SERVER_URL', 'https://github.com')
          webhook = os.environ.get('SLACK_WEBHOOK_URL', '')
          run_url = f"{server_url}/{repo}/actions/runs/{run_id}"

          payload = {
              'text': f":rotating_light: {workflow} failed\nrepo={repo}\nref={ref_name}\nrun={run_url}"
          }

          req = urllib.request.Request(
              webhook,
              data=json.dumps(payload).encode('utf-8'),
              headers={'Content-Type': 'application/json'},
              method='POST',
          )
          with urllib.request.urlopen(req, timeout=15) as response:
              print(f"slack_notify_status={response.status}")
          PY
