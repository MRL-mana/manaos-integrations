<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ManaOS Control Panel</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --dim: #7d8590; --green: #3fb950; --red: #f85149;
    --yellow: #d29922; --cyan: #58a6ff; --magenta: #bc8cff;
    --font: 'Segoe UI', system-ui, sans-serif; --mono: 'Consolas', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; padding: 16px; }
  h1 { font-size: 20px; color: var(--cyan); margin-bottom: 4px; }
  .subtitle { color: var(--dim); font-size: 12px; margin-bottom: 16px; }
  .header-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .badge.up   { background: rgba(63,185,80,.2);  color: var(--green);   border: 1px solid rgba(63,185,80,.5); }
  .badge.down { background: rgba(248,81,73,.2);  color: var(--red);     border: 1px solid rgba(248,81,73,.5); }
  .badge.dis  { background: rgba(125,133,144,.15); color: var(--dim);   border: 1px solid var(--border); }
  .refresh-btn { margin-left: auto; background: var(--surface); color: var(--cyan); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 14px; cursor: pointer; font-size: 13px; transition: background .15s; }
  .refresh-btn:hover { background: #21262d; }
  .last-updated { color: var(--dim); font-size: 11px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--dim); text-transform: uppercase;
    letter-spacing: .06em; margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { color: var(--dim); font-weight: 500; text-align: left; padding: 4px 6px; border-bottom: 1px solid var(--border); }
  td { padding: 4px 6px; }
  tr:hover td { background: rgba(255,255,255,.03); }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
  .dot.up   { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.down { background: var(--red);   box-shadow: 0 0 6px var(--red); }
  .dot.dis  { background: var(--dim); }
  .tier-badge { padding: 1px 6px; border-radius: 9px; font-size: 11px;
    background: rgba(88,166,255,.12); color: var(--cyan); border: 1px solid rgba(88,166,255,.3); }
  .cost-high { color: var(--red); font-weight: 600; }
  .cost-med  { color: var(--yellow); }
  .cost-low  { color: var(--dim); }
  .ev-table td { font-family: var(--mono); font-size: 12px; }
  .ev-up      { color: var(--green); }
  .ev-down    { color: var(--red); }
  .ev-heal_trigger, .ev-policy { color: var(--magenta); }
  .ev-cost_alert, .ev-shutdown { color: var(--yellow); }
  .ev-startup, .ev-analyze { color: var(--cyan); }
  .summary-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; margin-bottom: 16px; font-size: 13px; }
  .summary-box .label { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
  .summary-text { margin-top: 6px; line-height: 1.6; white-space: pre-wrap; }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { color: var(--dim); text-align: center; padding: 20px; font-size: 13px; }
</style>
</head>
<body>

<h1>⚙ ManaOS Control Panel</h1>
<p class="subtitle" id="last-updated">読み込み中...</p>

<div class="header-row">
  <span class="badge up"   id="badge-up">UP: —</span>
  <span class="badge down" id="badge-down">DOWN: —</span>
  <span class="badge dis"  id="badge-dis">DISABLED: —</span>
  <button class="refresh-btn" onclick="loadAll()">↻ 更新</button>
</div>

<div id="summary-section" style="display:none">
  <div class="summary-box">
    <div class="label">最新AI分析サマリー（長期記憶）</div>
    <div class="summary-text" id="summary-text"></div>
    <div style="margin-top:6px;color:var(--dim);font-size:11px" id="summary-meta"></div>
  </div>
</div>

<div class="grid">
  <div class="card">
    <div class="card-title">サービス状態</div>
    <table id="svc-table">
      <thead><tr><th>Service</th><th>Tier</th><th>Port</th><th>Status</th><th>Cost</th></tr></thead>
      <tbody id="svc-body"><tr><td colspan="5" class="empty"><span class="spin">⟳</span> 読み込み中</td></tr></tbody>
    </table>
  </div>
  <div class="card">
    <div class="card-title">直近イベント</div>
    <table class="ev-table" id="ev-table">
      <thead><tr><th>Time</th><th>Event</th><th>Service</th><th>Detail</th></tr></thead>
      <tbody id="ev-body"><tr><td colspan="4" class="empty"><span class="spin">⟳</span> 読み込み中</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const API = window.location.origin;

async function fetchJSON(path) {
  const r = await fetch(API + path);
  return r.ok ? r.json() : null;
}

function statusDot(st) {
  const cls = st === 'UP' ? 'up' : st === 'DOWN' ? 'down' : 'dis';
  return `<span class="dot ${cls}"></span>${st}`;
}

function costSpan(risk) {
  const cls = risk === 'high' ? 'cost-high' : risk === 'med' ? 'cost-med' : 'cost-low';
  return `<span class="${cls}">${risk}</span>`;
}

function evClass(ev) {
  if (ev.includes('up') || ev === 'heal_ok') return 'ev-up';
  if (ev.includes('down') || ev === 'heal_fail') return 'ev-down';
  return 'ev-' + ev;
}

function fmtTime(t) {
  return t ? t.slice(11,19) : '';
}

async function loadStatus() {
  const data = await fetchJSON('/api/status');
  if (!data || !Array.isArray(data)) return;
  const up = data.filter(r => r.status === 'UP').length;
  const down = data.filter(r => r.status === 'DOWN').length;
  const dis = data.filter(r => r.status === 'DISABLED').length;
  document.getElementById('badge-up').textContent   = `UP: ${up}`;
  document.getElementById('badge-down').textContent = `DOWN: ${down}`;
  document.getElementById('badge-dis').textContent  = `DISABLED: ${dis}`;

  const sorted = [...data].sort((a,b) => (a.tier - b.tier) || a.service.localeCompare(b.service));
  const rows = sorted.map(r => {
    const st = r.status === 'UP' ? 'UP' : r.status === 'DOWN' ? 'DOWN' : 'DISABLED';
    return `<tr>
      <td>${r.service}</td>
      <td><span class="tier-badge">${r.tier}</span></td>
      <td style="color:var(--dim)">${r.port ?? '—'}</td>
      <td>${statusDot(st)}</td>
      <td>${costSpan(r.cost_risk ?? 'low')}</td>
    </tr>`;
  });
  document.getElementById('svc-body').innerHTML = rows.join('') || '<tr><td colspan="5" class="empty">データなし</td></tr>';
}

async function loadEvents() {
  const data = await fetchJSON('/api/events');
  if (!data || !Array.isArray(data)) return;
  const rev = [...data].reverse().slice(0, 50);
  const rows = rev.map(e => {
    const ev = e.event ?? '';
    return `<tr>
      <td style="color:var(--dim);white-space:nowrap">${fmtTime(e.time)}</td>
      <td class="${evClass(ev)}">${ev}</td>
      <td>${e.service ?? ''}</td>
      <td style="color:var(--dim);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.detail ?? ''}">${e.detail ?? ''}</td>
    </tr>`;
  });
  document.getElementById('ev-body').innerHTML = rows.join('') || '<tr><td colspan="4" class="empty">イベントなし</td></tr>';
}

async function loadSummary() {
  const data = await fetchJSON('/api/summary');
  if (!data || !data.summary) return;
  document.getElementById('summary-section').style.display = 'block';
  document.getElementById('summary-text').textContent = data.summary;
  document.getElementById('summary-meta').textContent =
    `最終更新: ${data.last_updated ?? '?'} | モデル: ${data.model ?? '?'} | UP:${data.service_up ?? '?'} DOWN:${data.service_down ?? '?'}`;
}

async function loadAll() {
  const now = new Date().toLocaleString('ja-JP');
  document.getElementById('last-updated').textContent = `最終更新: ${now}`;
  await Promise.all([loadStatus(), loadEvents(), loadSummary()]);
}

loadAll();
setInterval(loadAll, 30000); // 30秒ごとに自動更新
</script>
</body>
</html>
