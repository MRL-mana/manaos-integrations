# ファイル整理のサンプルYAML

# 例1: ファイル整理（パターンに基づいて移動）
kind: file_organize
action: organize
source_directory: "Downloads"
rules:
  - pattern: "*.pdf"
    destination: "Documents/PDFs"
  - pattern: "*.jpg"
    destination: "Pictures"
  - pattern: "*.png"
    destination: "Pictures"
move_files: true
notify:
  slack: false
idempotency_key: "file_organize_2026-01-13"

