name: ManaOS Integration Tests

on:
  workflow_dispatch:  # 手動実行を許可

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    continue-on-error: false
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if (Test-Path requirements.txt) { pip install -r requirements.txt }
        pip install pytest pytest-cov requests
      shell: pwsh
    
    - name: Run syntax validation
      run: |
        python -m py_compile *.py
        Get-ChildItem -Path . -Filter *.py -Recurse | ForEach-Object {
          Write-Host "Compiling $($_.FullName)"
          python -m py_compile $_.FullName
        }
      shell: pwsh
      continue-on-error: false
    
    - name: Run environment variable tests
      run: |
        if (Test-Path test_environment_variables.py) {
          python test_environment_variables.py
        } else {
          Write-Host "⚠️ test_environment_variables.py not found; skipping"
        }
      shell: pwsh
      env:
        # テスト用環境変数の設定
        OLLAMA_URL: http://test-ollama:11434
        COMFYUI_URL: http://test-comfyui:8188
        MRL_MEMORY_URL: http://test-memory:5105
    
    - name: Run service health check tests
      run: |
        python test_service_health_checks.py
      shell: pwsh
      continue-on-error: false
    
    - name: Check code quality
      run: |
        pip install pylint
        pylint --errors-only *.py
      shell: pwsh
      continue-on-error: false
    
    - name: Generate test report
      if: always()
      run: |
        Write-Host "✅ Test execution completed"
        Write-Host "Python version: ${{ matrix.python-version }}"
        Write-Host "OS: ${{ runner.os }}"
      shell: pwsh
