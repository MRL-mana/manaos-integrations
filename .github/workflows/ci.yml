name: CI/CD Pipeline

on:
    push:
        branches: [master, main, develop]
    paths:
      - '**/*.py'
      - 'tests/**'
      - 'requirements*.txt'
      - '.flake8'
      - '.pylintrc'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
    pull_request:
        branches: [master, main]
    paths:
      - '**/*.py'
      - 'tests/**'
      - 'requirements*.txt'
      - '.flake8'
      - '.pylintrc'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
    schedule:
        # 毎日午前3時（JST）にセキュリティスキャン実行
        - cron: '0 18 * * *'

env:
    PYTHON_VERSION: "3.11"

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: ["3.11", "3.12", "3.13"]
            fail-fast: false

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Cache pip dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.cache/pip
                  key: ${{ runner.os }}-pip-${{ hashFiles('requirements-core.txt') }}
                  restore-keys: |
                      ${{ runner.os }}-pip-

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements-core.txt
                  pip install pytest pytest-cov pytest-asyncio pytest-timeout

            - name: Run linter
              run: |
                  pip install flake8
                  flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --config .flake8
              continue-on-error: true

            - name: Run unit tests
              run: |
                  pytest tests/unit/ -v --cov=. --cov-report=xml --timeout=30
              continue-on-error: false

            - name: Run integration tests
              run: |
                  pytest tests/integration/ -v --cov-append --cov=. --cov-report=xml --timeout=60
              continue-on-error: true

            - name: Upload coverage to Codecov
              if: matrix.python-version == '3.11'
              uses: codecov/codecov-action@v4
              with:
                  file: ./coverage.xml
                  flags: unittests
                  name: codecov-umbrella

    security:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Cache pip dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.cache/pip
                  key: ${{ runner.os }}-pip-security-${{ hashFiles('requirements-core.txt') }}
                  restore-keys: |
                      ${{ runner.os }}-pip-security-

            - name: Install security tools
              run: |
                  pip install bandit safety

            - name: Gitleaks secret scan
              uses: gitleaks/gitleaks-action@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
                  GITLEAKS_CONFIG: .gitleaks.toml
              continue-on-error: true

            - name: Run ManaOS Security Auditor
              run: |
                  python security_auditor.py --dir . || true
              continue-on-error: true

            - name: Run Bandit security scan
              run: |
                  bandit -r . -f json -o bandit-report.json --exclude .venv,venv,tests || true

            - name: Run Safety dependency check
              run: |
                  safety check --json --output safety-report.json || true

            - name: Upload security reports
              uses: actions/upload-artifact@v4
              with:
                  name: security-reports
                  path: |
                      bandit-report.json
                      safety-report.json
                  retention-days: 30

    config-validation:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Install YAML parser
              run: |
                  python -m pip install --upgrade pip
                  pip install pyyaml

            - name: Validate configuration files
              run: |
                  python -c "import json; json.load(open('manaos_integration_config.json'))"
                  python -c "import yaml; yaml.safe_load(open('services_dependency.yaml'))"
                  echo "✅ Configuration files are valid"

            - name: Check port conflicts
              run: |
                  python config_loader.py || echo "⚠️ Port conflict check failed"

    lint-yaml:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Lint YAML files
              uses: ibiqlik/action-yamllint@v3
              with:
                  file_or_dir: .github/workflows/*.yml
                  config_data: |
                      extends: default
                      rules:
                        line-length:
                          max: 120
                        indentation:
                          spaces: 4
              continue-on-error: true
