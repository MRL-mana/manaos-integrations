<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ManaOS Shell</title>
  <style>
    :root {
      --bg:        #0f172a;
      --panel:     #111827;
      --panel2:    #1a2236;
      --line:      #1f2937;
      --line2:     #374151;
      --text:      #e5e7eb;
      --muted:     #9ca3af;
      --accent:    #818cf8;
      --accent2:   #6366f1;
      --ok:        #22c55e;
      --warn:      #f59e0b;
      --fail:      #ef4444;
      --tag-img:   #7c3aed;
      --tag-sys:   #0ea5e9;
      --tag-task:  #f59e0b;
      --tag-llm:   #10b981;
      --tag-err:   #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 14px;
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-rows: 48px 1fr 72px;
      grid-template-columns: 1fr 260px;
      height: 100vh;
    }
    .layout header { grid-column: 1 / -1; }
    .layout .input-bar { grid-column: 1 / -1; }
    /* when sidebar hidden */
    .layout.no-sidebar { grid-template-columns: 1fr; }
    .layout.no-sidebar #sidebar { display: none; }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    header .logo {
      font-weight: 700;
      font-size: 15px;
      color: var(--accent);
      letter-spacing: .03em;
    }
    header .logo span { color: var(--text); }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--line);
      color: var(--muted);
    }
    a.dash-link {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
    }
    a.dash-link:hover { color: var(--text); }

    /* ── History ────────────────────────────────────────────────────────── */
    #history {
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #history::-webkit-scrollbar { width: 6px; }
    #history::-webkit-scrollbar-track { background: transparent; }
    #history::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 3px; }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fadeIn .15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .msg.user  { flex-direction: row-reverse; }
    .msg.user  .bubble { background: var(--accent2); color: #fff; border-radius: 16px 4px 16px 16px; }
    .msg.agent .bubble { background: var(--panel2); border: 1px solid var(--line); border-radius: 4px 16px 16px 16px; }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .ts {
      font-size: 10px;
      color: var(--muted);
      opacity: .6;
      margin-top: 4px;
      display: block;
      text-align: right;
    }
    .msg.user .ts { text-align: left; }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg.user  .avatar { background: var(--accent2); color: #fff; }
    .msg.agent .avatar { background: var(--line);    color: var(--accent); }

    /* intent badge inside bubble */
    .intent-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .tag-image_generation  { background: var(--tag-img);  color: #fff; }
    .tag-system_control    { background: var(--tag-sys);  color: #fff; }
    .tag-task_execution    { background: var(--tag-task); color: #000; }
    .tag-conversation      { background: var(--tag-llm);  color: #fff; }
    .tag-information_search{ background: var(--tag-llm);  color: #fff; }
    .tag-code_generation   { background: #0891b2; color: #fff; }
    .tag-data_analysis     { background: #7c3aed; color: #fff; }
    .tag-device_status     { background: var(--tag-sys);  color: #fff; }
    .tag-error             { background: var(--tag-err);  color: #fff; }
    .tag-dry_run           { background: var(--warn);     color: #000; }

    .dispatch-line {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      font-family: ui-monospace, monospace;
    }
    .dispatch-line .method { color: var(--ok); }
    .dispatch-line .url    { color: var(--accent); }

    .result-block {
      margin-top: 8px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      font-family: ui-monospace, monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      color: var(--text);
      max-height: 320px;
      overflow-y: auto;
    }
    .result-block::-webkit-scrollbar { width: 4px; }
    .result-block::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 2px; }

    .thinking {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      padding: 4px 0;
    }
    .dots span {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    /* ── Input bar ──────────────────────────────────────────────────────── */
    .input-bar {
      border-top: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
    }
    #msg-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--line2);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }

    .dry-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }
    .dry-label input { accent-color: var(--warn); cursor: pointer; }

    .api-key-group {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .api-key-group input {
      background: var(--bg);
      border: 1px solid var(--line2);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--muted);
      font-size: 12px;
      width: 140px;
      outline: none;
    }
    .api-key-group input:focus { border-color: var(--accent); color: var(--text); }

    #send-btn {
      background: var(--accent2);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 18px;
      height: 40px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent); }
    #send-btn:disabled { opacity: .5; cursor: default; }

    /* ── Toast ──────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 90px;
      right: 20px;
      background: var(--fail);
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
      z-index: 100;
    }

    /* ── Empty state ────────────────────────────────────────────────────── */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 8px;
      pointer-events: none;
      user-select: none;
    }
    .empty .icon  { font-size: 36px; opacity: .3; }
    .empty .hint  { font-size: 12px; opacity: .5; }
    .example-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      pointer-events: all;
      margin-top: 6px;
    }
    .pill {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color .12s;
    }
    /* ── Intent tag: stream steps ───────────────────────────────────────── */
    .step-line {
      font-size: 11px;
      color: var(--muted);
      font-family: ui-monospace, monospace;
      padding: 1px 0;
    }
    .step-line .s-icon { margin-right: 4px; }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    #sidebar {
      border-left: 1px solid var(--line);
      background: var(--panel);
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 2px; }
    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-refresh {
      background: none;
      border: 1px solid var(--line2);
      border-radius: 4px;
      color: var(--muted);
      padding: 1px 6px;
      font-size: 10px;
      cursor: pointer;
    }
    .sidebar-refresh:hover { color: var(--text); border-color: var(--accent); }
    .svc-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 6px;
      border-radius: 5px;
      font-size: 12px;
      line-height: 1.3;
    }
    .svc-row:hover { background: var(--panel2); }
    .svc-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .svc-dot.ok     { background: var(--ok); }
    .svc-dot.warn   { background: var(--warn); }
    .svc-dot.down   { background: var(--fail); }
    .svc-dot.skip   { background: var(--muted); }
    .svc-name { flex: 1; color: var(--text); }
    .svc-port { color: var(--muted); font-family: ui-monospace, monospace; font-size: 10px; }
    .svc-loading {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 12px 0;
    }
    .sidebar-section {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--line2);
      padding: 4px 6px 2px;
    }
    .svc-heal-btn {
      background: none;
      border: 1px solid var(--line2);
      border-radius: 4px;
      color: var(--warn);
      font-size: 10px;
      padding: 0 4px;
      cursor: pointer;
      line-height: 17px;
      flex-shrink: 0;
    }
    .svc-heal-btn:hover { background: var(--line2); }
    .svc-restart-btn {
      background: none;
      border: 1px solid var(--line2);
      border-radius: 4px;
      color: var(--muted);
      font-size: 10px;
      padding: 0 4px;
      cursor: pointer;
      line-height: 17px;
      flex-shrink: 0;
    }
    .svc-restart-btn:hover { background: var(--line2); color: var(--accent); }
    #down-badge {
      display: none;
      background: var(--fail);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 7px;
      margin-left: 6px;
    }
    /* コマンド補完ポップアップ */
    #cmd-suggest {
      position: absolute;
      bottom: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 8px;
      z-index: 100;
      overflow: hidden;
      display: none;
    }
    .cmd-item {
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      gap: 8px;
      align-items: baseline;
    }
    .cmd-item:hover, .cmd-item.active { background: var(--line2); }
    .cmd-item .cmd-name { color: var(--accent); font-family: ui-monospace, monospace; font-weight: 600; }
    .cmd-item .cmd-desc { color: var(--muted); font-size: 11px; }
    .input-bar { position: relative; }
  </style>
</head>
<body>
<div class="layout" id="layout">

  <!-- Header -->
  <header>
    <div class="logo">ManaOS <span>Shell</span></div>
    <span id="down-badge"></span>
    <div class="badge" id="status-badge">connecting…</div>
    <div class="header-right">
      <label class="dry-label" style="margin-right:8px">
        <input type="checkbox" id="use-sse" checked /> SSE
      </label>
      <button class="sidebar-refresh" id="sidebar-toggle" style="font-size:11px;padding:2px 8px">⊞ Services</button>
      <a class="dash-link" href="/api/integrations/status" target="_blank">JSON</a>
      <a class="dash-link" href="/status" target="_blank">Status</a>
      <a class="dash-link" href="/api/shell/history" target="_blank">[log]</a>
      <button class="sidebar-refresh" onclick="clearStorage()" title="チャット履歴をクリア" style="font-size:11px;padding:2px 8px;color:var(--fail)">🗑</button>
    </div>
  </header>

  <!-- History -->
  <div id="history">
    <div class="empty" id="empty-state">
      <div class="icon">⌘</div>
      <div>ManaOS Shell — 自然言語でOSを操作する</div>
      <div class="hint">Enter / Ctrl+Enter で送信</div>
      <div class="example-pills">
        <div class="pill" onclick="setMsg('comfyuiで猫の画像を生成して')">🎨 画像生成</div>
        <div class="pill" onclick="setMsg('全サービスの状態を確認して')">🔍 状態確認</div>
        <div class="pill" onclick="setMsg('LLMに挨拶して')">💬 会話</div>
        <div class="pill" onclick="setMsg('全サービスの状態を確認して', true)">🧪 dry_run</div>
      </div>
    </div>
  </div>

  <!-- Sidebar: Services -->
  <aside id="sidebar">
    <div class="sidebar-title">
      Services
      <button class="sidebar-refresh" id="svc-refresh-btn" onclick="loadServices()">↻</button>
    </div>
    <div id="svc-list"><div class="svc-loading">loading…</div></div>
  </aside>

  <!-- Input bar -->
  <div class="input-bar">
    <div id="cmd-suggest"></div>
    <input id="msg-input" type="text" placeholder="例：comfyuiで猫を生成して、/でコマンド一覧" autocomplete="off" />
    <label class="dry-label"><input type="checkbox" id="dry-check" /> dry_run</label>
    <div class="api-key-group">
      <input id="api-key" type="password" placeholder="X-API-Key (任意)" />
    </div>
    <button id="send-btn">Send</button>
  </div>

</div>
<div id="toast"></div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const SHELL_URL      = "/api/shell";
const SHELL_STREAM   = "/api/shell/stream";
const HEALTH_URL     = "/health";
const SERVICES_URL   = "/api/shell/services";
let busy = false;

// ── Slash command definitions (for autocomplete) ───────────────────────────
const SLASH_CMDS = [
  { cmd: "/status",          desc: "全サービスの状態確認" },
  { cmd: "/heal",            desc: "DOWN サービスを全部復旧" },
  { cmd: "/heal <svc>",      desc: "指定サービスを heal" },
  { cmd: "/restart <svc>",   desc: "指定サービスを再起動" },
  { cmd: "/report",          desc: "状態レポート" },
  { cmd: "/analyze",         desc: "ログ分析" },
  { cmd: "/services",        desc: "サービス一覧リロード" },
  { cmd: "/clear",           desc: "チャット履歴クリア" },
];

// ── Command history (↑/↓) ─────────────────────────────────────────────────
const cmdHist = [];
let cmdHistIdx = -1;

// ── Chat persistence (localStorage) ───────────────────────────────────────
const STORAGE_KEY = "manaos_shell_v1";
const MAX_SAVED = 60;

function stripTags(s) { return String(s).replace(/<[^>]*>/g, ""); }

function saveMsg(type, text) {
  try {
    const arr = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    arr.push({ type, text: String(text).slice(0, 600), ts: Date.now() });
    while (arr.length > MAX_SAVED) arr.shift();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
  } catch (_e) {}
}

function loadStoredMsgs() {
  try {
    const arr = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    if (!arr.length) return;
    hideEmpty();
    for (const { type, text } of arr) {
      const el = document.createElement("div");
      el.className = `msg ${type === "user" ? "user" : "agent"}`;
      const label = type === "user" ? "M" : "OS";
      el.innerHTML = type === "user"
        ? `<div class="avatar">${label}</div><div class="bubble">${escHtml(text)}</div>`
        : `<div class="avatar">${label}</div><div class="bubble" style="opacity:.8"><span style="font-size:10px;color:var(--muted);display:block;margin-bottom:2px">restored ─</span>${escHtml(text)}</div>`;
      historyEl.appendChild(el);
    }
    scrollEnd();
  } catch (_e) {}
}

function clearStorage() {
  localStorage.removeItem(STORAGE_KEY);
  historyEl.querySelectorAll(".msg").forEach(m => m.remove());
  if (emptyState) emptyState.style.display = "";
}

function healService(name) {
  const label = `⟳ ${name} heal`;
  appendUser(label);
  const thinkingEl = appendThinking();
  const headers = { "Content-Type": "application/json" };
  const key = apiKeyEl.value.trim();
  if (key) headers["X-API-Key"] = key;
  fetch("/api/shell/heal", { method: "POST", headers, body: JSON.stringify({ service: name }) })
    .then(r => r.json().then(d => ({ ok: r.ok, status: r.status, data: d })))
    .then(({ ok, status, data }) => {
      const exitCode = data.exit_code ?? "?";
      const out = (data.stdout || "").trim();
      const mainText = ok
        ? `<span style="color:var(--ok)">heal 完了 (exit ${exitCode})</span>${out ? `<pre style="margin-top:6px;white-space:pre-wrap;font-size:11px">${escHtml(out.slice(0,800))}</pre>` : ""}`
        : `<span style="color:var(--fail)">heal 失敗 (exit ${exitCode})</span><br><pre style="font-size:11px">${escHtml((data.stderr||"").slice(0,400))}</pre>`;
      const el = document.createElement("div");
      el.className = "msg agent";
      el.innerHTML = `
        <div class="avatar">OS</div>
        <div class="bubble">
          <span class="intent-tag ${ok ? 'tag-system_control' : 'tag-error'}">${ok ? 'HEALED' : 'ERROR'}</span>
          <div style="margin-top:6px">${mainText}</div>
          ${ts()}
        </div>`;
      thinkingEl.replaceWith(el);
      saveMsg("agent", `[heal] ${name} exit=${exitCode}`);
      scrollEnd();
      loadServices(); // サイドバー即更新
    })
    .catch(err => {
      replaceThinking(thinkingEl, { status: "dispatch_error", error: String(err), plan: {} });
    });
}
// ── DOM refs ───────────────────────────────────────────────────────────────
const layoutEl    = document.getElementById("layout");
const historyEl   = document.getElementById("history");
const emptyState  = document.getElementById("empty-state");
const msgInput    = document.getElementById("msg-input");
const dryCheck    = document.getElementById("dry-check");
const useSSE      = document.getElementById("use-sse");
const apiKeyEl    = document.getElementById("api-key");
const sendBtn     = document.getElementById("send-btn");
const statusBadge = document.getElementById("status-badge");
const toast       = document.getElementById("toast");
const sidebarEl   = document.getElementById("sidebar");
const svcList     = document.getElementById("svc-list");
const sidebarBtn  = document.getElementById("sidebar-toggle");

// ── Sidebar toggle ─────────────────────────────────────────────────────────
let sidebarVisible = true;
function toggleSidebar() {
  sidebarVisible = !sidebarVisible;
  layoutEl.classList.toggle("no-sidebar", !sidebarVisible);
  sidebarBtn.style.color = sidebarVisible ? "var(--accent)" : "";
}
sidebarBtn.addEventListener("click", toggleSidebar);

// ── Services panel ─────────────────────────────────────────────────────────
async function loadServices() {
  svcList.innerHTML = '<div class="svc-loading">loading…</div>';
  const apiKey = apiKeyEl.value.trim();
  const headers = {};
  if (apiKey) headers["X-API-Key"] = apiKey;
  try {
    const r = await fetch(SERVICES_URL, { headers });
    if (!r.ok) { svcList.innerHTML = `<div class="svc-loading" style="color:var(--fail)">HTTP ${r.status}</div>`; return; }
    const data = await r.json();
    renderServices(data.services || []);
  } catch (e) {
    svcList.innerHTML = `<div class="svc-loading" style="color:var(--fail)">${escHtml(e.message)}</div>`;
  }
}

function renderServices(svcs) {
  if (!svcs.length) { svcList.innerHTML = '<div class="svc-loading">No services</div>'; return; }
  const down = svcs.filter(s => s.summary === "DOWN" || s.summary === "TIMEOUT");
  // ヘッダー DOWN バッジ更新
  if (downBadge) {
    if (down.length) {
      downBadge.textContent = `▼ DOWN: ${down.length}`;
      downBadge.style.display = "inline-block";
    } else {
      downBadge.style.display = "none";
    }
  }
  const core = svcs.filter(s => s.section === "core");
  const opt  = svcs.filter(s => s.section === "optional");
  let html = "";
  if (core.length) {
    html += '<div class="sidebar-section">Core</div>';
    html += core.map(svcRow).join("");
  }
  const optEnabled = opt.filter(s => s.enabled);
  if (optEnabled.length) {
    html += '<div class="sidebar-section">Optional</div>';
    html += optEnabled.map(svcRow).join("");
  }
  svcList.innerHTML = html;
}

function svcRow(s) {
  const dotClass = s.summary === "OK" ? "ok"
    : s.summary === "DOWN" || s.summary === "TIMEOUT" ? "down"
    : !s.enabled ? "skip" : "warn";
  const port = s.port ? `:${s.port}` : "";
  const safeName = s.name.replace(/\\/g, "\\\\").replace(/'/g, "\\'");
  const healBtn = dotClass === "down"
    ? `<button class="svc-heal-btn" onclick="healService('${safeName}')" title="heal ${escHtml(s.name)}">⟳</button>`
    : "";
  const restartBtn = dotClass !== "skip"
    ? `<button class="svc-restart-btn" onclick="restartService('${safeName}')" title="restart ${escHtml(s.name)}">↺</button>`
    : "";
  return `<div class="svc-row" title="${escHtml(s.health)} / ${escHtml(s.summary)}">
    <span class="svc-dot ${dotClass}"></span>
    <span class="svc-name">${escHtml(s.name)}</span>
    <span class="svc-port">${port}</span>
    ${healBtn}${restartBtn}
  </div>`;
}

// Auto-load + refresh every 30s
loadServices();
setInterval(loadServices, 30000);

// ── Restart service (direct API) ─────────────────────────────────────────
function restartService(name) {
  const label = `↺ ${name} restart`;
  appendUser(label);
  const thinkingEl = appendThinking();
  const headers = { "Content-Type": "application/json" };
  const key = apiKeyEl.value.trim();
  if (key) headers["X-API-Key"] = key;
  fetch("/api/shell/restart", { method: "POST", headers, body: JSON.stringify({ service: name }) })
    .then(r => r.json().then(d => ({ ok: r.ok, status: r.status, data: d })))
    .then(({ ok, status, data }) => {
      const exitCode = data.exit_code ?? "?";
      const out = (data.stdout || "").trim();
      const mainText = ok
        ? `<span style="color:var(--ok)">restart 完了 (exit ${exitCode})</span>${out ? `<pre style="margin-top:6px;white-space:pre-wrap;font-size:11px">${escHtml(out.slice(0,800))}</pre>` : ""}`
        : `<span style="color:var(--fail)">restart 失敗 (exit ${exitCode})</span><br><pre style="font-size:11px">${escHtml((data.stderr||"").slice(0,400))}</pre>`;
      const el = document.createElement("div");
      el.className = "msg agent";
      el.innerHTML = `
        <div class="avatar">OS</div>
        <div class="bubble">
          <span class="intent-tag ${ok ? 'tag-system_control' : 'tag-error'}">${ok ? 'RESTARTED' : 'ERROR'}</span>
          <div style="margin-top:6px">${mainText}</div>
          ${ts()}
        </div>`;
      thinkingEl.replaceWith(el);
      saveMsg("agent", `[restart] ${name} exit=${exitCode}`);
      scrollEnd();
      loadServices();
    })
    .catch(err => {
      replaceThinking(thinkingEl, { status: "dispatch_error", error: String(err), plan: {} });
    });
}

// ── Health poll ────────────────────────────────────────────────────────────

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg, ms = 3000) {
  toast.textContent = msg;
  toast.style.display = "block";
  setTimeout(() => { toast.style.display = "none"; }, ms);
}

// ── Example pills ──────────────────────────────────────────────────────────
function setMsg(text, dry = false) {
  msgInput.value = text;
  dryCheck.checked = dry;
  msgInput.focus();
}

// ── hh:mm timestamp helper ────────────────────────────────────────────────
function ts() {
  const d = new Date();
  return `<span class="ts">${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}</span>`;
}

// ── Append user bubble ─────────────────────────────────────────────────────
function appendUser(text) {
  hideEmpty();
  const el = document.createElement("div");
  el.className = "msg user";
  el.innerHTML = `
    <div class="avatar">M</div>
    <div class="bubble">${escHtml(text)}${ts()}</div>`;
  historyEl.appendChild(el);
  scrollEnd();
  saveMsg("user", text);
}

// ── Append agent bubble (SSE streaming) ───────────────────────────────────
function appendAgentSSE() {
  hideEmpty();
  const el = document.createElement("div");
  el.className = "msg agent";
  el.innerHTML = `
    <div class="avatar">OS</div>
    <div class="bubble">
      <div id="sse-steps" style="display:flex;flex-direction:column;gap:2px"></div>
      <div id="sse-result" style="margin-top:6px;display:none"></div>
      <span id="sse-ts" class="ts"></span>
    </div>`;
  historyEl.appendChild(el);
  scrollEnd();
  return {
    el,
    steps: el.querySelector("#sse-steps"),
    resultEl: el.querySelector("#sse-result"),
  };
}

function addStep(stepsEl, icon, text) {
  const line = document.createElement("div");
  line.className = "step-line";
  line.innerHTML = `<span class="s-icon">${icon}</span>${escHtml(text)}`;
  stepsEl.appendChild(line);
  scrollEnd();
}

function finalizeSSE(refs, lastData) {
  const data = lastData;
  if (!data) return;
  const isDry   = data.status === "dry_run";
  const isError = data.status === "dispatch_error" || data.step === "error";
  const plan    = data.plan || {};
  const intent  = (data.intent && !data.plan) ? data : (plan.intent || {});
  const dispatchInfo = plan.dispatch || {};

  // determine intent type from various SSE payloads
  const intentType = intent.intent_type || (data.plan && data.plan.intent && data.plan.intent.intent_type) || "unknown";
  const confidence = intent.confidence ? `${Math.round(intent.confidence * 100)}%` : "";
  const classifier = plan.classifier || "";
  const method     = dispatchInfo.method || "";
  const urlStr     = data.dispatch || dispatchInfo.url || "";
  const result     = data.result || {};

  const tagClass = isDry ? "tag-dry_run"
    : isError ? "tag-error"
    : `tag-${intentType}`;
  const tagLabel = isDry ? "DRY RUN" : isError ? "ERROR" : intentType.replace("_", " ");

  let mainText = "";
  if (isError) {
    mainText = `<span style="color:var(--fail)">${escHtml(data.error || "error")}</span>`;
  } else if (isDry) {
    mainText = `実行せずにプランを返しました。`;
  } else {
    mainText = summarizeResult(intentType, result, data.http_status);
  }

  const dispatchLine = urlStr
    ? `<div class="dispatch-line"><span class="method">${method}</span> <span class="url">${escHtml(urlStr)}</span></div>`
    : "";

  const resultJson = JSON.stringify(isDry ? plan : (Object.keys(result).length ? result : data), null, 2);

  refs.resultEl.style.display = "";
  refs.resultEl.innerHTML = `
    <div>
      <span class="intent-tag ${tagClass}">${tagLabel}</span>
      ${confidence ? `<span style="font-size:11px;color:var(--muted);margin-left:4px">${escHtml(confidence)} · ${escHtml(classifier)}</span>` : ""}
    </div>
    ${dispatchLine}
    <div style="margin-bottom:4px">${mainText}</div>
    <details>
      <summary style="font-size:11px;color:var(--muted);cursor:pointer">JSON ▾</summary>
      <div class="result-block">${escHtml(resultJson)}</div>
    </details>`;
  const tsEl = refs.el.querySelector("#sse-ts");
  if (tsEl) { const d = new Date(); tsEl.textContent = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
  saveMsg("agent", `[${intentType}] ${stripTags(mainText)}`);
  scrollEnd();
}

// ── Append thinking indicator (non-SSE) ───────────────────────────────────
function appendThinking() {
  hideEmpty();
  const el = document.createElement("div");
  el.className = "msg agent";
  el.id = "thinking";
  el.innerHTML = `
    <div class="avatar">OS</div>
    <div class="bubble thinking">
      <span class="dots"><span></span><span></span><span></span></span>
      <span>thinking…</span>
    </div>`;  // ts injected by replaceThinking
  historyEl.appendChild(el);
  scrollEnd();
  return el;
}

function replaceThinking(thinkingEl, data) {
  const isDry   = data.status === "dry_run";
  const isError = data.status === "dispatch_error";
  const plan    = data.plan || {};
  const intent  = plan.intent || {};
  const dispatch = plan.dispatch || {};
  const result  = data.result || {};

  const intentType = intent.intent_type || "unknown";
  const confidence = intent.confidence ? `${Math.round(intent.confidence * 100)}%` : "";
  const classifier = plan.classifier || "";
  const method     = dispatch.method || "";
  const urlStr     = data.dispatch || dispatch.url || "";

  const tagClass = isDry ? "tag-dry_run" : isError ? "tag-error" : `tag-${intentType}`;
  const tagLabel = isDry ? "DRY RUN" : isError ? "ERROR" : intentType.replace("_", " ");

  let mainText = "";
  if (isError) {
    mainText = `<span style="color:var(--fail)">${escHtml(data.error || "dispatch error")}</span>`;
  } else if (isDry) {
    mainText = `実行せずにプランを返しました。`;
  } else {
    mainText = summarizeResult(intentType, result, data.http_status);
  }

  const dispatchLine = urlStr
    ? `<div class="dispatch-line"><span class="method">${method}</span> <span class="url">${escHtml(urlStr)}</span></div>`
    : "";

  const resultJson = JSON.stringify(isDry ? plan : result, null, 2);

  const el = document.createElement("div");
  el.className = "msg agent";
  el.innerHTML = `
    <div class="avatar">OS</div>
    <div class="bubble">
      <div><span class="intent-tag ${tagClass}">${tagLabel}</span>
      ${confidence ? `<span style="font-size:11px;color:var(--muted);margin-left:4px">${confidence} · ${escHtml(classifier)}</span>` : ""}
      </div>
      ${dispatchLine}
      <div style="margin-bottom:4px">${mainText}</div>
      <details>
        <summary style="font-size:11px;color:var(--muted);cursor:pointer">JSON ▾</summary>
        <div class="result-block">${escHtml(resultJson)}</div>
      </details>
      ${ts()}
    </div>`;
  thinkingEl.replaceWith(el);
  saveMsg("agent", `[${intentType}] ${stripTags(mainText)}`);
  scrollEnd();
}

// ── Summarize result by intent type ───────────────────────────────────────
function summarizeResult(intentType, result, httpStatus) {
  if (httpStatus >= 400) {
    const err = result.error || result.message || JSON.stringify(result).slice(0, 80);
    return `<span style="color:var(--fail)">HTTP ${httpStatus}: ${escHtml(String(err))}</span>`;
  }
  if (intentType === "image_generation") {
    const pId = result.prompt_id || result.job_id;
    return pId
      ? `ComfyUI ジョブ受付 → <code style="color:var(--ok)">${escHtml(pId)}</code>`
      : `ComfyUI へ送信しました。`;
  }
  if (intentType === "system_control" || intentType === "device_status") {
    const services = result.integrations || result.services;
    if (services) {
      const entries = Object.entries(services);
      const up   = entries.filter(([,v]) => v === "ok"    || v?.status === "ok").length;
      const down = entries.filter(([,v]) => v === "error" || v?.status === "error").length;
      return `サービス状況: <span style="color:var(--ok)">↑${up}</span> / <span style="color:var(--fail)">↓${down}</span>`;
    }
    return `ステータスを取得しました。`;
  }
  if (intentType === "task_execution") {
    const pId = result.plan_id;
    return pId ? `プラン作成: <code style="color:var(--ok)">${escHtml(pId)}</code>` : `タスクを登録しました。`;
  }
  const response = result.response || result.text || result.content || result.answer || result.reply;
  if (response) {
    const s = String(response);
    return `<span style="white-space:pre-wrap">${escHtml(s.slice(0, 400))}${s.length > 400 ? "…" : ""}</span>`;
  }
  return `完了しました。`;
}

// ── Send (SSE) ─────────────────────────────────────────────────────────────
async function sendSSE(message) {
  const refs = appendAgentSSE();
  const body = { message, dry_run: dryCheck.checked };
  const apiKey = apiKeyEl.value.trim();

  let lastData = null;

  try {
    const resp = await fetch(SHELL_STREAM, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        ...(apiKey ? { "X-API-Key": apiKey } : {}),
      },
      body: JSON.stringify(body),
    });

    if (!resp.ok) {
      addStep(refs.steps, "✕", `HTTP ${resp.status}`);
      finalizeSSE(refs, { step: "error", error: `HTTP ${resp.status}` });
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      let idx;
      while ((idx = buf.indexOf("\n\n")) !== -1) {
        const chunk = buf.slice(0, idx).trim();
        buf = buf.slice(idx + 2);
        if (!chunk.startsWith("data:")) continue;

        let evt;
        try { evt = JSON.parse(chunk.slice(5).trim()); } catch { continue; }

        switch (evt.step) {
          case "classifying":
            addStep(refs.steps, "🔍", `分類中… "${escHtml(evt.message?.slice(0,40) ?? "")}"`);
            break;
          case "classified":
            addStep(refs.steps, "🏷", `${escHtml(evt.intent?.intent_type ?? "?")} (${Math.round((evt.intent?.confidence ?? 0) * 100)}%) via ${escHtml(evt.classifier ?? "")}`);
            break;
          case "dispatching":
            addStep(refs.steps, "→", `${escHtml(evt.method)} ${escHtml(evt.url)}`);
            break;
          case "done":
          case "error":
            lastData = evt;
            break;
        }
      }
    }
  } catch (e) {
    lastData = { step: "error", error: String(e) };
  }

  finalizeSSE(refs, lastData || { step: "error", error: "no response" });
}

// ── Send (fetch, non-SSE) ──────────────────────────────────────────────────
async function sendFetch(message) {
  const thinkingEl = appendThinking();
  const body = { message, dry_run: dryCheck.checked };
  const apiKey = apiKeyEl.value.trim();
  const headers = { "Content-Type": "application/json" };
  if (apiKey) headers["X-API-Key"] = apiKey;

  try {
    const resp = await fetch(SHELL_URL, {
      method: "POST",
      headers,
      body: JSON.stringify(body),
    });
    let data;
    try { data = await resp.json(); }
    catch { data = { status: "parse_error", error: await resp.text() }; }
    replaceThinking(thinkingEl, data);
  } catch (err) {
    replaceThinking(thinkingEl, { status: "dispatch_error", plan: {}, error: String(err) });
    showToast("接続エラー: " + err.message);
  }
}

// ── Main send dispatcher ───────────────────────────────────────────────────
async function send() {
  if (busy) return;
  let message = msgInput.value.trim();
  if (!message) return;
  msgInput.value = "";

  // ── Slash command shortcuts ───────────────────────────────────────────
  if (message.startsWith("/")) {
    const parts = message.slice(1).trim().split(/\s+/);
    const cmd = parts[0].toLowerCase();
    const arg = parts.slice(1).join(" ");
    if (cmd === "clear") { clearStorage(); return; }
    if (cmd === "services" || cmd === "svc") { loadServices(); return; }
    const remap = {
      status:  "全サービスの状態を確認して",
      heal:    arg ? `${arg} を heal して` : "DOWN サービスを全部 heal して",
      restart: arg ? `${arg} を再起動して` : "サービスを再起動して",
      report:  "現在の状態レポートを出して",
      analyze: "ログを分析して",
    };
    message = remap[cmd] ?? message.slice(1).trim();
    if (!message) return;
  }

  // command history
  if (!cmdHist.length || cmdHist[0] !== message) {
    cmdHist.unshift(message);
    if (cmdHist.length > 50) cmdHist.pop();
  }
  cmdHistIdx = -1;

  busy = true;
  sendBtn.disabled = true;
  msgInput.disabled = true;
  appendUser(message);

  try {
    if (useSSE.checked) {
      await sendSSE(message);
    } else {
      await sendFetch(message);
    }
  } finally {
    busy = false;
    sendBtn.disabled = false;
    msgInput.disabled = false;
    msgInput.focus();
    loadServices();
  }
}

// ── Command autocomplete ───────────────────────────────────────────────────
let suggestIdx = -1;

function updateSuggest() {
  const val = msgInput.value;
  if (!val.startsWith("/")) { hideSuggest(); return; }
  const frag = val.toLowerCase();
  const matches = SLASH_CMDS.filter(c => c.cmd.toLowerCase().startsWith(frag));
  if (!matches.length) { hideSuggest(); return; }
  suggestIdx = -1;
  cmdSuggest.innerHTML = matches.map((c, i) =>
    `<div class="cmd-item" data-idx="${i}" onmousedown="pickSuggest(${i})">
       <span class="cmd-name">${escHtml(c.cmd)}</span>
       <span class="cmd-desc">${escHtml(c.desc)}</span>
     </div>`
  ).join("");
  cmdSuggest._matches = matches;
  cmdSuggest.style.display = "block";
}

function hideSuggest() {
  cmdSuggest.style.display = "none";
  cmdSuggest._matches = [];
  suggestIdx = -1;
}

function pickSuggest(idx) {
  const m = (cmdSuggest._matches || [])[idx];
  if (!m) return;
  // コマンド部分だけ挿入（引数プレースホルダは除く）
  const base = m.cmd.split(" ")[0] + (m.cmd.includes("<") ? " " : " ");
  msgInput.value = base;
  hideSuggest();
  msgInput.focus();
}

function moveSuggest(dir) {
  const items = cmdSuggest.querySelectorAll(".cmd-item");
  if (!items.length) return false;
  items.forEach(el => el.classList.remove("active"));
  suggestIdx = (suggestIdx + dir + items.length) % items.length;
  items[suggestIdx].classList.add("active");
  return true;
}

msgInput.addEventListener("input", updateSuggest);
msgInput.addEventListener("blur", () => setTimeout(hideSuggest, 150));

// ── Key bindings ───────────────────────────────────────────────────────────
msgInput.addEventListener("keydown", e => {
  // 補完ポップアップが開いているとき ArrowUp/Down/Tab/Enter が補完に使われる
  if (cmdSuggest.style.display !== "none") {
    if (e.key === "ArrowDown") { e.preventDefault(); moveSuggest(1); return; }
    if (e.key === "ArrowUp")   { e.preventDefault(); moveSuggest(-1); return; }
    if (e.key === "Tab" || e.key === "Enter") {
      if (suggestIdx >= 0) { e.preventDefault(); pickSuggest(suggestIdx); return; }
    }
    if (e.key === "Escape") { e.preventDefault(); hideSuggest(); return; }
  }
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); return; }
  if (e.key === "ArrowUp") {
    e.preventDefault();
    if (cmdHistIdx < cmdHist.length - 1) {
      cmdHistIdx++;
      msgInput.value = cmdHist[cmdHistIdx];
      setTimeout(() => msgInput.setSelectionRange(9999, 9999), 0);
    }
    return;
  }
  if (e.key === "ArrowDown") {
    e.preventDefault();
    if (cmdHistIdx > 0) { cmdHistIdx--; msgInput.value = cmdHist[cmdHistIdx]; }
    else { cmdHistIdx = -1; msgInput.value = ""; }
    setTimeout(() => msgInput.setSelectionRange(9999, 9999), 0);
  }
});
sendBtn.addEventListener("click", send);

// ── Helpers ────────────────────────────────────────────────────────────────
function hideEmpty() {
  if (emptyState) emptyState.style.display = "none";
}
function scrollEnd() {
  historyEl.scrollTop = historyEl.scrollHeight;
}
function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// ── Init ───────────────────────────────────────────────────────────────────
loadStoredMsgs();
