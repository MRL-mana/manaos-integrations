name: Container Security Scan

on:
  push:
    branches: [master, main, develop]
    paths:
      - Docker/**
      - Dockerfile*
      - kubernetes/**
      - .github/workflows/container-security.yml
  pull_request:
    branches: [master, main, develop]
    paths:
      - Docker/**
      - Dockerfile*
      - kubernetes/**
      - .github/workflows/container-security.yml
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  detect-changes:
    name: Detect container-related changes
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      kubernetes: ${{ steps.filter.outputs.kubernetes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docker:
              - 'Docker/**'
              - 'Dockerfile*'
              - '.github/workflows/container-security.yml'
            kubernetes:
              - 'kubernetes/**'
              - '.github/workflows/container-security.yml'

  scan_docker:
    name: Scan Docker context
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.docker == 'true'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@0.34.1
        with:
          scan-type: fs
          scan-ref: Docker
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  scan_kubernetes:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.kubernetes == 'true'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate YAML syntax
        run: |
          python -m pip install --upgrade pip pyyaml
          python - <<'PY'
          import os
          import yaml

          target = 'kubernetes'
          if not os.path.isdir(target):
              print('kubernetes directory not found; skipping')
              raise SystemExit(0)

          failed = False
          for root, _, files in os.walk(target):
              for name in files:
                  if not name.endswith(('.yaml', '.yml')):
                      continue
                  path = os.path.join(root, name)
                  try:
                      with open(path, encoding='utf-8') as stream:
                          yaml.safe_load(stream)
                      print(f'OK {path}')
                  except Exception as exc:
                      failed = True
                      print(f'NG {path}: {exc}')

          if failed:
              raise SystemExit(1)
          PY
