version: 1
actions:
  # NOTE: セキュリティのため、backend側で明示的に許可したアクションだけ実行できます。
  # 実行はデフォルト無効（環境変数 MANAOS_RPG_ENABLE_ACTIONS=1 で有効化）。

  - id: quick_verify_local
    label: ローカル簡易検証（quick_verify_local）
    kind: pwsh_file
    path: tools/quick_verify_local.ps1
    cwd: .
    timeout_sec: 120
    tags: [ops]

  - id: pixel7_doctor
    label: Pixel7 ADB診断（Doctor）
    kind: pwsh_file
    path: pixel7_adb_doctor.ps1
    cwd: .
    timeout_sec: 90
    tags: [device]

  - id: comfyui_start
    label: ComfyUI 起動（8188 / background）
    kind: pwsh_file
    path: start_comfyui_local.ps1
    args: ["-Port", "8188", "-Background"]
    cwd: .\
    timeout_sec: 60
    tags: [ai, image]

  - id: comfyui_restart
    label: ComfyUI 再起動（8188 / kill+start）
    kind: pwsh_file
    path: manaos-rpg/scripts/actions/restart_comfyui_8188.ps1
    args: ["-Port", "8188"]
    cwd: .\
    timeout_sec: 90
    tags: [ai, image]

  - id: unified_proxy_sync
    label: Unified allowlist 同期（OpenAPI→unified_proxy.yaml）
    kind: pwsh_file
    path: manaos-rpg/scripts/actions/sync_unified_proxy_allowlist.ps1
    args: ["-Mode", "merge"]
    cwd: .\
    timeout_sec: 90
    tags: [ops]

  - id: unified_proxy_disable_404
    label: Unified allowlist 404自動無効化（台帳掃除）
    kind: pwsh_file
    path: manaos-rpg/scripts/actions/disable_unified_proxy_404.ps1
    args: ["-Limit", "800", "-TimeoutSec", "6"]
    cwd: .\
    timeout_sec: 120
    tags: [ops]

  - id: unified_proxy_enable_core_read
    label: Unified allowlist コアread有効化（安全なGETのみ）
    kind: pwsh_file
    path: manaos-rpg/scripts/actions/enable_unified_proxy_core_read.ps1
    args: ["-DryRun", "0"]
    cwd: .\
    timeout_sec: 60
    tags: [ops]

  - id: unified_proxy_enable_read_exists
    label: Unified allowlist 実在read自動有効化（GET probe）
    kind: pwsh_file
    path: manaos-rpg/scripts/actions/enable_unified_proxy_read_exists.ps1
    args: ["-Limit", "600", "-TimeoutSec", "2.0", "-MaxEnable", "80"]
    cwd: .\
    timeout_sec: 120
    tags: [ops]

  - id: mrl_memory_write_on_full
    label: mrl-memory 書き込みON（full / recreate）
    kind: pwsh_file
    path: manaos-rpg/scripts/actions/enable_mrl_memory_write.ps1
    args: ["-Full"]
    cwd: .\
    timeout_sec: 120
    tags: [memory, ops]

  - id: mrl_memory_write_off
    label: mrl-memory 書き込みOFF（readonly / recreate）
    kind: pwsh_file
    path: manaos-rpg/scripts/actions/disable_mrl_memory_write.ps1
    cwd: .\
    timeout_sec: 120
    tags: [memory, ops]

  - id: disk_top10_d
    label: Dドライブ大容量ファイル Top10
    kind: pwsh_file
    path: manaos-rpg/scripts/actions/disk_top10_d.ps1
    args: ["-Top", "10"]
    cwd: .\
    timeout_sec: 180
    tags: [ops, storage]

  - id: disk_top10_h
    label: Hドライブ大容量ファイル Top10
    kind: pwsh_file
    path: manaos-rpg/scripts/actions/disk_top10_h.ps1
    args: ["-Top", "10"]
    cwd: .\
    timeout_sec: 180
    tags: [ops, storage]

  - id: disk_top_hot
    label: 逼迫ドライブ大容量ファイル Top10（自動判定）
    kind: pwsh_file
    path: manaos-rpg/scripts/actions/disk_top_hot.ps1
    args: ["-Top", "10", "-MinUsedPercent", "80"]
    cwd: .\
    timeout_sec: 300
    tags: [ops, storage]

  - id: disk_tidy_c_d_report
    label: C(OS)/D(AI)整理候補レポート（削除なし）
    kind: pwsh_file
    path: manaos-rpg/scripts/actions/disk_tidy_c_d_report.ps1
    args: ["-TopFolders", "8", "-TopFileCount", "12", "-RecentDays", "14", "-MinFileGB", "1"]
    cwd: .\
    timeout_sec: 420
    tags: [ops, storage]

  - id: google_drive_backup_recent
    label: Google DriveへD(AI)最近生成物をバックアップ
    kind: pwsh_file
    path: manaos-rpg/scripts/actions/google_drive_backup_recent.ps1
    args: ["-MaxFiles", "20", "-RecentHours", "24", "-MinSizeMB", "5", "-FolderPath", "ManaOS_Backup/D_AI"]
    cwd: .\
    timeout_sec: 900
    tags: [ops, storage, backup, cloud]

  - id: organize_c_ai_to_d
    label: CのAI生成物をD(AI)へ整理移動
    kind: pwsh_file
    path: manaos-rpg/scripts/actions/organize_c_ai_to_d.ps1
    args: ["-MaxFiles", "120", "-RecentDays", "30"]
    cwd: .\
    timeout_sec: 900
    tags: [ops, storage, organize]

  - id: google_drive_backup_and_stage
    label: Google Driveへバックアップ後にDへ退避
    kind: pwsh_file
    path: manaos-rpg/scripts/actions/google_drive_backup_and_stage.ps1
    args: ["-MaxFiles", "30", "-RecentHours", "72", "-MinSizeMB", "5", "-FolderPath", "ManaOS_Backup/D_AI"]
    cwd: .\
    timeout_sec: 1200
    tags: [ops, storage, backup, cloud, organize]
