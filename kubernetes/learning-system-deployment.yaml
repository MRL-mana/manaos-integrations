apiVersion: apps/v1
kind: Deployment
metadata:
  name: learning-system
  namespace: manaos
  labels:
    app: learning-system
    tier: core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: learning-system
  template:
    metadata:
      labels:
        app: learning-system
        tier: core
    spec:
      containers:
      - name: learning-system
        image: manaos/learning-system:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 9508
          name: http
          protocol: TCP
        env:
        - name: LEARNING_SYSTEM_PORT
          valueFrom:
            configMapKeyRef:
              name: manaos-config
              key: LEARNING_SYSTEM_PORT
        - name: LEARNING_SYSTEM_HOST
          value: "0.0.0.0"
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: manaos-config
              key: LOG_LEVEL
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 9508
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 9508
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: learning-system-data-pvc
      - name: logs
        persistentVolumeClaim:
          claimName: learning-system-logs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: learning-system
  namespace: manaos
  labels:
    app: learning-system
spec:
  type: ClusterIP
  selector:
    app: learning-system
  ports:
  - port: 9508
    targetPort: 9508
    protocol: TCP
    name: http
