# Default values for ManaOS Helm Chart

# Global settings
global:
  namespace: manaos
  imagePullPolicy: Always
  storageClass: standard

# Unified API
unifiedApi:
  enabled: true
  replicaCount: 3
  image:
    repository: manaos/unified-api
    tag: latest
  service:
    type: LoadBalancer
    port: 9502
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilization: 70
    targetMemoryUtilization: 80
  persistence:
    data:
      enabled: true
      size: 10Gi
    logs:
      enabled: true
      size: 5Gi

# MRL Memory
mrlMemory:
  enabled: true
  replicaCount: 2
  image:
    repository: manaos/mrl-memory
    tag: latest
  service:
    type: ClusterIP
    port: 9507
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilization: 70
  persistence:
    cache:
      enabled: true
      size: 5Gi
    logs:
      enabled: true
      size: 2Gi

# Learning System
learningSystem:
  enabled: true
  replicaCount: 2
  image:
    repository: manaos/learning-system
    tag: latest
  service:
    type: ClusterIP
    port: 9508
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilization: 70
  persistence:
    data:
      enabled: true
      size: 5Gi
    logs:
      enabled: true
      size: 2Gi

# LLM Routing
llmRouting:
  enabled: true
  replicaCount: 2
  image:
    repository: manaos/llm-routing
    tag: latest
  service:
    type: ClusterIP
    port: 9509
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# Gallery API
galleryApi:
  enabled: true
  replicaCount: 2
  image:
    repository: manaos/gallery-api
    tag: latest
  service:
    type: ClusterIP
    port: 5559
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  persistence:
    images:
      enabled: true
      size: 20Gi

# Video Pipeline
videoPipeline:
  enabled: false
  replicaCount: 1
  image:
    repository: manaos/video-pipeline
    tag: latest
  service:
    type: ClusterIP
    port: 9511
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2000m"

# Monitoring
monitoring:
  enabled: true
  
  # Prometheus
  prometheus:
    enabled: true
    replicaCount: 1
    image:
      repository: prom/prometheus
      tag: latest
    service:
      type: ClusterIP
      port: 9090
    persistence:
      enabled: true
      size: 50Gi
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"
  
  # Grafana
  grafana:
    enabled: true
    replicaCount: 1
    image:
      repository: grafana/grafana
      tag: latest
    service:
      type: ClusterIP
      port: 3000
    persistence:
      enabled: true
      size: 10Gi
    adminPassword: admin
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "500m"

# Ingress
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: api.manaos.example.com
      paths:
        - path: /
          service: unified-api
          port: 9502
    - host: grafana.manaos.example.com
      paths:
        - path: /
          service: grafana
          port: 3000
    - host: prometheus.manaos.example.com
      paths:
        - path: /
          service: prometheus
          port: 9090
  tls:
    - secretName: manaos-tls-cert
      hosts:
        - api.manaos.example.com
        - grafana.manaos.example.com
        - prometheus.manaos.example.com

# Configuration
config:
  ports:
    unifiedApi: 9502
    mrlMemory: 9507
    learningSystem: 9508
    llmRouting: 9509
    galleryApi: 5559
    videoPipeline: 9511
  
  performance:
    workerProcesses: 4
    requestTimeout: 30
    maxConcurrentRequests: 100
  
  logging:
    level: INFO
    format: json
  
  cache:
    maxSize: 1000
    ttl: 3600

# Secrets (base64エンコードした値を使用)
secrets:
  braveApiKey: ""
  civitaiApiKey: ""
  openaiApiKey: ""
  anthropicApiKey: ""
