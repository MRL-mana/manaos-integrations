name: Tests

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - "manaos_integrations/**/*.py"
      - "tests/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/tests.yml"
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: false
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-timeout
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Detect test directories
      id: testdirs
      run: |
        if [ -d tests/unit ]; then
          echo "has_unit=true" >> $GITHUB_OUTPUT
        else
          echo "has_unit=false" >> $GITHUB_OUTPUT
        fi
        if [ -d tests/integration ]; then
          echo "has_integration=true" >> $GITHUB_OUTPUT
        else
          echo "has_integration=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Run unit tests with pytest
      if: steps.testdirs.outputs.has_unit == 'true'
      run: |
        pytest tests/unit/ -v --tb=short --timeout=30
      continue-on-error: false
    
    - name: Run integration tests
      if: matrix.python-version == '3.11' && steps.testdirs.outputs.has_integration == 'true'
      run: |
        pytest tests/integration/ -v --tb=short --timeout=60 -k "not (api_key_auth or external)"
      continue-on-error: false
    
    - name: Generate coverage report
      if: matrix.python-version == '3.11' && steps.testdirs.outputs.has_unit == 'true'
      run: |
        pytest tests/unit/ --cov=. --cov-report=xml --cov-report=html --timeout=30
      continue-on-error: false
    
    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.11' && steps.testdirs.outputs.has_unit == 'true' && env.CODECOV_TOKEN != ''
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        verbose: true
        token: ${{ env.CODECOV_TOKEN }}
      continue-on-error: true
