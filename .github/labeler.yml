python:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.py'

powershell:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.ps1'

ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'

docs:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'docs/**'

tests:
  - changed-files:
      - any-glob-to-any-file:
          - 'tests/**'
          - '**/test_*.py'
          - '**/*_test.py'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'requirements*.txt'
          - 'pyproject.toml'
          - '.github/dependabot.yml'
