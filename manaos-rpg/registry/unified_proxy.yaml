# Unified API Proxy allowlist (RPG backend)
# AUTO-GENERATED from Unified /openapi.json
#
# gate:
#   - read: 実行OK
#   - write: MANAOS_RPG_ENABLE_UNIFIED_WRITE=1 が必要
#   - danger: write + MANAOS_RPG_ENABLE_UNIFIED_DANGEROUS=1 が必要

rules:
- id: get_api_civitai_search
  label: CivitAIでモデルを検索
  method: GET
  path: /api/civitai/search
  gate: read
  enabled: true
  timeout_s: 12
- id: post_api_comfyui_generate
  label: ComfyUIで画像を生成
  method: POST
  path: /api/comfyui/generate
  gate: write
  enabled: true
  timeout_s: 180
- id: post_api_google_drive_upload
  label: Google Driveにファイルをアップロード
  method: POST
  path: /api/google_drive/upload
  gate: write
  enabled: true
  timeout_s: 120
- id: post_api_obsidian_create
  label: Obsidianにノートを作成
  method: POST
  path: /api/obsidian/create
  gate: write
  enabled: true
  timeout_s: 12
