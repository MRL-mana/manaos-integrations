name: Actionlint

on:
  schedule:
    - cron: '15 18 * * 0'
  push:
    branches: [master, main, develop]
    paths:
      - '.github/workflows/*.yml'
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run actionlint
        id: lint
        uses: rhysd/actionlint@v1.7.11
        with:
          args: -shellcheck=

      - name: Workflow lint summary
        if: always()
        run: |
          echo "## Actionlint completed" >> $GITHUB_STEP_SUMMARY
          echo "- shellcheck integration is disabled for deterministic CI signal" >> $GITHUB_STEP_SUMMARY
