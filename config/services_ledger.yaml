# =============================================================================
# ManaOS Services Ledger (SSOT)
# =============================================================================
# 配置先: config/services_ledger.yaml  (tools/validate_ledger.py デフォルトパス)
# 用途:
#   - サービス依存関係の Single Source of Truth
#   - tools/validate_ledger.py  → 定義整合性チェック
#   - tools/check_blast_radius.py → blast radius / 復旧順序の可視化
#   - tools/dashboard_cli.py     → ヘルス一覧表示
#
# tier 定義:
#   0 = 落ちたら全滅  (Tier0 が最優先復旧)
#   1 = 主要機能が止まる
#   2 = 便利機能が止まる (最後に復旧)
#
# 必須コアサービス (validate_ledger が強制確認):
#   memory / learning / llm_routing / unified_api
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# CORE GROUP  ―  必須サービス。ここが落ちると主要機能に影響。
# ─────────────────────────────────────────────────────────────────────────────
core:

  # ---------------------------------------------------------------------------
  # Tier 0 : 根幹。これが落ちると連鎖が始まる。
  # ⚠ Tier0 の自動停止・変更は禁止。必ず人間が手動で判断すること。
  # 復旧優先順: ollama → memory → llm_routing → unified_api
  # ---------------------------------------------------------------------------

  ollama:
    port: 11434
    url: "http://127.0.0.1:11434"
    enabled: true
    tier: 0
    blast_note: "LLM全推論が止まる。llm_routing→unified_api→ほぼ全機能が連鎖停止。"
    depends_on: []
    description: "Ollama LLMエンジン (外部プロセス)"
    health_url: "http://127.0.0.1:11434/api/tags"
    start_cmd: "ollama serve"
    stop_cmd: null
    auto_restart: true
    cost_risk: "low"
    recovery_hint: "ollama serve を手動実行。GPU/VRAM不足の場合は他の推論を先に停止。"

  llm_routing:
    port: 5111
    url: "http://127.0.0.1:5111"
    enabled: true
    tier: 0
    blast_note: "AI応答が全停止。intent_router / trinity / autonomy が機能不全。"
    depends_on: [ollama]
    description: "LLM ルーティング MCP サーバー"
    health_url: "http://127.0.0.1:5111/health"
    start_cmd: "python scripts/misc/manaos_llm_routing_api.py"
    stop_cmd: null
    auto_restart: true
    cost_risk: "low"
    recovery_hint: "ollama が先に UP していることを確認してから起動。ポート5111が使用中なら lsof -i:5111 で確認。"

  memory:
    port: 5105
    url: "http://127.0.0.1:5105"
    enabled: true
    tier: 0
    blast_note: "記憶読み書きが止まる。personality / secretary / learning が劣化運転に切り替わるか停止。"
    depends_on: []
    description: "MRL Memory 記憶管理システム (SSOT)"
    health_url: "http://127.0.0.1:5105/health"
    start_cmd: "python mrl_memory_integration.py"
    stop_cmd: null
    auto_restart: true
    cost_risk: "low"
    recovery_hint: "rag_memory.db が存在するか確認。破損時はバックアップから復元: backups/rag_memory.db.bak"

  unified_api:
    port: 9502
    url: "http://127.0.0.1:9502"
    enabled: true
    tier: 0
    blast_note: "API ゲートウェイ停止。secretary / trinity / task_queue / pixel7 系が全停止。"
    depends_on: [memory, llm_routing]
    description: "Unified API サーバー (統合ゲートウェイ)"
    health_url: "http://127.0.0.1:9502/health"
    start_cmd: "python unified_api/unified_api_server.py"
    stop_cmd: null
    auto_restart: true
    cost_risk: "low"
    recovery_hint: "memory と llm_routing の両方が UP してから起動。ポート9502競合時は再起動: restart_unified_api_port9502.ps1"

  # ---------------------------------------------------------------------------
  # Tier 1 : 主要機能 AI 人格・自律・秘書・タスク系
  # ---------------------------------------------------------------------------

  learning:
    port: 5126
    url: "http://127.0.0.1:5126"
    enabled: true
    tier: 1
    blast_note: "自動改善・最適化が停止。personality / autonomy の適応能力が落ちる。"
    depends_on: [memory, unified_api]
    description: "学習・自動改善システム"
    health_url: "http://127.0.0.1:5126/health"
    start_cmd: "python learning_system_api.py"
    stop_cmd: null
    auto_restart: true
    cost_risk: "low"
    recovery_hint: "learning_system_api.py の存在確認。memory / unified_api が先に UP していることを確認してから再起動。"

  personality:
    port: 5123
    url: "http://127.0.0.1:5123"
    enabled: true
    tier: 1
    blast_note: "AI 人格応答が劣化。trinity の Remi / Luna / Mina が素っ気なくなる。"
    depends_on: [memory, learning]
    description: "AI 人格システム"
    health_url: "http://127.0.0.1:5123/health"
    start_cmd: "python -m scripts.misc.personality_system"
    stop_cmd: null
    auto_restart: true
    cost_risk: "low"
    recovery_hint: "scripts/misc/personality_system.py の存在確認。memory / learning が UP してから起動。"

  autonomy:
    port: 5124
    url: "http://127.0.0.1:5124"
    enabled: true
    tier: 1
    blast_note: "自律タスク生成・RL ループが停止。RLAnything が機能しない。"
    depends_on: [memory, learning, personality]
    description: "自律エージェントシステム"
    health_url: "http://127.0.0.1:5124/health"
    start_cmd: "python scripts/misc/autonomy_system.py"
    stop_cmd: null
    auto_restart: true
    cost_risk: "low"
    recovery_hint: "scripts/misc/autonomy_system.py の存在確認。memory / learning / personality が全て UP してから起動。"

  secretary:
    port: 5125
    url: "http://127.0.0.1:5125"
