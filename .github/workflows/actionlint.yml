name: Actionlint

on:
  push:
    branches: [master, main, develop]
    paths:
      - '.github/workflows/*.yml'
  pull_request:
    branches: [master, main, develop]
    paths:
      - '.github/workflows/*.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run actionlint
        id: lint
        uses: rhysd/actionlint@v1
        with:
          reporter: ''

      - name: Workflow lint summary
        if: always()
        run: |
          echo "## Actionlint completed" >> $GITHUB_STEP_SUMMARY
          echo "- Reporter is disabled to avoid GitHub annotation limit" >> $GITHUB_STEP_SUMMARY
