# Advanced RBAC Configuration for ManaOS
# Implements Least Privilege Principle with Service Accounts
# Ref: https://kubernetes.io/docs/reference/access-authn-authz/rbac/

---
# Service Account for Unified API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: unified-api-sa
  namespace: manaos-production
  labels:
    app: unified-api
    security-tier: restricted
  annotations:
    description: "Service account for Unified API with minimal permissions"
automountServiceAccountToken: true  # Needed for K8s API access

---
# Service Account for MRL Memory
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mrl-memory-sa
  namespace: manaos-production
  labels:
    app: mrl-memory
    security-tier: restricted
  annotations:
    description: "Service account for MRL Memory service"
automountServiceAccountToken: false  # No K8s API access needed

---
# Service Account for Learning System
apiVersion: v1
kind: ServiceAccount
metadata:
  name: learning-system-sa
  namespace: manaos-production
  labels:
    app: learning-system
    security-tier: restricted
  annotations:
    description: "Service account for Learning System"
automountServiceAccountToken: false

---
# Service Account for LLM Routing
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-routing-sa
  namespace: manaos-production
  labels:
    app: llm-routing
    security-tier: restricted
  annotations:
    description: "Service account for LLM Routing service"
automountServiceAccountToken: false

---
# Role: Unified API - ConfigMap and Secret Reader
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: unified-api-role
  namespace: manaos-production
rules:
# Read-only access to ConfigMaps for configuration
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
  
# Read-only access to Secrets (API keys, credentials)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
  
# Service discovery
- apiGroups: [""]
  resources: ["services", "endpoints"]
  verbs: ["get", "list"]
  
# Pod information for health checks
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
  resourceNames: []  # Can only access own pod

---
# RoleBinding: Unified API
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: unified-api-rolebinding
  namespace: manaos-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: unified-api-role
subjects:
- kind: ServiceAccount
  name: unified-api-sa
  namespace: manaos-production

---
# Role: MRL Memory - Minimal Permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mrl-memory-role
  namespace: manaos-production
rules:
# Only read ConfigMaps for service configuration
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "watch"]
  
# Read specific secrets for database credentials
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["redis-credentials", "postgres-credentials"]

---
# RoleBinding: MRL Memory
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mrl-memory-rolebinding
  namespace: manaos-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mrl-memory-role
subjects:
- kind: ServiceAccount
  name: mrl-memory-sa
  namespace: manaos-production

---
# Role: Learning System
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: learning-system-role
  namespace: manaos-production
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "watch"]
  
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["postgres-credentials", "ml-model-credentials"]

---
# RoleBinding: Learning System
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: learning-system-rolebinding
  namespace: manaos-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: learning-system-role
subjects:
- kind: ServiceAccount
  name: learning-system-sa
  namespace: manaos-production

---
# Role: LLM Routing
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: llm-routing-role
  namespace: manaos-production
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "watch"]
  
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["llm-api-keys", "redis-credentials"]

---
# RoleBinding: LLM Routing
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: llm-routing-rolebinding
  namespace: manaos-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: llm-routing-role
subjects:
- kind: ServiceAccount
  name: llm-routing-sa
  namespace: manaos-production

---
# ClusterRole: Monitoring (Prometheus, Grafana)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: monitoring-clusterrole
  labels:
    app: prometheus
rules:
# Read pods, services, endpoints for service discovery
- apiGroups: [""]
  resources:
    - nodes
    - nodes/metrics
    - services
    - endpoints
    - pods
  verbs: ["get", "list", "watch"]

# Read deployment and statefulset for monitoring
- apiGroups: ["apps"]
  resources:
    - deployments
    - statefulsets
    - replicasets
  verbs: ["get", "list", "watch"]

# Read ingress for monitoring
- apiGroups: ["networking.k8s.io"]
  resources:
    - ingresses
  verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding: Monitoring
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: monitoring-clusterrolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: monitoring-clusterrole
subjects:
- kind: ServiceAccount
  name: prometheus-sa
  namespace: monitoring

---
# Service Account: Prometheus
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-sa
  namespace: monitoring
  labels:
    app: prometheus
automountServiceAccountToken: true

---
# ClusterRole: Developer (Read-Only Access)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: developer-readonly
  labels:
    rbac.manaos.io/role: developer
rules:
# View pods, services, deployments
- apiGroups: ["", "apps", "batch"]
  resources:
    - pods
    - pods/log
    - services
    - deployments
    - replicasets
    - statefulsets
    - jobs
    - cronjobs
  verbs: ["get", "list", "watch"]

# View configmaps (but not secrets)
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]

# View ingress
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch"]

# View horizontal pod autoscalers
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch"]

---
# ClusterRole: SRE (Full Access to Production)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre-full-access
  labels:
    rbac.manaos.io/role: sre
rules:
# Full access to core resources
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]

---
# ClusterRole: Security Auditor (Read-Only Sensitive Resources)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: security-auditor
  labels:
    rbac.manaos.io/role: security-auditor
rules:
# Read all resources including secrets
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]

# Read RBAC policies
- apiGroups: ["rbac.authorization.k8s.io"]
  resources:
    - roles
    - rolebindings
    - clusterroles
    - clusterrolebindings
  verbs: ["get", "list", "watch"]

# Read security policies
- apiGroups: ["policy"]
  resources:
    - podsecuritypolicies
  verbs: ["get", "list", "watch"]

# Read network policies
- apiGroups: ["networking.k8s.io"]
  resources:
    - networkpolicies
  verbs: ["get", "list", "watch"]

---
# RoleBinding: Developer Team Access to Development Namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developer-team-development
  namespace: manaos-development
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit  # Built-in Kubernetes role
subjects:
- kind: Group
  name: developer-team
  apiGroup: rbac.authorization.k8s.io

---
# RoleBinding: Developer Team Read-Only Access to Production
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developer-team-production-readonly
  namespace: manaos-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: developer-readonly
subjects:
- kind: Group
  name: developer-team
  apiGroup: rbac.authorization.k8s.io

---
# ClusterRoleBinding: SRE Team Full Access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sre-team-full-access
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sre-full-access
subjects:
- kind: Group
  name: sre-team
  apiGroup: rbac.authorization.k8s.io
- kind: User
  name: admin@manaos.local
  apiGroup: rbac.authorization.k8s.io

---
# ClusterRoleBinding: Security Team Audit Access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: security-team-audit-access
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: security-auditor
subjects:
- kind: Group
  name: security-team
  apiGroup: rbac.authorization.k8s.io

---
# ClusterRole: CI/CD Pipeline (Deployment Bot)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cicd-deployer
  labels:
    rbac.manaos.io/role: automation
rules:
# Manage deployments
- apiGroups: ["apps"]
  resources:
    - deployments
    - statefulsets
    - replicasets
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# Manage services
- apiGroups: [""]
  resources:
    - services
  verbs: ["get", "list", "watch", "create", "update", "patch"]

# Manage configmaps
- apiGroups: [""]
  resources:
    - configmaps
  verbs: ["get", "list", "watch", "create", "update", "patch"]

# Read secrets (but not create or delete)
- apiGroups: [""]
  resources:
    - secrets
  verbs: ["get", "list"]

# Manage ingress
- apiGroups: ["networking.k8s.io"]
  resources:
    - ingresses
  verbs: ["get", "list", "watch", "create", "update", "patch"]

# View pods for deployment status
- apiGroups: [""]
  resources:
    - pods
    - pods/log
  verbs: ["get", "list", "watch"]

# Manage HPAs
- apiGroups: ["autoscaling"]
  resources:
    - horizontalpodautoscalers
  verbs: ["get", "list", "watch", "create", "update", "patch"]

---
# Service Account: GitHub Actions CI/CD
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-actions-sa
  namespace: manaos-production
  labels:
    app: cicd
  annotations:
    description: "Service account for GitHub Actions CI/CD pipeline"
automountServiceAccountToken: true

---
# RoleBinding: GitHub Actions to Production
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-deployer
  namespace: manaos-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cicd-deployer
subjects:
- kind: ServiceAccount
  name: github-actions-sa
  namespace: manaos-production

---
# Token Request for GitHub Actions (Long-lived Token)
# Use this to generate a token for CI/CD authentication
apiVersion: v1
kind: Secret
metadata:
  name: github-actions-token
  namespace: manaos-production
  annotations:
    kubernetes.io/service-account.name: github-actions-sa
type: kubernetes.io/service-account-token

---
# ClusterRole: Backup Operator (Velero)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backup-operator
  labels:
    rbac.manaos.io/role: backup
rules:
# Full access to all resources for backup
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# Special permissions for PVs and PVCs
- apiGroups: [""]
  resources:
    - persistentvolumes
    - persistentvolumeclaims
  verbs: ["*"]

---
# Service Account: Velero Backup
apiVersion: v1
kind: ServiceAccount
metadata:
  name: velero-sa
  namespace: velero
  labels:
    app: velero
automountServiceAccountToken: true

---
# ClusterRoleBinding: Velero Backup Operator
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: velero-backup-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backup-operator
subjects:
- kind: ServiceAccount
  name: velero-sa
  namespace: velero

---
# Pod with ServiceAccount Example
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unified-api
  namespace: manaos-production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: unified-api
  template:
    metadata:
      labels:
        app: unified-api
    spec:
      serviceAccountName: unified-api-sa  # Use dedicated SA
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
      - name: api
        image: manaos/unified-api:latest
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/cache
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
