<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ManaOS Shell</title>
  <style>
    :root {
      --bg:        #0f172a;
      --panel:     #111827;
      --panel2:    #1a2236;
      --line:      #1f2937;
      --line2:     #374151;
      --text:      #e5e7eb;
      --muted:     #9ca3af;
      --accent:    #818cf8;
      --accent2:   #6366f1;
      --ok:        #22c55e;
      --warn:      #f59e0b;
      --fail:      #ef4444;
      --tag-img:   #7c3aed;
      --tag-sys:   #0ea5e9;
      --tag-task:  #f59e0b;
      --tag-llm:   #10b981;
      --tag-err:   #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 14px;
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-rows: 48px 1fr 72px;
      grid-template-columns: 1fr 260px;
      height: 100vh;
    }
    .layout header { grid-column: 1 / -1; }
    .layout .input-bar { grid-column: 1 / -1; }
    /* when sidebar hidden */
    .layout.no-sidebar { grid-template-columns: 1fr; }
    .layout.no-sidebar #sidebar { display: none; }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    header .logo {
      font-weight: 700;
      font-size: 15px;
      color: var(--accent);
      letter-spacing: .03em;
    }
    header .logo span { color: var(--text); }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--line);
      color: var(--muted);
    }
    a.dash-link {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
    }
    a.dash-link:hover { color: var(--text); }

    /* ── History ────────────────────────────────────────────────────────── */
    #history {
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #history::-webkit-scrollbar { width: 6px; }
    #history::-webkit-scrollbar-track { background: transparent; }
    #history::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 3px; }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fadeIn .15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .msg.user  { flex-direction: row-reverse; }
    .msg.user  .bubble { background: var(--accent2); color: #fff; border-radius: 16px 4px 16px 16px; }
    .msg.agent .bubble { background: var(--panel2); border: 1px solid var(--line); border-radius: 4px 16px 16px 16px; }
    /* bubble コピーボタン */
    .msg { position: relative; }
    .bubble-copy {
      display: none;
      position: absolute;
      top: 4px; right: 4px;
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--muted);
      font-size: 11px;
      padding: 1px 5px;
      cursor: pointer;
      z-index: 2;
      line-height: 1.6;
      transition: color .15s;
    }
    .msg:hover .bubble-copy { display: block; }
    .bubble-copy:hover { color: var(--accent); border-color: var(--accent); }
    .bubble-copy.copied { color: var(--ok); border-color: var(--ok); }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .ts {
      font-size: 10px;
      color: var(--muted);
      opacity: .6;
      margin-top: 4px;
      display: block;
      text-align: right;
    }
    .msg.user .ts { text-align: left; }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg.user  .avatar { background: var(--accent2); color: #fff; }
    .msg.agent .avatar { background: var(--line);    color: var(--accent); }

    /* intent badge inside bubble */
    .intent-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .tag-image_generation  { background: var(--tag-img);  color: #fff; }
    .tag-system_control    { background: var(--tag-sys);  color: #fff; }
    .tag-task_execution    { background: var(--tag-task); color: #000; }
    .tag-conversation      { background: var(--tag-llm);  color: #fff; }
    .tag-information_search{ background: var(--tag-llm);  color: #fff; }
    .tag-code_generation   { background: #0891b2; color: #fff; }
    .tag-data_analysis     { background: #7c3aed; color: #fff; }
    .tag-device_status     { background: var(--tag-sys);  color: #fff; }
    .tag-error             { background: var(--tag-err);  color: #fff; }
    .tag-dry_run           { background: var(--warn);     color: #000; }
    .tag-run_ok            { background: #16a34a;          color: #fff; }
    .tag-run_err           { background: var(--tag-err);   color: #fff; }
    .tag-help              { background: #6366f1;          color: #fff; }

    .dispatch-line {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      font-family: ui-monospace, monospace;
    }
    .dispatch-line .method { color: var(--ok); }
    .dispatch-line .url    { color: var(--accent); }

    .result-block {
      margin-top: 8px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      font-family: ui-monospace, monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      color: var(--text);
      max-height: 320px;
      overflow-y: auto;
    }
    .result-block::-webkit-scrollbar { width: 4px; }
    .result-block::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 2px; }

    .thinking {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      padding: 4px 0;
    }
    .dots span {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    /* ── Input bar ──────────────────────────────────────────────────────── */
    .input-bar {
      border-top: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
    }
    #msg-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--line2);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }

    .dry-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }
    .dry-label input { accent-color: var(--warn); cursor: pointer; }

    .api-key-group {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .api-key-group input {
      background: var(--bg);
      border: 1px solid var(--line2);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--muted);
      font-size: 12px;
      width: 140px;
      outline: none;
    }
    .api-key-group input:focus { border-color: var(--accent); color: var(--text); }

    #send-btn {
      background: var(--accent2);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 18px;
      height: 40px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent); }
    #send-btn:disabled { opacity: .5; cursor: default; }

    /* ── Toast ──────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 90px;
      right: 20px;
      background: var(--fail);
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
      z-index: 100;
    }

    /* ── Empty state ────────────────────────────────────────────────────── */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 8px;
      pointer-events: none;
      user-select: none;
    }
    .empty .icon  { font-size: 36px; opacity: .3; }
    .empty .hint  { font-size: 12px; opacity: .5; }
    .example-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      pointer-events: all;
      margin-top: 6px;
    }
    .pill {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color .12s;
    }
    /* ── Intent tag: stream steps ───────────────────────────────────────── */
    .step-line {
      font-size: 11px;
      color: var(--muted);
      font-family: ui-monospace, monospace;
      padding: 1px 0;
    }
    .step-line .s-icon { margin-right: 4px; }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    #sidebar {
      border-left: 1px solid var(--line);
      background: var(--panel);
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 2px; }
    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-refresh {
      background: none;
      border: 1px solid var(--line2);
      border-radius: 4px;
      color: var(--muted);
      padding: 1px 6px;
      font-size: 10px;
      cursor: pointer;
    }
    .sidebar-refresh:hover { color: var(--text); border-color: var(--accent); }
    .svc-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 6px;
      border-radius: 5px;
      font-size: 12px;
      line-height: 1.3;
    }
    .svc-row:hover { background: var(--panel2); }
    .svc-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .svc-dot.ok     { background: var(--ok); }
    .svc-dot.warn   { background: var(--warn); }
    .svc-dot.down   { background: var(--fail); }
    .svc-dot.skip   { background: var(--muted); }
    .svc-name { flex: 1; color: var(--text); }
    .svc-port { color: var(--muted); font-family: ui-monospace, monospace; font-size: 10px; }
    .svc-loading {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 12px 0;
    }
    .sidebar-section {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--line2);
      padding: 4px 6px 2px;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .sidebar-section:hover { color: var(--muted); }
    .sidebar-section .sec-arrow { font-size: 8px; transition: transform .2s; }
    .sidebar-section.collapsed .sec-arrow { transform: rotate(-90deg); }
    #svc-filter {
      width: calc(100% - 12px);
      margin: 4px 6px 4px;
      padding: 3px 6px;
      font-size: 11px;
      background: var(--line2);
      border: 1px solid var(--line2);
      border-radius: 4px;
      color: var(--text);
      outline: none;
    }
    #svc-filter:focus { border-color: var(--accent); }
    .svc-heal-btn {
      background: none;
      border: 1px solid var(--line2);
      border-radius: 4px;
      color: var(--warn);
      font-size: 10px;
      padding: 0 4px;
      cursor: pointer;
      line-height: 17px;
      flex-shrink: 0;
    }
    .svc-heal-btn:hover { background: var(--line2); }
    .svc-restart-btn {
      background: none;
      border: 1px solid var(--line2);
      border-radius: 4px;
      color: var(--muted);
      font-size: 10px;
      padding: 0 4px;
      cursor: pointer;
      line-height: 17px;
      flex-shrink: 0;
    }
    .svc-restart-btn:hover { background: var(--line2); color: var(--accent); }
    .svc-log-btn {
      background: none;
      border: 1px solid var(--line2);
      border-radius: 4px;
      color: var(--muted);
      font-size: 10px;
      padding: 0 4px;
      cursor: pointer;
      line-height: 17px;
      flex-shrink: 0;
    }
    .svc-log-btn:hover { background: var(--line2); color: var(--accent); }
    .svc-hint {
      font-size: 10px;
      color: var(--muted);
      padding: 0 6px 4px 20px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      border-left: 2px solid var(--fail);
      margin-bottom: 2px;
    }
    .svc-hint:hover { color: var(--text); white-space: normal; }
    .ev-item {
      padding: 3px 6px;
      font-size: 10px;
      border-bottom: 1px solid var(--line2);
      line-height: 1.4;
      cursor: default;
    }
    .ev-item:hover { background: var(--line2); }
    .ev-item .ev-type { font-weight: 600; }
    .ev-item .ev-det  { color: var(--muted); font-size: 9px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-left: 14px; }
    .report-section { margin-bottom: 8px; }
    .report-section h4 { font-size: 11px; font-weight: 700; margin: 4px 0 2px; padding-bottom: 2px; border-bottom: 1px solid var(--line2); }
    .svc-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 8px; margin: 1px 2px; }
    .svc-badge.up   { background: rgba(0,200,100,.15); color: var(--ok); }
    .svc-badge.down { background: rgba(220,50,50,.15);  color: var(--fail); }
    .svc-badge.dis  { background: var(--line2); color: var(--muted); }
    .cost-row { font-size: 11px; padding: 2px 0; display: flex; gap: 6px; align-items: center; }
    .cost-row .svc-name-c { flex: 1; }
    .cost-badge { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 6px; }
    .cost-badge.high { background: rgba(220,50,50,.2); color: var(--fail); }
    .cost-badge.med  { background: rgba(220,160,0,.2); color: var(--warn); }
    #score-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 8px;
      margin-left: 6px;
      transition: color .4s;
    }
    #timer-badge {
      display: none;
      font-size: 11px;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 8px;
      margin-left: 6px;
      cursor: default;
      white-space: nowrap;
    }
    #down-badge {
      display: none;
      background: var(--fail);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 7px;
      margin-left: 6px;
    }
    /* sidebar capture form */
    .capture-form {
      display: flex;
      gap: 3px;
      margin-bottom: 4px;
    }
    .capture-form input {
      flex: 1;
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--fg);
      font-size: 11px;
      padding: 3px 6px;
      outline: none;
    }
    .capture-form input:focus { border-color: var(--accent); }
    .capture-form button {
      background: var(--accent2);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      padding: 3px 8px;
      cursor: pointer;
    }
    .capture-form button:hover { opacity: .85; }
    #down-banner {
      display: none;
      background: rgba(239,68,68,.12);
      border: 1px solid var(--fail);
      border-radius: 5px;
      padding: 5px 8px;
      margin-bottom: 6px;
      font-size: 10px;
    }
    #down-banner .db-title {
      font-weight: 700;
      color: var(--fail);
      margin-bottom: 3px;
    }
    #down-banner .db-row {
      color: var(--fail);
      padding: 1px 0;
      cursor: pointer;
    }
    #down-banner .db-row:hover { text-decoration: underline; }
    #down-banner .db-heal {
      color: var(--warn);
      margin-left: 4px;
      cursor: pointer;
    }
    #gtd-badge {
      display: none;
      background: #7c3aed;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 8px;
      margin-left: 4px;
      cursor: pointer;
      white-space: nowrap;
    }
    #gtd-badge:hover { opacity: .82; }
    /* コマンド補完ポップアップ */
    #cmd-suggest {
      position: absolute;
      bottom: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 8px;
      z-index: 100;
      overflow: hidden;
      display: none;
    }
    .cmd-item {
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      gap: 8px;
      align-items: baseline;
    }
    .cmd-item:hover, .cmd-item.active { background: var(--line2); }
    .cmd-item .cmd-name { color: var(--accent); font-family: ui-monospace, monospace; font-weight: 600; }
    .cmd-item .cmd-desc { color: var(--muted); font-size: 11px; }
    .input-bar { position: relative; }
  </style>
</head>
<body>
<div class="layout" id="layout">

  <!-- Header -->
  <header>
    <div class="logo">ManaOS <span>Shell</span></div>
    <span id="score-badge" title="稼働率スコア (UP/全有効サービス)"></span>
    <span id="timer-badge" title="作業タイマー"></span>
    <span id="down-badge"></span>
    <span id="gtd-badge" title="GTD Inbox件数 (クリックで一覧)"></span>
    <div class="badge" id="status-badge">connecting…</div>
    <div class="header-right">
      <label class="dry-label" style="margin-right:8px">
        <input type="checkbox" id="use-sse" checked /> SSE
      </label>
      <button class="sidebar-refresh" id="sidebar-toggle" style="font-size:11px;padding:2px 8px">⊞ Services</button>
      <a class="dash-link" href="/api/integrations/status" target="_blank">JSON</a>
      <a class="dash-link" href="/status" target="_blank">Status</a>
      <a class="dash-link" href="/api/shell/history" target="_blank">[log]</a>
      <button class="sidebar-refresh" onclick="clearStorage()" title="チャット履歴をクリア" style="font-size:11px;padding:2px 8px;color:var(--fail)">🗑</button>
    </div>
  </header>

  <!-- History -->
  <div id="history">
    <div class="empty" id="empty-state">
      <div class="icon">⌘</div>
      <div>ManaOS Shell — 自然言語でOSを操作する</div>
      <div class="hint">Enter / Ctrl+Enter で送信</div>
      <div class="example-pills">
        <div class="pill" onclick="setMsg('comfyuiで猫の画像を生成して')">🎨 画像生成</div>
        <div class="pill" onclick="setMsg('全サービスの状態を確認して')">🔍 状態確認</div>
        <div class="pill" onclick="setMsg('LLMに挨拶して')">💬 会話</div>
        <div class="pill" onclick="setMsg('全サービスの状態を確認して', true)">🧪 dry_run</div>
      </div>
    </div>
  </div>

  <!-- Sidebar: Services + GTD -->
  <aside id="sidebar">
    <div class="sidebar-title">
      Services
      <button class="sidebar-refresh" id="svc-refresh-btn" onclick="loadServices()">&#8635;</button>
      <select id="svc-interval-sel" title="自動更新間隔" onchange="setSvcRefreshInterval(this.value)"
        style="font-size:9px;padding:1px 3px;border:1px solid var(--line2);background:var(--bg2);color:var(--fg);border-radius:3px;cursor:pointer;margin-left:2px">
        <option value="15">15s</option>
        <option value="30" selected>30s</option>
        <option value="60">60s</option>
        <option value="0">OFF</option>
      </select>
      <span id="svc-last-updated" title="最終更新" style="font-size:9px;color:var(--muted);margin-left:4px;vertical-align:middle"></span>
    </div>
    <div id="down-banner"></div>
    <input id="svc-filter" type="text" placeholder="フィルタ…" oninput="filterServices(this.value)" />

// ── Command history (↑/↓) ─ sessionStorage でタブ間永続 ─────────────────────────────
const _CMD_HIST_KEY = "manaos_cmd_hist";
const cmdHist = (() => { try { return JSON.parse(sessionStorage.getItem(_CMD_HIST_KEY) || "[]"); } catch(_e) { return []; } })();
let cmdHistIdx = -1;

// ── Chat persistence (localStorage) ───────────────────────────────────────
const STORAGE_KEY = "manaos_shell_v1";
const MAX_SAVED = 60;

function stripTags(s) { return String(s).replace(/<[^>]*>/g, ""); }

function saveMsg(type, text) {
  try {
    const arr = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    arr.push({ type, text: String(text).slice(0, 600), ts: Date.now() });
    while (arr.length > MAX_SAVED) arr.shift();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
  } catch (_e) {}
}

function loadStoredMsgs() {
  try {
    const arr = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    if (!arr.length) return;
    hideEmpty();
    for (const { type, text } of arr) {
      const el = document.createElement("div");
      el.className = `msg ${type === "user" ? "user" : "agent"}`;
      const label = type === "user" ? "M" : "OS";
      el.innerHTML = type === "user"
        ? `<div class="avatar">${label}</div><div class="bubble">${escHtml(text)}</div>`
        : `<div class="avatar">${label}</div><div class="bubble" style="opacity:.8"><span style="font-size:10px;color:var(--muted);display:block;margin-bottom:2px">restored ─</span>${escHtml(text)}</div>`;
      historyEl.appendChild(el);
    }
    scrollEnd();
  } catch (_e) {}
}

function clearStorage() {
  localStorage.removeItem(STORAGE_KEY);
  historyEl.querySelectorAll(".msg").forEach(m => m.remove());
  if (emptyState) emptyState.style.display = "";
}

function healService(name) {
  const label = `⟳ ${name} heal`;
  appendUser(label);
  const thinkingEl = appendThinking();
  const headers = { "Content-Type": "application/json" };
  const key = apiKeyEl.value.trim();
  if (key) headers["X-API-Key"] = key;
  fetch("/api/shell/heal", { method: "POST", headers, body: JSON.stringify({ service: name }) })
    .then(r => r.json().then(d => ({ ok: r.ok, status: r.status, data: d })))
    .then(({ ok, status, data }) => {
      const exitCode = data.exit_code ?? "?";
      const out = (data.stdout || "").trim();
      const mainText = ok
        ? `<span style="color:var(--ok)">heal 完了 (exit ${exitCode})</span>${out ? `<pre style="margin-top:6px;white-space:pre-wrap;font-size:11px">${escHtml(out.slice(0,800))}</pre>` : ""}`
        : `<span style="color:var(--fail)">heal 失敗 (exit ${exitCode})</span><br><pre style="font-size:11px">${escHtml((data.stderr||"").slice(0,400))}</pre>`;
      const el = document.createElement("div");
      el.className = "msg agent";
      el.innerHTML = `
        <div class="avatar">OS</div>
        <div class="bubble">
          <span class="intent-tag ${ok ? 'tag-system_control' : 'tag-error'}">${ok ? 'HEALED' : 'ERROR'}</span>
          <div style="margin-top:6px">${mainText}</div>
          ${ts()}
        </div>`;
      thinkingEl.replaceWith(el);
      saveMsg("agent", `[heal] ${name} exit=${exitCode}`);
      scrollEnd();
      loadServices(); // サイドバー即更新
    })
    .catch(err => {
      replaceThinking(thinkingEl, { status: "dispatch_error", error: String(err), plan: {} });
    });
}
// ── DOM refs ───────────────────────────────────────────────────────────────
const layoutEl    = document.getElementById("layout");
const historyEl   = document.getElementById("history");
const emptyState  = document.getElementById("empty-state");
const msgInput    = document.getElementById("msg-input");
const dryCheck    = document.getElementById("dry-check");
const useSSE      = document.getElementById("use-sse");
const apiKeyEl    = document.getElementById("api-key");
const sendBtn     = document.getElementById("send-btn");
const statusBadge = document.getElementById("status-badge");
const toast       = document.getElementById("toast");
const sidebarEl   = document.getElementById("sidebar");
const svcList     = document.getElementById("svc-list");
const sidebarBtn  = document.getElementById("sidebar-toggle");

// ── bubble コピーボタン (MutationObserver) ──────────────────────────────────
function _addCopyBtn(msgEl) {
  if (msgEl.querySelector(".bubble-copy")) return;
  const btn = document.createElement("button");
  btn.className = "bubble-copy";
  btn.textContent = "⎘";
  btn.title = "コピー";
  btn.addEventListener("click", () => {
    const bubble = msgEl.querySelector(".bubble");
    const text = bubble ? (bubble.innerText || bubble.textContent || "") : "";
    navigator.clipboard.writeText(text.trim()).then(() => {
      btn.textContent = "✓";
      btn.classList.add("copied");
      setTimeout(() => { btn.textContent = "⎘"; btn.classList.remove("copied"); }, 1500);
    }).catch(() => {});
  });
  msgEl.appendChild(btn);
}
new MutationObserver(muts => {
  for (const m of muts) for (const n of m.addedNodes)
    if (n.nodeType === 1 && n.classList && n.classList.contains("msg")) _addCopyBtn(n);
}).observe(historyEl, { childList: true });

// ── Sidebar toggle ─────────────────────────────────────────────────────────
let sidebarVisible = true;
function toggleSidebar() {
  sidebarVisible = !sidebarVisible;
  layoutEl.classList.toggle("no-sidebar", !sidebarVisible);
  sidebarBtn.style.color = sidebarVisible ? "var(--accent)" : "";
}
sidebarBtn.addEventListener("click", toggleSidebar);

// ── Services panel ─────────────────────────────────────────────────────────
async function loadServices() {
  svcList.innerHTML = '<div class="svc-loading">loading…</div>';
  const apiKey = apiKeyEl.value.trim();
  const headers = {};
  if (apiKey) headers["X-API-Key"] = apiKey;
  try {
    const r = await fetch(SERVICES_URL, { headers });
    if (!r.ok) { svcList.innerHTML = `<div class="svc-loading" style="color:var(--fail)">HTTP ${r.status}</div>`; return; }
    const data = await r.json();
    renderServices(data.services || []);
    const _updEl = document.getElementById("svc-last-updated");
    if (_updEl) { const _n = new Date(); _updEl.textContent = _n.getHours().toString().padStart(2,'0')+':'+_n.getMinutes().toString().padStart(2,'0')+':'+_n.getSeconds().toString().padStart(2,'0'); }
  } catch (e) {
    svcList.innerHTML = `<div class="svc-loading" style="color:var(--fail)">${escHtml(e.message)}</div>`;
  }
}

function renderServices(svcs) {
  if (!svcs.length) { svcList.innerHTML = '<div class="svc-loading">No services</div>'; return; }
  const down = svcs.filter(s => s.summary === "DOWN" || s.summary === "TIMEOUT");
  // ヘッダー DOWN バッジ更新
  if (downBadge) {
    if (down.length) {
      downBadge.textContent = `▼ DOWN: ${down.length}`;
      downBadge.style.display = "inline-block";
    } else {
      downBadge.style.display = "none";
    }
  }
  // サイドバー DOWN バナー更新
  const downBanner = document.getElementById("down-banner");
  if (downBanner) {
    if (down.length) {
      const rows = down.map(s => {
        const safe = s.name.replace(/'/g, "\\'");
        return `<div class="db-row" onclick="sendSvcCard('${safe}','/status ${safe}')">✗ <b>${escHtml(s.name)}</b>
          <span class="db-heal" onclick="event.stopPropagation();healService('${safe}')" title="heal">↻</span>
        </div>`;
      }).join("");
      downBanner.innerHTML = `<div class="db-title">⚠️ DOWN ${down.length}件</div>${rows}`;
      downBanner.style.display = "block";
    } else {
      downBanner.style.display = "none";
      downBanner.innerHTML = "";
    }
  }
  // ヘルス・スコア更新
  if (scoreBadge) {
    const enabled = svcs.filter(s => s.enabled !== false);
    const upCount = enabled.filter(s => s.summary === "OK").length;
    const score   = enabled.length ? Math.round(upCount / enabled.length * 100) : 100;
    scoreBadge.textContent = `⚡ ${score}`;
    scoreBadge.title = `稼働率: ${upCount}/${enabled.length} UP`;
    scoreBadge.style.color = score >= 90 ? "var(--ok)" : score >= 70 ? "var(--warn)" : "var(--fail)";
  }
  const core = svcs.filter(s => s.section === "core");
  const opt  = svcs.filter(s => s.section === "optional");
  let html = "";
  if (core.length) {
    html += `<div class="sidebar-section" data-sec="core" onclick="toggleSvcSection(this)"><span class="sec-arrow">&#9660;</span> Core (${core.length})</div>`;
    html += `<div class="sec-body" data-sec-body="core">${core.map(svcRow).join('')}</div>`;
  }
  const optEnabled = opt.filter(s => s.enabled);
  if (optEnabled.length) {
    html += `<div class="sidebar-section" data-sec="optional" onclick="toggleSvcSection(this)"><span class="sec-arrow">&#9660;</span> Optional (${optEnabled.length})</div>`;
    html += `<div class="sec-body" data-sec-body="optional">${optEnabled.map(svcRow).join('')}</div>`;
  }
  svcList.innerHTML = html;
}

function toggleSvcSection(hdr) {
  const key  = hdr.dataset.sec;
  const body = svcList.querySelector(`[data-sec-body="${key}"]`);
  if (!body) return;
  const collapsed = hdr.classList.toggle('collapsed');
  body.style.display = collapsed ? 'none' : '';
}

let _svcFilterVal = '';
function filterServices(val) {
  _svcFilterVal = val.toLowerCase();
  const rows = svcList.querySelectorAll('.svc-row, .svc-hint');
  rows.forEach(row => {
    if (!val) { row.style.display = ''; return; }
    const name = (row.querySelector('.svc-name') || row).textContent.toLowerCase();
    row.style.display = name.includes(_svcFilterVal) ? '' : 'none';
  });
  // セクションヘッダーの表示も調整
  svcList.querySelectorAll('.sidebar-section').forEach(sec => {
    const body = svcList.querySelector(`[data-sec-body="${sec.dataset.sec}"]`);
    if (body && !sec.classList.contains('collapsed')) {
      const visible = [...body.querySelectorAll('.svc-row')].some(r => r.style.display !== 'none');
      sec.style.display = visible || !val ? '' : 'none';
    }
  });
}

function svcRow(s) {
  const dotClass = s.summary === "OK" ? "ok"
    : s.summary === "DOWN" || s.summary === "TIMEOUT" ? "down"
    : !s.enabled ? "skip" : "warn";
  const port = s.port ? `:${s.port}` : "";
  const safeName = s.name.replace(/\\/g, "\\\\").replace(/'/g, "\\'");
  const deps = (s.depends_on || []);
  const depsTip = deps.length ? `depends: ${deps.join(", ")}` : "no deps";
  const hint = s.recovery_hint || "";
  const rowTitle = `${escHtml(s.health)} / ${escHtml(s.summary)} — ${depsTip}${hint ? " | " + hint.slice(0, 80) : ""}`;
  const healBtn = dotClass === "down"
    ? `<button class="svc-heal-btn" onclick="healService('${safeName}')" title="heal ${escHtml(s.name)}">⟳</button>`
    : "";
  const restartBtn = dotClass !== "skip"
    ? `<button class="svc-restart-btn" onclick="restartService('${safeName}')" title="restart ${escHtml(s.name)}">↺</button>`
    : "";
  const logBtn = dotClass !== "skip"
    ? `<button class="svc-log-btn" onclick="msgInput.value='/logs ${safeName}';send()" title="logs ${escHtml(s.name)}">📄</button>`
    : "";
  const hintHtml = (dotClass === "down" && hint)
    ? `<div class="svc-hint" title="${escHtml(hint)}" onclick="this.style.whiteSpace=this.style.whiteSpace==='normal'?'nowrap':'normal'">💡 ${escHtml(hint)}</div>`
    : "";
  return `<div class="svc-row" title="${rowTitle}">
    <span class="svc-dot ${dotClass}"></span>
    <span class="svc-name" style="cursor:pointer" onclick="sendSvcCard('${safeName}','/status ${safeName}')">${escHtml(s.name)}</span>
    <span class="svc-port">${port}</span>
    ${healBtn}${restartBtn}${logBtn}
  </div>${hintHtml}`;
}

// Auto-load + refresh (interval controlled by sidebar select)
let _svcRefreshTimer = null;
function setSvcRefreshInterval(secs) {
  if (_svcRefreshTimer) { clearInterval(_svcRefreshTimer); _svcRefreshTimer = null; }
  const s = parseInt(secs);
  if (s > 0) _svcRefreshTimer = setInterval(loadServices, s * 1000);
}
loadServices();
setSvcRefreshInterval(30);

// ── Restart service (direct API) ─────────────────────────────────────────
function restartService(name) {
  const label = `↺ ${name} restart`;
  appendUser(label);
  const thinkingEl = appendThinking();
  const headers = { "Content-Type": "application/json" };
  const key = apiKeyEl.value.trim();
  if (key) headers["X-API-Key"] = key;
  fetch("/api/shell/restart", { method: "POST", headers, body: JSON.stringify({ service: name }) })
    .then(r => r.json().then(d => ({ ok: r.ok, status: r.status, data: d })))
    .then(({ ok, status, data }) => {
      const exitCode = data.exit_code ?? "?";
      const out = (data.stdout || "").trim();
      const mainText = ok
        ? `<span style="color:var(--ok)">restart 完了 (exit ${exitCode})</span>${out ? `<pre style="margin-top:6px;white-space:pre-wrap;font-size:11px">${escHtml(out.slice(0,800))}</pre>` : ""}`
        : `<span style="color:var(--fail)">restart 失敗 (exit ${exitCode})</span><br><pre style="font-size:11px">${escHtml((data.stderr||"").slice(0,400))}</pre>`;
      const el = document.createElement("div");
      el.className = "msg agent";
      el.innerHTML = `
        <div class="avatar">OS</div>
        <div class="bubble">
          <span class="intent-tag ${ok ? 'tag-system_control' : 'tag-error'}">${ok ? 'RESTARTED' : 'ERROR'}</span>
          <div style="margin-top:6px">${mainText}</div>
          ${ts()}
        </div>`;
      thinkingEl.replaceWith(el);
      saveMsg("agent", `[restart] ${name} exit=${exitCode}`);
      scrollEnd();
      loadServices();
    })
    .catch(err => {
      replaceThinking(thinkingEl, { status: "dispatch_error", error: String(err), plan: {} });
    });
}

// ── Health poll ────────────────────────────────────────────────────────────
async function pollHealth() {
  try {
    const r = await fetch(HEALTH_URL);
    statusBadge.textContent = r.ok ? "● online" : "⚠ degraded";

  } catch {
    statusBadge.textContent = "✕ offline";

}

// サイドバー Inbox クイックキャプチャ
async function sidebarCapture(e) {
  e.preventDefault();
  const inp = document.getElementById("capture-input");
  const text = inp ? inp.value.trim() : "";
  if (!text) return;
  inp.value = "";
  inp.disabled = true;
  try {
    const hdrs = { "Content-Type": "application/json" };
    const key = apiKeyEl.value.trim();
    if (key) hdrs["X-API-Key"] = key;
    const r = await fetch("/api/gtd/capture", { method: "POST", headers: hdrs, body: JSON.stringify({ text }) });
    if (r.ok) {
      // 軽量トースト表示
      showToast(`📥 Inbox: ${text.slice(0,30)}${text.length>30?"…":""}`, 2000);
      pollGtdStatus();
    } else {
      showToast("⚠ capture 失敗", 2000);
    }
  } catch(err) {
    showToast(`⚠ ${err.message}`, 2000);
  } finally {
    if (inp) inp.disabled = false;
    if (inp) inp.focus();
  }
}

async function pollGtdStatus() {
  try {
    const r = await fetch("/api/gtd/status");
    if (!r.ok) return;
    const d = await r.json();
    const inbox      = d.inbox_count ?? 0;
    const na         = d.next_actions ?? 0;
    const today      = d.daily_log_today;
    const ct         = d.current_task;   // {name, started_at, timer_min} or null
    const timerRem   = d.timer_remaining_min ?? null;  // int or null
    const somN       = d.someday_count  ?? 0;
    const waitN      = d.waiting_count  ?? 0;
    const projN      = d.projects_count ?? 0;
    const overdueN   = d.overdue_count   ?? 0;
    const dueTodayN  = d.due_today_count ?? 0;
    // ヘッダー GTD バッジ更新
    if (overdueN > 0) {
      gtdBadge.textContent = `⚠️ ${overdueN}`;
      gtdBadge.style.color = "var(--fail)";
      gtdBadge.style.display = "";
    } else if (ct) {
      gtdBadge.textContent = `🔥`;
      gtdBadge.style.color = "";
      gtdBadge.style.display = "";
    } else if (inbox > 0) {
      gtdBadge.textContent = `📋 ${inbox}`;
      gtdBadge.style.color = "";
      gtdBadge.style.display = "";
    } else if (na > 0) {
      gtdBadge.textContent = `✅ ${na}`;
      gtdBadge.style.color = "";
      gtdBadge.style.display = "";
    } else {
      gtdBadge.style.display = "none";
    }
    // タイマーバッジ更新
    if (timerBadge) {
      if (ct && timerRem !== null) {
        const tCol = timerRem > 5 ? "var(--ok)" : timerRem > 0 ? "var(--warn)" : "var(--fail)";
        const remStr = timerRem > 0 ? `残${timerRem}分` : `超過${-timerRem}分`;
        timerBadge.textContent = `⏱ ${remStr}`;
        timerBadge.style.color = tCol;
        timerBadge.style.display = "";
      } else {
        timerBadge.style.display = "none";
      }
    }
    // ローカルカウントダウン用にタイマー終了時刻をキャッシュ
    if (ct && ct.started_at && ct.timer_min) {
      _timerEnd = new Date(new Date(ct.started_at).getTime() + ct.timer_min * 60000);
      _timerTask = ct.name || "";
    } else if (!ct) {
      _timerEnd  = null;
      _timerTask  = "";
    }
    // 経過時間計算
    let elapsedStr = "";
    if (ct && ct.started_at) {
      const diffMs  = Date.now() - new Date(ct.started_at).getTime();
      const diffMin = Math.floor(diffMs / 60000);
      elapsedStr = diffMin < 60
        ? `${diffMin}分経過`
        : `${Math.floor(diffMin / 60)}時間${diffMin % 60}分経過`;
    }
    // サイドパネル更新
    const gtdSide = document.getElementById("gtd-side");
    if (gtdSide) {
      const inboxColor = inbox > 0 ? "var(--warn)" : "var(--ok)";
      const naColor    = na > 0    ? "var(--ok)"   : "var(--muted)";
      const somColor   = somN > 0  ? "var(--muted)" : "var(--muted)";
      const logMark    = today     ? "✅" : "❌";
      const ctRow = ct
        ? `<div class="svc-row" style="background:rgba(255,200,0,.08)">
            <span style="font-size:10px">🔥</span>
            <span class="svc-name" style="color:var(--warn);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" title="${escHtml(ct.name)}" onclick="msgInput.value='/done';send()">${escHtml(ct.name)}</span>
            <span class="svc-port" style="color:var(--warn);font-size:10px">${elapsedStr}</span>
            <button class="svc-log-btn" style="color:var(--ok);font-size:13px" onclick="msgInput.value='/done';send()" title="完了">✅</button>
            <button class="svc-log-btn" style="color:var(--muted);font-size:13px" onclick="msgInput.value='/gtd stop';send()" title="中断">🛑</button>
          </div>
          ${_timerEnd ? `<div style="font-size:10px;padding:1px 6px 4px 22px;color:${Date.now() < _timerEnd.getTime() ? 'var(--ok)' : 'var(--fail)'}">⏱ ${Math.max(0, Math.ceil((_timerEnd.getTime() - Date.now()) / 60000))}分</div>` : ''}`
        : `<div class="svc-row" style="cursor:pointer" onclick="sendDoRich(null,null,'/do')">
            <span style="font-size:10px">▶️</span>
            <span class="svc-name" style="color:var(--muted)"><em>作業開始</em></span>
          </div>`;
      const overdueRow = overdueN > 0
        ? `<div class="svc-row" style="cursor:pointer;background:rgba(255,60,60,.10)" onclick="msgInput.value='/next --overdue';send()">
            <span style="font-size:10px">⚠️</span>
            <span class="svc-name" style="color:var(--fail)">期限超過</span>
            <span class="svc-port" style="color:var(--fail);font-weight:700">${overdueN}件!</span>
          </div>` : "";
      const dueTodayRow = dueTodayN > 0
        ? `<div class="svc-row" style="cursor:pointer;background:rgba(255,180,0,.10)" onclick="msgInput.value='/next --due-today';send()">
            <span style="font-size:10px">📅</span>
            <span class="svc-name" style="color:var(--warn)">今日期限</span>
            <span class="svc-port" style="color:var(--warn)">${dueTodayN}件</span>
          </div>` : "";
      gtdSide.innerHTML = ctRow + overdueRow + dueTodayRow + `
        <div class="svc-row" style="cursor:pointer" onclick="toggleInbox()" id="inbox-toggle-row">
          <span style="font-size:10px">📥</span>
          <span class="svc-name">Inbox</span>
          <span class="svc-port" style="color:${inboxColor}">${inbox}件 <span id="inbox-toggle-arrow">▶</span></span>
        </div>
        <div id="inbox-inline-list" style="display:none"></div>
        <div class="svc-row" style="cursor:pointer" onclick="toggleNextActions()" id="na-toggle-row">
          <span style="font-size:10px">✅</span>
          <span class="svc-name">Next Actions</span>
          <span class="svc-port" style="color:${naColor}">${na}件 <span id="na-toggle-arrow">▶</span></span>
        </div>
        <div id="na-inline-list" style="display:none"></div>
        <div class="svc-row" style="cursor:pointer" onclick="msgInput.value='/projects';send()">
          <span style="font-size:10px">📁</span>
          <span class="svc-name">Projects</span>
          <span class="svc-port" style="color:var(--muted)">${projN}件</span>
        </div>
        <div class="svc-row" style="cursor:pointer" onclick="msgInput.value='/someday';send()">
          <span style="font-size:10px">📦</span>
          <span class="svc-name">Someday</span>
          <span class="svc-port" style="color:${somColor}">${somN}件</span>
        </div>
        <div class="svc-row" style="cursor:pointer" onclick="msgInput.value='/waiting';send()">
          <span style="font-size:10px">⏳</span>
          <span class="svc-name">Waiting</span>
          <span class="svc-port" style="color:var(--muted)">${waitN}件</span>
        </div>
        <div class="svc-row" style="cursor:pointer" onclick="msgInput.value='/morning';send()">
          <span style="font-size:10px">📅</span>
          <span class="svc-name">今日のログ</span>
          <span class="svc-port">${logMark}</span>
        </div>
        <div class="svc-row" style="cursor:pointer" onclick="msgInput.value='/edit';msgInput.focus()">
          <span style="font-size:10px">✏️</span>
          <span class="svc-name" style="color:var(--muted)"><em>Edit Task</em></span>
        </div>
        <div class="svc-row" style="cursor:pointer" onclick="msgInput.value='/memo ';msgInput.focus()">
          <span style="font-size:10px">➕</span>
          <span class="svc-name" style="color:var(--muted)"><em>+ Capture</em></span>
        </div>`;
    }
  } catch { /* silent */ }
}
gtdBadge.addEventListener("click", () => { msgInput.value = "/inbox"; send(); });
pollGtdStatus();
setInterval(pollGtdStatus, 30000);

// ── タイマーローカルカウントダウン (1分 tick) ─────────────────────────────
let _timerEnd  = null;
let _timerTask = "";
let _timerAlerted = false;

function _updateTimerBadge() {
  if (!timerBadge || !_timerEnd) return;
  const remMs  = _timerEnd - Date.now();
  const remMin = Math.ceil(remMs / 60000);
  const tCol   = remMin > 5 ? "var(--ok)" : remMin > 0 ? "var(--warn)" : "var(--fail)";
  const remStr = remMin > 0 ? `残${remMin}分` : `超過${-remMin}分`;
  timerBadge.textContent = `⏱ ${remStr}`;
  timerBadge.style.color = tCol;
  timerBadge.style.display = "";
  // タイマー期限到達でトースト通知（1回のみ）
  if (remMin <= 0 && !_timerAlerted) {
    _timerAlerted = true;
    showToast(`⏰ タイマー終了: ${_timerTask}`, 6000);

  if (remMin > 0) _timerAlerted = false;

// ── Events sidebar widget ─────────────────────────────────────────────────────
const EV_COLOR = {
  service_down:  "var(--fail)",
  heal_fail:     "var(--fail)",
  heal_ok:       "var(--ok)",
  heal_trigger:  "var(--warn)",
  analyze:       "var(--muted)",
  policy:        "var(--warn)",
};
const EV_ICON = {
  service_down:  "🔴",
  heal_fail:     "🔴",
  heal_ok:       "🟢",
  heal_trigger:  "🟡",
  analyze:       "🔵",
  policy:        "🟡",
};
async function pollEventsWidget() {
  const container = document.getElementById("events-side");
  if (!container) return;
  try {
    const resp = await fetch("/api/events?n=8");
    if (!resp.ok) { container.innerHTML = '<div class="svc-loading">ERR</div>'; return; }
    const data = await resp.json();
    const evs  = data.events || [];
    if (!evs.length) {
      container.innerHTML = '<div class="svc-loading" style="color:var(--muted)">イベントなし</div>';
      return;
    }
    let html = "";
    for (const e of [...evs].reverse()) {
      const col  = EV_COLOR[e.event] || "var(--muted)";
      const icon = EV_ICON[e.event]  || "⚪";
      const t    = (e.time || "").slice(11, 16);
      const svc  = e.service ? `&nbsp;<span style="color:var(--accent)">${escHtml(e.service)}</span>` : "";
      const det  = escHtml((e.detail || "").slice(0, 48));
      html += `<div class="ev-item" title="${escHtml(e.detail || '')}">`
            + `<span>${icon}</span> <span class="ev-type" style="color:${col}">${escHtml(e.event)}</span>${svc}`
            + `&nbsp;<span style="color:var(--muted);font-size:9px">${t}</span>`
            + (det ? `<div class="ev-det">${det}</div>` : "")
            + `</div>`;
    }
    container.innerHTML = html;
  } catch { /* silent */ }
}
pollEventsWidget();

async function sendReportCard(label) {
  appendUser(label);
  const thinkingEl = appendThinking();
  try {
    const resp = await fetch("/api/report");
    const d    = await resp.json();
    const s    = d.summary || {};
    const up   = s.up   || [];
    const down = s.down || [];
    const dis  = s.disabled || [];
    const gen  = (d.generated_at || "").slice(0, 19).replace("T", " ");

    const badge = (name, cls) => `<span class="svc-badge ${cls}">${escHtml(name)}</span>`;
    const upHtml   = up.map(n => badge(n, "up")).join("")   || '<span style="color:var(--muted)">なし</span>';
    const downHtml = down.map(n => badge(n, "down")).join("") || '<span style="color:var(--ok)">なし ✓</span>';
    const disHtml  = dis.map(n => badge(n, "dis")).join("")  || '<span style="color:var(--muted)">なし</span>';

    const scoreColor = down.length === 0 ? "var(--ok)" : (down.length <= 2 ? "var(--warn)" : "var(--fail)");
    const healHtml = d.heal_log_tail && d.heal_log_tail.length
      ? `<div class="report-section"><h4>📜 heal.log (末尾)</h4><pre style="font-size:9px;max-height:80px;overflow-y:auto;color:var(--muted)">${escHtml(d.heal_log_tail.slice(-5).join("\n"))}</pre></div>`
      : "";

    const el = document.createElement("div");
    el.className = "msg agent";
    el.innerHTML = `
      <div class="avatar">OS</div>
      <div class="bubble">
        <div style="margin-bottom:6px">
          <span class="intent-tag tag-run_ok">REPORT</span>
          <span style="font-size:11px;color:var(--muted);margin-left:6px">${gen}</span>
          <span style="margin-left:10px;font-size:12px;font-weight:700;color:${scoreColor}">⬆️ ${up.length} UP / 🔴 ${down.length} DOWN</span>
        </div>
        <div class="report-section"><h4>✅ UP (${up.length})</h4>${upHtml}</div>
        <div class="report-section"><h4>🔴 DOWN (${down.length})</h4>${downHtml}</div>
        <div class="report-section"><h4>⏸️ Disabled (${dis.length})</h4>${disHtml}</div>
        ${healHtml}
        ${ts()}
      </div>`;
    thinkingEl.replaceWith(el);
    scrollEnd();
    saveMsg("agent", `[report] UP:${up.length} DOWN:${down.length}`);
  } catch (err) {
    thinkingEl.replaceWith(errBubble(err));
    scrollEnd();
  }
}

// ── /cost ビジュアルカード ─────────────────────────────────────────────
async function sendCostCard(label) {
  appendUser(label);
  const thinkingEl = appendThinking();
  try {
    const resp = await fetch("/api/cost");
    const d    = await resp.json();
    const high = d.high || [];
    const med  = d.med  || [];

    function costRows(arr, cls) {
      if (!arr.length) return '<div style="color:var(--muted);font-size:10px">なし</div>';
      return arr.map(r => {
        const stColor = r.status === "UP" ? "var(--ok)" : "var(--fail)";
        return `<div class="cost-row">`
          + `<span class="cost-badge ${cls}">${cls.toUpperCase()}</span>`
          + `<span class="svc-name-c">${escHtml(r.service)}</span>`
          + `<span style="color:var(--muted);font-size:10px">Tier${r.tier}</span>`
          + `<span style="color:${stColor};font-size:10px">${escHtml(r.status)}</span>`
          + `</div>`;
      }).join("");
    }

    const runningHigh = high.filter(r => r.status === "UP").length;
    const total = high.length + med.length;
    const el = document.createElement("div");
    el.className = "msg agent";
    el.innerHTML = `
      <div class="avatar">OS</div>
      <div class="bubble">
        <div style="margin-bottom:6px">
          <span class="intent-tag ${runningHigh ? 'tag-run_err' : 'tag-run_ok'}">COST</span>
          <span style="font-size:11px;color:var(--muted);margin-left:6px">${total}件監視対象</span>
          ${runningHigh ? `<span style="margin-left:8px;color:var(--fail);font-size:11px">⚠️ HIGH ${runningHigh}件稼働中</span>` : ''}
        </div>
        <div class="report-section"><h4>🔴 HIGH COST (${high.length})</h4>${costRows(high, "high")}</div>
        <div class="report-section"><h4>🟡 MED COST (${med.length})</h4>${costRows(med, "med")}</div>
        ${ts()}
      </div>`;
    thinkingEl.replaceWith(el);
    scrollEnd();
    saveMsg("agent", `[cost] HIGH:${high.length} MED:${med.length}`);
  } catch (err) {
    thinkingEl.replaceWith(errBubble(err));
    scrollEnd();
  }
}

// ── GTD Process (batch) ───────────────────────────────────────────────────
async function sendGtdProcess(index, dest, label) {
  appendUser(label);
  const thinkingEl = appendThinking();
  // DEST_MAP 表示名
  const DEST_LABEL = { next:"Next Actions", project:"Projects", projects:"Projects",
    someday:"Someday", waiting:"Waiting", done:"Done (archive)" };
  try {
    const resp = await fetch("/api/gtd/process", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ index, to: dest }),
    });
    const data = await resp.json().catch(() => ({ status: "error" }));
    const ok = resp.ok;
    const el = document.createElement("div");
    el.className = "msg agent";
    el.innerHTML = `
      <div class="avatar">OS</div>
      <div class="bubble">
        <div style="margin-bottom:4px"><span class="intent-tag ${ok ? "tag-run_ok" : "tag-run_err"}">${ok ? "GTD MOVED" : "GTD ERR"}</span></div>
        <pre class="result-block">${escHtml(ok ? `\u2705 [${index}] → ${DEST_LABEL[dest] || dest}\n${data.target || ""}` : JSON.stringify(data, null, 2))}</pre>
        ${ts()}
      </div>`;
    thinkingEl.replaceWith(el);
    scrollEnd();
    saveMsg("agent", ok ? `[GTD process] ${index}->${dest}` : "[GTD ERR]");
    if (ok) pollGtdStatus();
  } catch (err) {
    const el = document.createElement("div");
    el.className = "msg agent";
    el.innerHTML = `<div class="avatar">OS</div><div class="bubble" style="color:var(--fail)">GTD Process Error<br>${escHtml(String(err))}${ts()}</div>`;
    thinkingEl.replaceWith(el);
    scrollEnd();
  }
}

function finalizeSSE(refs, lastData) {
  const data = lastData;
  if (!data) return;
  const isDry   = data.status === "dry_run";
  const isError = data.status === "dispatch_error" || data.step === "error";
  const plan    = data.plan || {};
  const intent  = (data.intent && !data.plan) ? data : (plan.intent || {});
  const dispatchInfo = plan.dispatch || {};

  // determine intent type from various SSE payloads
  const intentType = intent.intent_type || (data.plan && data.plan.intent && data.plan.intent.intent_type) || "unknown";
  const confidence = intent.confidence ? `${Math.round(intent.confidence * 100)}%` : "";
  const classifier = plan.classifier || "";
  const method     = dispatchInfo.method || "";
  const urlStr     = data.dispatch || dispatchInfo.url || "";
  const result     = data.result || {};

  const tagClass = isDry ? "tag-dry_run"
    : isError ? "tag-error"
    : `tag-${intentType}`;
  const tagLabel = isDry ? "DRY RUN" : isError ? "ERROR" : intentType.replace("_", " ");

  let mainText = "";
  if (isError) {
    mainText = `<span style="color:var(--fail)">${escHtml(data.error || "error")}</span>`;
  } else if (isDry) {
    mainText = `実行せずにプランを返しました。`;
  } else {
    mainText = summarizeResult(intentType, result, data.http_status);
  }

  const dispatchLine = urlStr
    ? `<div class="dispatch-line"><span class="method">${method}</span> <span class="url">${escHtml(urlStr)}</span></div>`
    : "";

  const resultJson = JSON.stringify(isDry ? plan : (Object.keys(result).length ? result : data), null, 2);

  refs.resultEl.style.display = "";
  refs.resultEl.innerHTML = `
    <div>
      <span class="intent-tag ${tagClass}">${tagLabel}</span>
      ${confidence ? `<span style="font-size:11px;color:var(--muted);margin-left:4px">${escHtml(confidence)} · ${escHtml(classifier)}</span>` : ""}
    </div>
    ${dispatchLine}
    <div style="margin-bottom:4px">${mainText}</div>
    <details>
      <summary style="font-size:11px;color:var(--muted);cursor:pointer">JSON ▾</summary>
      <div class="result-block">${escHtml(resultJson)}</div>
    </details>`;
  const tsEl = refs.el.querySelector("#sse-ts");
  if (tsEl) { const d = new Date(); tsEl.textContent = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
  saveMsg("agent", `[${intentType}] ${stripTags(mainText)}`);
  scrollEnd();
}

function replaceThinking(thinkingEl, data) {
  const isDry   = data.status === "dry_run";
  const isError = data.status === "dispatch_error";
  const plan    = data.plan || {};
  const intent  = plan.intent || {};
  const dispatch = plan.dispatch || {};
  const result  = data.result || {};

  const intentType = intent.intent_type || "unknown";
  const confidence = intent.confidence ? `${Math.round(intent.confidence * 100)}%` : "";
  const classifier = plan.classifier || "";
  const method     = dispatch.method || "";
  const urlStr     = data.dispatch || dispatch.url || "";

  const tagClass = isDry ? "tag-dry_run" : isError ? "tag-error" : `tag-${intentType}`;
  const tagLabel = isDry ? "DRY RUN" : isError ? "ERROR" : intentType.replace("_", " ");

  let mainText = "";
  if (isError) {
    mainText = `<span style="color:var(--fail)">${escHtml(data.error || "dispatch error")}</span>`;
  } else if (isDry) {
    mainText = `実行せずにプランを返しました。`;
  } else {
    mainText = summarizeResult(intentType, result, data.http_status);
  }

  const dispatchLine = urlStr
    ? `<div class="dispatch-line"><span class="method">${method}</span> <span class="url">${escHtml(urlStr)}</span></div>`
    : "";

  const resultJson = JSON.stringify(isDry ? plan : result, null, 2);

  const el = document.createElement("div");
  el.className = "msg agent";
  el.innerHTML = `
    <div class="avatar">OS</div>
    <div class="bubble">
      <div><span class="intent-tag ${tagClass}">${tagLabel}</span>
      ${confidence ? `<span style="font-size:11px;color:var(--muted);margin-left:4px">${confidence} · ${escHtml(classifier)}</span>` : ""}
      </div>
      ${dispatchLine}
      <div style="margin-bottom:4px">${mainText}</div>
      <details>
        <summary style="font-size:11px;color:var(--muted);cursor:pointer">JSON ▾</summary>
        <div class="result-block">${escHtml(resultJson)}</div>
      </details>
      ${ts()}
    </div>`;
  thinkingEl.replaceWith(el);
  saveMsg("agent", `[${intentType}] ${stripTags(mainText)}`);
  scrollEnd();
}

// ── Summarize result by intent type ───────────────────────────────────────
function summarizeResult(intentType, result, httpStatus) {
  if (httpStatus >= 400) {
    const err = result.error || result.message || JSON.stringify(result).slice(0, 80);
    return `<span style="color:var(--fail)">HTTP ${httpStatus}: ${escHtml(String(err))}</span>`;
  }
  if (intentType === "image_generation") {
    const pId = result.prompt_id || result.job_id;
    return pId
      ? `ComfyUI ジョブ受付 → <code style="color:var(--ok)">${escHtml(pId)}</code>`
      : `ComfyUI へ送信しました。`;
  }
  if (intentType === "system_control" || intentType === "device_status") {
    const services = result.integrations || result.services;
    if (services) {
      const entries = Object.entries(services);
      const up   = entries.filter(([,v]) => v === "ok"    || v?.status === "ok").length;
      const down = entries.filter(([,v]) => v === "error" || v?.status === "error").length;
      return `サービス状況: <span style="color:var(--ok)">↑${up}</span> / <span style="color:var(--fail)">↓${down}</span>`;
    }
    return `ステータスを取得しました。`;
  }
  if (intentType === "task_execution") {
    const pId = result.plan_id;
    return pId ? `プラン作成: <code style="color:var(--ok)">${escHtml(pId)}</code>` : `タスクを登録しました。`;
  }
  const response = result.response || result.text || result.content || result.answer || result.reply;
  if (response) {
    const s = String(response);
    return `<span style="white-space:pre-wrap">${escHtml(s.slice(0, 400))}${s.length > 400 ? "…" : ""}</span>`;
  }
  return `完了しました。`;
}

// ── Send (SSE) ─────────────────────────────────────────────────────────────
async function sendSSE(message) {
  const refs = appendAgentSSE();
  const body = { message, dry_run: dryCheck.checked };
  const apiKey = apiKeyEl.value.trim();

  let lastData = null;

  try {
    const resp = await fetch(SHELL_STREAM, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        ...(apiKey ? { "X-API-Key": apiKey } : {}),
      },
      body: JSON.stringify(body),
    });

    if (!resp.ok) {
      addStep(refs.steps, "✕", `HTTP ${resp.status}`);
      finalizeSSE(refs, { step: "error", error: `HTTP ${resp.status}` });
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      let idx;
      while ((idx = buf.indexOf("\n\n")) !== -1) {
        const chunk = buf.slice(0, idx).trim();
        buf = buf.slice(idx + 2);
        if (!chunk.startsWith("data:")) continue;

        let evt;
        try { evt = JSON.parse(chunk.slice(5).trim()); } catch { continue; }

        switch (evt.step) {
          case "classifying":
            addStep(refs.steps, "🔍", `分類中… "${escHtml(evt.message?.slice(0,40) ?? "")}"`);
            break;
          case "classified":
            addStep(refs.steps, "🏷", `${escHtml(evt.intent?.intent_type ?? "?")} (${Math.round((evt.intent?.confidence ?? 0) * 100)}%) via ${escHtml(evt.classifier ?? "")}`);
            break;
          case "dispatching":
            addStep(refs.steps, "→", `${escHtml(evt.method)} ${escHtml(evt.url)}`);
            break;
          case "done":
          case "error":
            lastData = evt;
            break;
        }
      }
    }
  } catch (e) {
    lastData = { step: "error", error: String(e) };
  }

  finalizeSSE(refs, lastData || { step: "error", error: "no response" });
}

// ── Send (fetch, non-SSE) ──────────────────────────────────────────────────
async function sendFetch(message) {
  const thinkingEl = appendThinking();
  const body = { message, dry_run: dryCheck.checked };
  const apiKey = apiKeyEl.value.trim();
  const headers = { "Content-Type": "application/json" };
  if (apiKey) headers["X-API-Key"] = apiKey;

  try {
    const resp = await fetch(SHELL_URL, {
      method: "POST",
      headers,
      body: JSON.stringify(body),
    });
    let data;
    try { data = await resp.json(); }
    catch { data = { status: "parse_error", error: await resp.text() }; }
    replaceThinking(thinkingEl, data);
  } catch (err) {
    replaceThinking(thinkingEl, { status: "dispatch_error", plan: {}, error: String(err) });
    showToast("接続エラー: " + err.message);
  }
}

      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({index: idx, to: dest})

          <button onclick="doneTask(${naRealIdx},null,this)" style="${_btnStyle('var(--muted)')}">✅</button>
        </div>`;
      }).join("");
      // コンテキスト一覧を集計してフィルターボタン生成
      const ctxSet = [...new Set(nas.filter(n => n.context).map(n => n.context))];
      const ctxBtns = ctxSet.length
        ? `<div style="margin-bottom:4px;display:flex;gap:4px;flex-wrap:wrap">${ctxSet.map(c => {
            const esc = escHtml(c);
            return `<button onclick="sendNextRich({filter:'${esc.replace(/'/g,\"\\'\")}'}, '/next ${esc}')" style="font-size:10px;padding:1px 6px;border:1px solid rgba(0,180,220,.3);background:rgba(0,180,220,.08);color:#6dd0e8;border-radius:10px;cursor:pointer">${esc}</button>`;
          }).join('')}</div>`
        : "";
      const filterLabel = opts.filter
        ? ` <span style="color:#6dd0e8">${escHtml(opts.filter)}</span>`
        : opts.overdue   ? ` <span style="color:var(--fail)">⚠️ 期限超過</span>`
        : opts.due_today ? ` <span style="color:var(--warn)">📅 今日期限</span>` : "";
      const projInfo = projs.length
        ? `<div style="margin-top:4px;font-size:11px;color:var(--warn)">📁 Projects ${projs.length}件</div>` : "";
      replaceLastAgent(
        `<span class="intent-tag tag-run_ok">GTD</span> ✅ <strong>Next Actions ${nas.length}件</strong>${filterLabel}` +
        `<div style="margin:6px 0">${ctxBtns}<div style="max-height:350px;overflow-y:auto">${rows}</div></div>` +
        projInfo
      );
    }
  } catch(e) {
    replaceLastAgent(`<span style='color:var(--fail)'>Next Actions 取得失敗: ${escHtml(String(e))}</span>`);
  }
  busy = false; sendBtn.disabled = false; msgInput.disabled = false;
}

// ── someday / waiting / projects リッチカード ───────────────────────────
async function sendListRich(apiPath, icon, title, label) {
  // 汎用: Someday/Waiting/Projects 一覧をカード表示
  appendUser(label);
  const thinkingEl = appendThinking();
  try {
    const r = await fetch(apiPath);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const items = await r.json(); // 文字列[]またはオブジェクト[]
    if (!items.length) {
      const el = document.createElement("div"); el.className = "msg agent";
      el.innerHTML = `<div class="avatar">OS</div><div class="bubble"><span class="intent-tag tag-run_ok">${title}</span> ${icon} <strong>${title}</strong> — 空っぽ 🎉${ts()}</div>`;
      thinkingEl.replaceWith(el); scrollEnd(); return;
    }
    const rows = items.slice(0, 50).map((it, i) => {
      const name = typeof it === "string" ? it : (it.name || it);
      // Projects はフォルダ階層付きの場合あり
      const safeName = escHtml(name);
      const ctx  = it.context ? ` <span style="font-size:10px;color:#6dd0e8;background:rgba(0,180,220,.10);border-radius:3px;padding:1px 4px">${escHtml(it.context)}</span>` : "";

      return `<div style="display:flex;align-items:center;gap:6px;padding:3px 4px;border-bottom:1px solid rgba(255,255,255,.04)">
        <span style="color:var(--muted);font-size:11px;min-width:22px">[${i+1}]</span>
        <span style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${safeName}">${safeName}${ctx}${due}</span>
        <button data-name="${safeName}" onclick="sendCaptureToNext(this.dataset.name)" style="${_btnStyle('var(--ok)')}">→ Next</button>
        <button data-name="${safeName}" onclick="sendListDone(this.dataset.name)" style="${_btnStyle('#666')}">✅</button>
      </div>`;
    }).join("");
    const more = items.length > 50 ? `<div style="font-size:10px;color:var(--muted);padding:3px 6px">…他 ${items.length-50}件</div>` : "";

  } catch(e) { replaceThinking(thinkingEl, {status:"error", error:String(e)}); }
}

// ── Edit リッチフォームUI ─────────────────────────────────────────────────
async function sendEditRich(preArg, label) {
  // preArg: "2 --due 2026-03-15" 等、なければ一覧を表示
  const idxM = preArg ? preArg.match(/^(\d+)/) : null;
  if (idxM) {
    // 直接編集: sendShellRun にフォールバック
    const editArgs = ["edit"];
    const nmM  = preArg.match(/--name\s+(\S+)/);
    const ctxM = preArg.match(/--context\s+(\S+)/);
    const dueM = preArg.match(/--due\s+(\S+)/);
    editArgs.push("--index", idxM[1]);
    if (nmM)  editArgs.push("--name",    nmM[1]);
    if (ctxM) editArgs.push("--context", ctxM[1]);
    if (dueM) editArgs.push("--due",     dueM[1]);
    await sendShellRun("gtd", editArgs, label); return;
  }
  // インタラクティブ: NA一覧 + インライン編集フォーム
  appendUser(label);
  const thinkingEl = appendThinking();
  try {
    const r = await fetch("/api/gtd/next");
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    const nas = d.next_actions || [];
    const today = new Date().toISOString().slice(0,10);
    if (!nas.length) {
      const el = document.createElement("div"); el.className = "msg agent";
      el.innerHTML = `<div class="avatar">OS</div><div class="bubble"><span class="intent-tag tag-run_ok">Edit</span> ✏️ Next Actions が空です${ts()}</div>`;
      thinkingEl.replaceWith(el); scrollEnd(); return;
    }
    const rows = nas.map(na => {
      const isOd = na.due && na.due < today;
      const isTd = na.due && na.due === today;
      const bg   = isOd ? "rgba(255,60,60,.08)" : isTd ? "rgba(255,180,0,.07)" : "transparent";
      const ctxVal = escHtml(na.context || "");
      const dueVal = escHtml(na.due || "");
      return `<div style="display:flex;align-items:center;gap:5px;padding:4px 2px;border-bottom:1px solid rgba(255,255,255,.05);background:${bg};flex-wrap:wrap">
        <span style="color:var(--muted);font-size:11px;min-width:22px">[${na.index}]</span>
        <span style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:80px" title="${escHtml(na.name)}">${escHtml(na.name)}</span>
        <input id="ectx-${na.index}" type="text" value="${ctxVal}" placeholder="@ctx" title="context" style="width:72px;font-size:11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);color:var(--fg);border-radius:3px;padding:1px 4px">
        <input id="edue-${na.index}" type="date" value="${dueVal}" title="due date" style="font-size:11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);color:var(--fg);border-radius:3px;padding:1px 3px">
        <button onclick="applyEdit(${na.index})" style="${_btnStyle('var(--ok)')}">保存</button>
      </div>`;
    }).join("");
    const el = document.createElement("div"); el.className = "msg agent";
    el.innerHTML = `<div class="avatar">OS</div><div class="bubble">
      <span class="intent-tag tag-run_ok">Edit</span> ✏️ <strong>Next Actions 編集</strong>
      <div style="margin:6px 0;max-height:380px;overflow-y:auto">${rows}</div>
      <div style="font-size:10px;color:var(--muted)">@ctx / 期限を変更して「保存」をクリック</div>${ts()}</div>`;
    thinkingEl.replaceWith(el); scrollEnd();
  } catch(e) { replaceThinking(thinkingEl, {status:"error", error:String(e)}); }
}

async function applyEdit(index) {
  const ctxEl = document.getElementById(`ectx-${index}`);
  const dueEl = document.getElementById(`edue-${index}`);
  const body  = { index };
  if (ctxEl && ctxEl.value.trim()) body.context = ctxEl.value.trim();
  if (dueEl && dueEl.value.trim()) body.due     = dueEl.value.trim();
  if (Object.keys(body).length === 1) { showToast("変更なし", 2000); return; }
  try {
    const r = await fetch("/api/gtd/edit", {
      method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body)
    });
    const j = await r.json().catch(()=>({}));
    showToast(r.ok ? `✅ [${index}] 保存` : `失敗: ${j.error||r.status}`, r.ok ? 2000 : 4000);
    if (r.ok) pollGtdStatus();
  } catch(e) { showToast(`エラー: ${String(e)}`, 4000); }
}

async function submitCapture(uid, btn) {
  const text = (document.getElementById(`ct-${uid}`)?.value || "").trim();
  const ctx  = (document.getElementById(`cc-${uid}`)?.value || "").trim();
  const due  = (document.getElementById(`cd-${uid}`)?.value || "").trim();
  const to   = (document.getElementById(`cs-${uid}`)?.value || "").trim();
  if (!text) { showToast("テキストを入力してください", 2500); return; }
  if (btn) { btn.disabled = true; btn.textContent = "保存中…"; }
  try {
    const body = { text };
    if (ctx) body.context = ctx;
    if (due) body.due     = due;
    if (to)  body.to      = to;
    const r = await fetch("/api/gtd/capture", {
      method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body)
    });
    const j = await r.json().catch(()=>({}));
    const destLabel = {"next":"Next","someday":"Someday","waiting":"Waiting","projects":"Projects"}[to] || "Inbox";
    showToast(r.ok ? `✅ ${destLabel} に保存: ${text.slice(0,24)}` : `失敗: ${j.error||r.status}`, r.ok ? 2500 : 4000);
    if (r.ok) {
      if (btn) { btn.textContent = "✅ 保存済"; }
      pollGtdStatus();
    } else if (btn) { btn.disabled = false; btn.textContent = "保存 ➕"; }
  } catch(e) {
    showToast(`エラー: ${String(e)}`, 4000);
    if (btn) { btn.disabled = false; btn.textContent = "保存 ➕"; }
  }
}

        ? `<span style="font-size:11px;color:${trem >= 0 ? 'var(--warn)' : 'var(--fail)'}"> ⏱ ${Math.max(0,trem)}分残</span>`
        : "";
      const startedStr = ct.started_at ? ct.started_at.slice(0,16).replace("T"," ") : "";
      ctHtml = `<div style="display:flex;align-items:center;gap:6px;padding:5px 6px;background:rgba(255,200,0,.10);border-radius:4px;border-left:3px solid var(--warn);margin-bottom:4px">

// ── Do リッチセレクター ───────────────────────────────────────────────────
async function sendDoRich(preIndex, preTimer, label) {
  // preIndex: 番号直指定 (string|null), preTimer: タイマー分 (string|null)
  // 番号直指定の場合はそのまま /api/gtd/do POST
  if (preIndex) {
    const body = { index: parseInt(preIndex, 10) };
    if (preTimer) body.timer = parseInt(preTimer, 10);
    appendUser(label);
    const thinkingEl = appendThinking();
    try {
      const r = await fetch("/api/gtd/do", {
        method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body)
      });
      const j = await r.json().catch(() => ({}));
      const el = document.createElement("div");
      el.className = "msg agent";
      const timerStr = body.timer ? `  <span style="color:var(--warn)">⏱ ${body.timer}分</span>` : "";
      el.innerHTML = `<div class="avatar">OS</div><div class="bubble">
        <span class="intent-tag ${r.ok ? 'tag-run_ok' : 'tag-run_err'}">${r.ok ? 'GTD DO' : 'ERR'}</span>
        <pre class="result-block">${escHtml(j.output || JSON.stringify(j))}</pre>${timerStr}${ts()}</div>`;
      thinkingEl.replaceWith(el); scrollEnd();
      if (r.ok) { pollGtdStatus(); _naExpanded = false; }
    } catch(e) {
      replaceThinking(thinkingEl, {status:"error", error: String(e)});
    }
    return;
  }
  // 一覧セレクター表示
  busy = true; sendBtn.disabled = true; msgInput.disabled = true;
  appendUser(label);
  appendAgent(`<span style='opacity:.6'>✅ Next Actions 読み込み中…</span>`);
  try {
    const r = await fetch("/api/gtd/next");
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    const nas = d.next_actions || [];
    const today = new Date().toISOString().slice(0, 10);
    if (!nas.length) {
      replaceLastAgent(`<span class="intent-tag tag-run_ok">GTD</span> ✅ Next Actions 空 — <span style="color:var(--muted)">まず /memo でタスクを追加しよう</span>`);
    } else {
      const rows = nas.map(na => {
        const isOd = na.due && na.due < today;
        const isTd = na.due && na.due === today;
        const dueStr = na.due ? ` <span style="font-size:10px;color:${isOd?'var(--fail)':'var(--warn)'}">📅${na.due}${isOd?'⚠️':''}</span>` : "";
        const ctxStr = na.context ? ` <span style="font-size:10px;color:#6dd0e8">${escHtml(na.context)}</span>` : "";
        const bg = isOd ? "rgba(255,60,60,.10)" : isTd ? "rgba(255,180,0,.08)" : "";
        return `<div style="display:flex;align-items:center;gap:6px;padding:4px 2px;background:${bg};border-bottom:1px solid rgba(255,255,255,.04)">
          <span style="color:var(--muted);font-size:11px;min-width:22px">[${na.index}]</span>
          <span onclick="doStart(${na.index},document.getElementById('timer-${na.index}').value)" title="クリックで開始" style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;padding:2px 0">${escHtml(na.name)}${ctxStr}${dueStr}</span>
          <input id="timer-${na.index}" type="number" min="1" max="120" placeholder="分" title="タイマー(分)" style="width:40px;font-size:11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);color:var(--fg);border-radius:3px;padding:1px 3px" onclick="event.stopPropagation()">
          <button onclick="event.stopPropagation();doStart(${na.index},document.getElementById('timer-${na.index}').value)" style="${_btnStyle('var(--ok)')}">▶</button>
        </div>`;
      }).join("");
      replaceLastAgent(
        `<span class="intent-tag tag-run_ok">GTD</span> ▶ <strong>作業を選択</strong> <span style="font-size:11px;color:var(--muted)">タイマー(分)は任意</span>` +
        `<div style="margin:6px 0;max-height:320px;overflow-y:auto">${rows}</div>`
      );
    }
  } catch(e) {
    replaceLastAgent(`<span style='color:var(--fail)'>取得失敗: ${escHtml(String(e))}</span>`);
  }
  busy = false; sendBtn.disabled = false; msgInput.disabled = false;
}

async function doStart(index, timerVal) {
  const body = { index };
  const t = parseInt(timerVal, 10);
  if (!isNaN(t) && t > 0) body.timer = t;
  try {
    const r = await fetch("/api/gtd/do", {
      method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body)
    });
    const j = await r.json().catch(() => ({}));
    const timerStr = body.timer ? ` ⏱ ${body.timer}分` : "";
    showToast(`▶ ${j.output ? j.output.split("\n")[0] : `[${index}] 開始`}${timerStr}`);
    if (r.ok) { pollGtdStatus(); _naExpanded = false; }
    else showToast(`do 失敗: ${j.error || r.status}`, 4000);
  } catch(e) { showToast(`do エラー: ${String(e)}`, 4000); }
}

// ── Done リッチセレクター ─────────────────────────────────────────────────
async function sendDoneRich(preIndex, label) {
  // 番号直指定の場合はそのまま完了処理
  if (preIndex) {
    const body = { index: parseInt(preIndex, 10) };
    appendUser(label);
    const thinkingEl = appendThinking();
    try {
      const r = await fetch("/api/gtd/done", {
        method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body)
      });
      const j = await r.json().catch(() => ({}));
      const el = document.createElement("div");
      el.className = "msg agent";
      el.innerHTML = `<div class="avatar">OS</div><div class="bubble">
        <span class="intent-tag ${r.ok ? 'tag-run_ok' : 'tag-run_err'}">${r.ok ? 'GTD DONE ✅' : 'ERR'}</span>
        <pre class="result-block">${escHtml(j.output || JSON.stringify(j))}</pre>${ts()}</div>`;
      thinkingEl.replaceWith(el); scrollEnd();
      if (r.ok) { pollGtdStatus(); _naExpanded = false; }
    } catch(e) { replaceThinking(thinkingEl, {status:"error", error: String(e)}); }
    return;
  }
  // current task + 一覧セレクター
  busy = true; sendBtn.disabled = true; msgInput.disabled = true;
  appendUser(label);
  appendAgent(`<span style='opacity:.6'>✅ 完了処理…</span>`);
  try {
    const [rCur, rNext] = await Promise.all([
      fetch("/api/gtd/current"),
      fetch("/api/gtd/next"),
    ]);
    const cur  = rCur.ok  ? (await rCur.json()).current_task  : null;
    const nd   = rNext.ok ? await rNext.json() : {};
    const nas  = nd.next_actions || [];
    const today = new Date().toISOString().slice(0, 10);
    let html = `<span class="intent-tag tag-run_ok">GTD</span> ✅ <strong>完了するタスクを選択</strong><div style="margin:6px 0;max-height:340px;overflow-y:auto">`;
    // 作業中タスクを先頭に
    if (cur) {
      html += `<div style="display:flex;align-items:center;gap:6px;padding:5px 2px;background:rgba(255,200,0,.10);border-bottom:1px solid rgba(255,255,255,.08)">
        <span style="font-size:14px">🔥</span>
        <span onclick="doneTask(null,'${escHtml(cur.name).replace(/'/g,"\\'")}',this.nextElementSibling)" title="クリックで完了" style="flex:1;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;padding:2px 0">${escHtml(cur.name)} <span style="font-size:10px;font-weight:400;color:var(--muted)">作業中</span></span>
        <button onclick="event.stopPropagation();doneTask(null,'${escHtml(cur.name).replace(/'/g,"\\'")}',this)" style="${_btnStyle('var(--ok)')}">✅ 完了!</button>
      </div>`;
    }
    if (!nas.length && !cur) {
      html += `<div style="padding:6px;color:var(--muted);font-size:12px">（Next Actions 空）</div>`;
    } else {
      nas.forEach(na => {
        const isOd = na.due && na.due < today;
        const dueStr = na.due ? ` <span style="font-size:10px;color:${isOd?'var(--fail)':'var(--warn)'}">📅${na.due}</span>` : "";
        const ctxStr = na.context ? ` <span style="font-size:10px;color:#6dd0e8">${escHtml(na.context)}</span>` : "";
        html += `<div style="display:flex;align-items:center;gap:6px;padding:3px 2px;border-bottom:1px solid rgba(255,255,255,.04)">
          <span style="color:var(--muted);font-size:11px;min-width:22px">[${na.index}]</span>
          <span onclick="doneTask(${na.index},null,this.nextElementSibling)" title="クリックで完了" style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;padding:2px 0">${escHtml(na.name)}${ctxStr}${dueStr}</span>
          <button onclick="event.stopPropagation();doneTask(${na.index},null,this)" style="${_btnStyle('var(--muted)')}">✅</button>
        </div>`;
      });
    }
    html += `</div>`;
    replaceLastAgent(html);
  } catch(e) {
    replaceLastAgent(`<span style='color:var(--fail)'>取得失敗: ${escHtml(String(e))}</span>`);
  }
  busy = false; sendBtn.disabled = false; msgInput.disabled = false;
}

async function doneTask(index, name, btn) {
  if (btn) { btn.disabled = true; btn.textContent = "処理中…"; }
  const body = {};
  if (index) body.index = index;
  else if (name) body.name = name;
  try {
    const r = await fetch("/api/gtd/done", {
      method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body)
    });
    const j = await r.json().catch(() => ({}));
    if (r.ok) {
      showToast(`✅ 完了: ${j.output ? j.output.split("\n")[0] : (name || `[${index}]`)}`);
      if (btn) btn.closest("div").style.cssText += ";opacity:.3;pointer-events:none";
      pollGtdStatus(); _naExpanded = false;
    } else {
      showToast(`done 失敗: ${j.error || r.status}`, 4000);
      if (btn) { btn.disabled = false; btn.textContent = "✅"; }
    }
  } catch(e) {
    showToast(`done エラー: ${String(e)}`, 4000);
    if (btn) { btn.disabled = false; btn.textContent = "✅"; }
  }
}
