rules:
  - name: invoices_pdf
    match:
      extension: ".pdf"
      filename_contains: ["invoice", "請求"]
    action:
      type: move
      target: "processed/invoices"

  - name: images_camera
    match:
      extension: [".jpg", ".jpeg", ".png", ".webp"]
    action:
      type: move
      target: "processed/images"

  - name: docs_general
    match:
      extension: [".doc", ".docx", ".txt", ".md"]
    action:
      type: move
      target: "processed/docs"

defaults:
  action: none
