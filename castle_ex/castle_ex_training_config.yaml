# CASTLE-EX 学習設定ファイル（Axolotl用）
# 外部トレーナー（Axolotl）で使用する設定ファイル

base_model: microsoft/Phi-3-mini-4k-instruct  # ベースモデル（変更可能）
model_type: LlamaForCausalLM

datasets:
  - path: castle_ex_dataset_v1_0_train.jsonl
    type: alpaca  # JSONL形式のデータセット

dataset_prepared_path: ./cache/castle_ex_v1_0_prepared

# 学習パラメータ
output_dir: ./outputs/castle_ex_v1_0
sequence_len: 2048
sample_packing: false

# 学習スケジュール（castle_ex_schedule_v1_0.jsonを参照）
# Phase 1 (Epoch 1-3): ウォームアップ
# Phase 2 (Epoch 4-10): 因果と統合へ寄せる
# Phase 3 (Epoch 11-25): 実戦

# 基本学習パラメータ
micro_batch_size: 2
gradient_accumulation_steps: 4
eval_batch_size: 2
num_epochs: 25

# 学習率スケジュール
learning_rate: 2.0e-5  # Phase 1の初期値
lr_scheduler: cosine
warmup_steps: 100

# 評価設定
eval_strategy: steps
eval_steps: 500
save_strategy: steps
save_steps: 500

# ログ設定
logging_steps: 100
report_to: tensorboard

# その他の設定
bf16: true
load_in_8bit: false
load_in_4bit: false
adapter: null
val_set_size: 0.1  # 評価データは別途用意済み（castle_ex_dataset_v1_0_eval.jsonl）

# 注意: layer_weightsとnegative_ratioは各epochで動的に適用する必要があります
# castle_ex_schedule_v1_0.jsonを参照してください
