# Grafana Loki and Promtail - Log Aggregation Stack
# Scalable log aggregation similar to Elasticsearch but more efficient
# Ref: https://grafana.com/docs/loki/latest/

---
# Loki ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
  labels:
    app: loki
data:
  loki.yaml: |
    auth_enabled: false
    
    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      log_level: info
    
    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory
    
    schema_config:
      configs:
      - from: 2024-01-01
        store: boltdb-shipper
        object_store: filesystem
        schema: v11
        index:
          prefix: index_
          period: 24h
    
    # Ruler for alerting
    ruler:
      alertmanager_url: http://alertmanager:9093
      storage:
        type: local
        local:
          directory: /loki/rules
      rule_path: /tmp/rules
      ring:
        kvstore:
          store: inmemory
      enable_api: true
    
    # Limits configuration
    limits_config:
      enforce_metric_name: false
      reject_old_samples: true
      reject_old_samples_max_age: 168h  # 7 days
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
      max_query_series: 1000
      max_query_parallelism: 32
      max_cache_freshness_per_query: 10m
      
      # Per-stream rate limits
      per_stream_rate_limit: 5MB
      per_stream_rate_limit_burst: 15MB
      
      # Retention
      retention_period: 720h  # 30 days
    
    # Chunk storage configuration
    chunk_store_config:
      max_look_back_period: 720h  # 30 days
    
    # Table manager (for retention)
    table_manager:
      retention_deletes_enabled: true
      retention_period: 720h  # 30 days
    
    # Query configuration
    query_range:
      align_queries_with_step: true
      max_retries: 5
      cache_results: true
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100
    
    # Compactor for log retention
    compactor:
      working_directory: /loki/compactor
      shared_store: filesystem
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 150

---
# Loki StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: monitoring
  labels:
    app: loki
spec:
  serviceName: loki
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
      containers:
      - name: loki
        image: grafana/loki:2.9.3
        args:
        - -config.file=/etc/loki/loki.yaml
        ports:
        - containerPort: 3100
          name: http
          protocol: TCP
        - containerPort: 9096
          name: grpc
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /etc/loki
        - name: storage
          mountPath: /loki
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /ready
            port: 3100
          initialDelaySeconds: 45
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 3100
          initialDelaySeconds: 45
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: loki-config
  volumeClaimTemplates:
  - metadata:
      name: storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi

---
# Loki Service
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: monitoring
  labels:
    app: loki
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 3100
    targetPort: 3100
    protocol: TCP
  - name: grpc
    port: 9096
    targetPort: 9096
    protocol: TCP
  selector:
    app: loki

---
# Promtail ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
  labels:
    app: promtail
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      log_level: info
    
    positions:
      filename: /tmp/positions.yaml
    
    clients:
    - url: http://loki:3100/loki/api/v1/push
      tenant_id: manaos
      batchwait: 1s
      batchsize: 1048576  # 1MB
      
      # External labels for all logs
      external_labels:
        cluster: manaos-production
        environment: production
    
    scrape_configs:
    # Scrape Kubernetes pod logs
    - job_name: kubernetes-pods
      kubernetes_sd_configs:
      - role: pod
      
      pipeline_stages:
      # Extract metadata from Kubernetes
      - cri: {}
      
      # Parse JSON logs
      - json:
          expressions:
            level: level
            timestamp: timestamp
            message: message
            logger: logger
            trace_id: trace_id
            span_id: span_id
      
      # Add labels
      - labels:
          level:
          logger:
          trace_id:
      
      # Drop high-cardinality labels
      - labeldrop:
          - filename
      
      # Timestamp parsing
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      
      relabel_configs:
      # Add namespace label
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      
      # Add pod name
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      
      # Add container name
      - source_labels: [__meta_kubernetes_pod_container_name]
        target_label: container
      
      # Add node name
      - source_labels: [__meta_kubernetes_pod_node_name]
        target_label: node
      
      # Add app label
      - source_labels: [__meta_kubernetes_pod_label_app]
        target_label: app
      
      # Add component label
      - source_labels: [__meta_kubernetes_pod_label_component]
        target_label: component
      
      # Drop logs from certain namespaces
      - source_labels: [__meta_kubernetes_namespace]
        regex: kube-system|kube-public
        action: drop
      
      # Only scrape running pods
      - source_labels: [__meta_kubernetes_pod_phase]
        regex: Pending|Succeeded|Failed
        action: drop
    
    # Scrape systemd journal logs
    - job_name: systemd-journal
      journal:
        path: /var/log/journal
        max_age: 12h
        labels:
          job: systemd-journal
      relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: unit
      - source_labels: ['__journal__hostname']
        target_label: node
      - source_labels: ['__journal_priority_keyword']
        target_label: level
    
    # Scrape node logs
    - job_name: kubernetes-nodes
      kubernetes_sd_configs:
      - role: node
      
      relabel_configs:
      - source_labels: [__meta_kubernetes_node_name]
        target_label: node
      
      pipeline_stages:
      - cri: {}
      - json:
          expressions:
            level: level
            message: message
      - labels:
          level:

---
# Promtail DaemonSet (runs on every node)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: monitoring
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
      - name: promtail
        image: grafana/promtail:2.9.3
        args:
        - -config.file=/etc/promtail/promtail.yaml
        env:
        - name: HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        ports:
        - containerPort: 9080
          name: http-metrics
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /etc/promtail
        - name: varlog
          mountPath: /var/log
          readOnly: true
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: positions
          mountPath: /tmp
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        securityContext:
          privileged: true
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      tolerations:
      - effect: NoSchedule
        operator: Exists
      volumes:
      - name: config
        configMap:
          name: promtail-config
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: positions
        hostPath:
          path: /tmp/promtail-positions
          type: DirectoryOrCreate

---
# Promtail ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: monitoring
  labels:
    app: promtail

---
# Promtail ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
  labels:
    app: promtail
rules:
- apiGroups: [""]
  resources:
  - nodes
  - nodes/proxy
  - services
  - endpoints
  - pods
  verbs: ["get", "list", "watch"]

---
# Promtail ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
  labels:
    app: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
- kind: ServiceAccount
  name: promtail
  namespace: monitoring

---
# Promtail Service (for metrics)
apiVersion: v1
kind: Service
metadata:
  name: promtail
  namespace: monitoring
  labels:
    app: promtail
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http-metrics
    port: 9080
    targetPort: 9080
    protocol: TCP
  selector:
    app: promtail

---
# Loki Alert Rules
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-rules
  namespace: monitoring
data:
  loki-rules.yaml: |
    groups:
    - name: application_errors
      interval: 1m
      rules:
      # Alert on high error rate
      - alert: HighErrorRate
        expr: |
          sum(rate({namespace="manaos-production"} |= "ERROR" [5m])) by (app) > 10
        for: 5m
        labels:
          severity: warning
          component: logging
        annotations:
          summary: "High error rate in {{ $labels.app }}"
          description: "Application {{ $labels.app }} is logging errors at {{ $value }} errors/sec"
      
      # Alert on critical errors
      - alert: CriticalErrors
        expr: |
          count_over_time({namespace="manaos-production"} |= "CRITICAL" [5m]) > 0
        for: 1m
        labels:
          severity: critical
          component: logging
        annotations:
          summary: "Critical errors detected in {{ $labels.app }}"
          description: "Critical errors detected in logs. Immediate investigation required."
      
      # Alert on database connection errors
      - alert: DatabaseConnectionErrors
        expr: |
          sum(rate({namespace="manaos-production"} |~ "(?i)database.*connection.*failed" [5m])) > 5
        for: 3m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Database connection failures detected"
          description: "Multiple database connection failures detected. Check database availability."
      
      # Alert on OOM kills
      - alert: OOMKillDetected
        expr: |
          count_over_time({namespace="manaos-production"} |= "OOMKilled" [10m]) > 0
        for: 1m
        labels:
          severity: warning
          component: resources
        annotations:
          summary: "OOM kill detected in {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} was killed due to out of memory. Consider increasing memory limits."
      
      # Alert on authentication failures
      - alert: HighAuthenticationFailures
        expr: |
          sum(rate({namespace="manaos-production"} |~ "(?i)authentication.*failed|unauthorized" [5m])) > 20
        for: 5m
        labels:
          severity: warning
          component: security
        annotations:
          summary: "High rate of authentication failures"
          description: "Detecting {{ $value }} authentication failures per second. Possible security incident."
    
    - name: logging_infrastructure
      interval: 1m
      rules:
      # Alert if Loki is down
      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 5m
        labels:
          severity: critical
          component: logging
        annotations:
          summary: "Loki is down"
          description: "Loki has been down for more than 5 minutes. Log aggregation is not available."
      
      # Alert if Promtail is down on nodes
      - alert: PromtailDown
        expr: up{job="promtail"} == 0
        for: 5m
        labels:
          severity: warning
          component: logging
        annotations:
          summary: "Promtail is down on {{ $labels.node }}"
          description: "Promtail agent is not running on node {{ $labels.node }}. Logs from this node are not being collected."

---
# Grafana Datasource for Loki
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-loki
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |
    apiVersion: 1
    
    datasources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki:3100
      isDefault: false
      version: 1
      editable: true
      jsonData:
        maxLines: 1000
        derivedFields:
        # Link traces to Jaeger
        - datasourceUid: jaeger
          matcherRegex: "trace_id=(\\w+)"
          name: TraceID
          url: "http://jaeger.manaos.local/trace/$${__value.raw}"

---
# Sample LogQL Queries Documentation
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-query-examples
  namespace: monitoring
data:
  queries.md: |
    # Loki Query Examples (LogQL)
    
    ## Basic Queries
    
    ### Show all logs from production namespace
    ```logql
    {namespace="manaos-production"}
    ```
    
    ### Show logs from specific app
    ```logql
    {namespace="manaos-production", app="unified-api"}
    ```
    
    ### Show only ERROR logs
    ```logql
    {namespace="manaos-production"} |= "ERROR"
    ```
    
    ### Show logs NOT containing health checks
    ```logql
    {namespace="manaos-production"} != "GET /health"
    ```
    
    ## Advanced Queries
    
    ### Regex pattern matching
    ```logql
    {namespace="manaos-production"} |~ "(?i)error|exception|failed"
    ```
    
    ### Parse JSON logs
    ```logql
    {namespace="manaos-production"} | json | level="ERROR"
    ```
    
    ### Parse and filter by extracted fields
    ```logql
    {app="unified-api"} | json | user_id="12345" | line_format "{{.message}}"
    ```
    
    ### Count error rate
    ```logql
    sum(rate({namespace="manaos-production"} |= "ERROR" [5m])) by (app)
    ```
    
    ### Top 10 error messages
    ```logql
    topk(10, sum by (message) (count_over_time({namespace="manaos-production"} |= "ERROR" [1h])))
    ```
    
    ### Average response time from logs
    ```logql
    avg_over_time({app="unified-api"} | json | __error__="" | unwrap response_time [5m])
    ```
    
    ### Find slow queries (> 1 second)
    ```logql
    {app="unified-api"} | json | response_time > 1000
    ```
    
    ## Trace Correlation
    
    ### Find logs for specific trace
    ```logql
    {namespace="manaos-production"} | json | trace_id="abc123def456"
    ```
    
    ## Troubleshooting Queries
    
    ### Find OOM kills
    ```logql
    {namespace="manaos-production"} |= "OOMKilled"
    ```
    
    ### Find database connection issues
    ```logql
    {namespace="manaos-production"} |~ "(?i)database.*connection.*failed"
    ```
    
    ### Find authentication failures
    ```logql
    {namespace="manaos-production"} |~ "(?i)authentication.*failed|unauthorized"
    ```
    
    ### Show logs around a specific time (context)
    ```logql
    {namespace="manaos-production", pod="unified-api-xyz"} 
      |= "error" 
      | line_format "{{.timestamp}} {{.level}} {{.message}}"
    ```
