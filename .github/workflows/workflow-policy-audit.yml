name: Workflow Policy Audit

on:
  push:
    branches: [master, main, develop]
    paths:
      - '.github/workflows/*.yml'
      - '.github/required-status-checks.json'
      - 'scripts/audit_workflow_policies.py'
      - 'scripts/audit_required_status_checks.py'
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      - name: Check Slack webhook configuration
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "::warning::SLACK_WEBHOOK_URL is not configured; failure alerts will not be sent."
            echo "- ⚠️ SLACK_WEBHOOK_URL is not configured (failure alerts disabled)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ✅ SLACK_WEBHOOK_URL is configured" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Run workflow policy audit
        id: policy_audit
        run: python scripts/audit_workflow_policies.py

      - name: Run required status checks audit
        id: required_checks_audit
        run: python scripts/audit_required_status_checks.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-policy-audit
          path: |
            artifacts/workflow-policy-audit.md
            artifacts/required-checks-audit.md
          retention-days: 14

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          WORKFLOW: ${{ github.workflow }}
          SERVER_URL: ${{ github.server_url }}
          POLICY_AUDIT_OUTCOME: ${{ steps.policy_audit.outcome }}
          REQUIRED_CHECKS_AUDIT_OUTCOME: ${{ steps.required_checks_audit.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import urllib.request

          repo = os.environ.get('REPO', '')
          ref_name = os.environ.get('REF', '')
          run_id = os.environ.get('RUN_ID', '')
          workflow = os.environ.get('WORKFLOW', '')
          server_url = os.environ.get('SERVER_URL', 'https://github.com')
          webhook = os.environ.get('SLACK_WEBHOOK_URL', '')
          run_url = f"{server_url}/{repo}/actions/runs/{run_id}"

          outcomes = {
              'workflow_policy_audit': os.environ.get('POLICY_AUDIT_OUTCOME', ''),
              'required_checks_audit': os.environ.get('REQUIRED_CHECKS_AUDIT_OUTCOME', ''),
          }
          failed_steps = [name for name, outcome in outcomes.items() if outcome and outcome != 'success']

          summary_lines = []
          report_path = Path('artifacts/required-checks-audit.md')
          if report_path.exists():
              for line in report_path.read_text(encoding='utf-8').splitlines():
                  normalized = line.strip()
                  if normalized.startswith('- Missing mappings:') or normalized.startswith('- Expected-but-missing in protection:') or normalized.startswith('- Unexpected in protection:'):
                      summary_lines.append(normalized)
          summary_text = '\n'.join(summary_lines) if summary_lines else 'no required-checks summary'

          failed_text = ', '.join(failed_steps) if failed_steps else 'unknown'

          payload = {
              'text': f":rotating_light: {workflow} failed\nrepo={repo}\nref={ref_name}\nfailed_steps={failed_text}\n{summary_text}\nrun={run_url}"
          }

          req = urllib.request.Request(
              webhook,
              data=json.dumps(payload).encode('utf-8'),
              headers={'Content-Type': 'application/json'},
              method='POST',
          )
          with urllib.request.urlopen(req, timeout=15) as response:
              print(f"slack_notify_status={response.status}")
          PY
