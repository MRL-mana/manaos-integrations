# Git操作のYAML例
# このファイルを参考に、AIにYAML形式でGit操作設定を出力させてください

# コミット&プッシュの例
kind: git_ops
action: commit_and_push
repository_path: "."
commit_message: "Add: Skills実装"
branch: "main"
files:
  - "scripts/*.py"
  - "skills/*.mdc"
notify:
  slack: true
idempotency_key: "git_commit_2026-01-12_001"

